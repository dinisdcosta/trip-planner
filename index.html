<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diário de Viagem Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<!-- Leaflet CSS & JS (Grátis, OpenSource, perfeito para Web e Mobile) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root {
  /* Dark Mode (Default) */
  --bg: #0F1B2B;
  --bg-alt: #0B141F;
  --panel: #152437;
  --panel-alt: #1C3049;
  --linen: #F1E8D3;
  --linen-dim: #DCD2B6;
  --gold: #C9A24D;
  --gold-dim: #8C7239;
  --teal: #4FA39A;
  --coral: #C1573E;
  --sage: #86AE8C;
  --slate-blue: #7C97B8;
  --text: #EDE6D3;
  --text-dim: #93A5BB;
  --border: rgba(237,230,211,0.14);
  --font-display: 'Fraunces', serif;
  --font-body: 'IBM Plex Sans', sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
  --shadow: rgba(0, 0, 0, 0.3);
}

body.light-theme {
  /* Light Mode */
  --bg: #F7F5F0;
  --bg-alt: #EFECE6;
  --panel: #FFFFFF;
  --panel-alt: #FBF9F5;
  --linen: #20160A;
  --linen-dim: #5C5246;
  --gold: #B8860B;
  --gold-dim: #8B6508;
  --teal: #2E7D75;
  --coral: #B22222;
  --sage: #2E8B57;
  --slate-blue: #4682B4;
  --text: #1C2833;
  --text-dim: #5D6D7E;
  --border: rgba(0,0,0,0.1);
  --shadow: rgba(0, 0, 0, 0.08);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background: var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  transition: background 0.3s ease, color 0.3s ease;
}

.app{max-width:1180px;margin:0 auto;padding:20px 16px 80px;}

/* ---------- Header ---------- */
.header{
  display:flex; align-items:center; justify-content:space-between; gap:20px;
  flex-wrap:wrap; margin-bottom:22px; padding-bottom:18px; border-bottom:1px solid var(--border);
}
.brand{display:flex; flex-direction:column; gap:2px; flex: 1; min-width: 250px;}
.brand .eyebrow{
  font-family:var(--font-mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase;
  color:var(--gold); opacity:.9;
}
.brand h1{
  font-family:var(--font-display); font-weight:600; font-size:clamp(24px,4vw,36px); margin:2px 0 0;
  letter-spacing:-0.01em;
}
.trip-picker{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}

select, input, textarea{
  font-family:var(--font-body); background:var(--panel-alt); color:var(--text);
  border:1px solid var(--border); border-radius:8px; padding:9px 12px; font-size:14px;
}
select:focus, input:focus, textarea:focus{outline:2px solid var(--gold); outline-offset:1px;}
.btn{
  font-family:var(--font-mono); font-size:12px; letter-spacing:.03em; text-transform:uppercase;
  border:1px solid var(--border); background:var(--panel-alt); color:var(--text);
  padding:10px 16px; border-radius:8px; cursor:pointer; transition:all .15s ease;
  white-space:nowrap;
}
.btn:hover{background:var(--panel); transform:translateY(-1px); box-shadow: 0 4px 8px var(--shadow);}
.btn-primary{background:var(--gold); color:var(--bg); border-color:var(--gold); font-weight:600;}
.btn-primary:hover{background:var(--gold-dim); color: #fff;}
.btn-danger{color:var(--coral); border-color:var(--coral);}
.btn-sm{padding:6px 10px; font-size:11px;}
.icon-btn{background:transparent; border:none; color:var(--text-dim); cursor:pointer; font-size:15px; padding:4px 8px; border-radius:6px;}
.icon-btn:hover{color:var(--text); background:var(--panel-alt);}

/* ---------- Tabs ---------- */
.tabs{display:flex; gap:6px; margin-bottom:24px; overflow-x:auto; padding-bottom:2px;}
.tab{
  font-family:var(--font-mono); font-size:12px; letter-spacing:.04em; text-transform:uppercase;
  padding:11px 18px; border-radius:10px 10px 0 0; cursor:pointer; color:var(--text-dim);
  background:var(--panel); border:1px solid var(--border); border-bottom:none; white-space:nowrap;
}
.tab.active{color:var(--gold); background:var(--panel-alt); box-shadow:inset 0 2px 0 var(--gold); font-weight: 600;}

.panel{background:var(--panel); border:1px solid var(--border); border-radius:0 12px 12px 12px; padding:20px; box-shadow: 0 4px 12px var(--shadow);}

.empty{ text-align:center; padding:50px 20px; color:var(--text-dim); }

/* ---------- Dashboard & Stats ---------- */
.section-title{ font-family:var(--font-display); font-weight:600; font-size:22px; margin:0 0 16px; }
.stat-row{display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:14px; margin-bottom:26px;}
.stat-card{ background:var(--panel-alt); border:1px solid var(--border); border-radius:10px; padding:16px; }
.stat-card .label{font-family:var(--font-mono); font-size:11px; text-transform:uppercase; color:var(--text-dim);}
.stat-card .value{font-family:var(--font-display); font-size:24px; font-weight:600; margin-top:6px;}
.stat-card .value.over{color:var(--coral);}
.stat-card .value.ok{color:var(--sage);}

.hero-progress{display:flex; gap:20px; align-items:center; background:var(--panel-alt); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:26px; flex-wrap:wrap;}
.ring-wrap{position:relative; width:100px; height:100px; flex-shrink:0;}
.ring-label{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
.ring-label .pct{font-family:var(--font-display); font-size:22px; font-weight:700;}

.chart-row{display:grid; grid-template-columns:1fr 1fr; gap:18px;}
@media (max-width:768px){ .chart-row{grid-template-columns:1fr;} }
.chart-card{background:var(--panel-alt); border:1px solid var(--border); border-radius:10px; padding:18px;}

/* ---------- Roteiro & Mapa ---------- */
.itin-layout{display:grid; grid-template-columns:1fr 1.2fr; gap:20px;}
@media (max-width:900px){ .itin-layout{grid-template-columns:1fr;} }
.day-group{margin-bottom:18px;}
.day-label{font-family:var(--font-mono); font-size:11px; text-transform:uppercase; color:var(--gold); margin-bottom:8px;}
.loc-item{
  display:flex; align-items:flex-start; gap:12px; background:var(--panel-alt); border:1px solid var(--border);
  border-radius:9px; padding:12px 14px; margin-bottom:8px;
}
.loc-pin-num{
  font-family:var(--font-mono); font-size:11px; font-weight:600; width:22px; height:22px; border-radius:50%;
  background:var(--gold); color:var(--bg); display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.loc-body{flex:1; min-width:0;}
.loc-body .name{font-weight:600; font-size:14px;}
.loc-body .notes{font-size:12.5px; color:var(--text-dim); margin-top:3px;}

/* ---------- Mapa Leaflet ---------- */
.map-container {
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 12px var(--shadow);
  position: sticky;
  top: 20px;
}
.map-canvas{ width:100%; height: 450px; background: var(--bg-alt); z-index: 1; }

/* ---------- Ticket / Despesas ---------- */
.expense-toolbar{display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap;}
.ticket{
  position:relative; display:flex; align-items:center; gap:14px; background:var(--panel-alt);
  border:1px dashed var(--border); border-radius:8px; padding:13px 16px; margin-bottom:10px;
}
.ticket .info{flex:1; min-width:0;}
.ticket .amount{font-family:var(--font-mono); font-weight:600; font-size:15px; white-space:nowrap;}

/* ---------- Autocomplete Morada ---------- */
.autocomplete-container {
  position: relative;
  width: 100%;
}
.autocomplete-results {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  z-index: 999;
  max-height: 200px;
  overflow-y: auto;
  box-shadow: 0 4px 12px var(--shadow);
}
.autocomplete-item {
  padding: 10px;
  cursor: pointer;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}
.autocomplete-item:hover {
  background: var(--panel-alt);
  color: var(--gold);
}

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center;
  z-index:1000; padding:16px; backdrop-filter:blur(3px);
}
.modal{
  background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:24px; width:100%; max-width:480px;
  max-height:90vh; overflow-y:auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.modal h3{font-family:var(--font-display); font-size:20px; margin:0 0 18px;}
.field{margin-bottom:14px; display:flex; flex-direction:column; gap:6px;}
.field label{font-family:var(--font-mono); font-size:11px; text-transform:uppercase; color:var(--text-dim);}
.field-row{display:flex; gap:10px;}
.field-row .field{flex:1;}
.modal-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:20px;}

.mini-map{ width:100%; height: 200px; border-radius:10px; margin-top: 8px; border: 1px solid var(--border); }

/* Switch de Tema */
.theme-switch {
  background: none;
  border: none;
  font-size: 1.5rem;
  cursor: pointer;
  padding: 8px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s;
}
.theme-switch:hover { transform: scale(1.1); }

@media (max-width: 600px) {
  .header { flex-direction: column; align-items: flex-start; }
  .trip-picker { width: 100%; }
  .trip-picker select, .trip-picker button { flex: 1; }
  .panel { padding: 12px; }
  .ticket { flex-direction: column; align-items: flex-start; gap: 8px; }
  .ticket .amount { align-self: flex-end; }
}
</style>
</head>
<body>

<div class="app" id="app">

  <div class="header">
    <div class="brand">
      <div class="eyebrow">Gestor de Viagens Pro</div>
      <h1 id="tripTitle">A carregar…</h1>
      <div id="syncStatus" style="font-family:var(--font-mono); font-size:10px; color:var(--text-dim); margin-top:2px;"></div>
    </div>
    <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
      <button class="theme-switch" id="themeToggle" title="Alternar Tema">☀️</button>
      <div class="trip-picker">
        <select id="tripSelect" aria-label="Escolher viagem"></select>
        <button class="btn btn-sm" id="editTripBtn">Editar</button>
        <button class="btn btn-sm btn-primary" id="newTripBtn">+ Nova</button>
        <button class="btn btn-sm" id="exportBtn" title="Exportar Backup">⬇ Exp</button>
        <button class="btn btn-sm" id="importBtn" title="Importar Backup">⬆ Imp</button>
        <input type="file" id="importFile" accept="application/json" style="display:none;">
      </div>
    </div>
  </div>

  <div id="tabsWrap">
    <div class="tabs" id="tabs">
      <div class="tab active" data-tab="painel">Painel</div>
      <div class="tab" data-tab="roteiro">Roteiro &amp; Mapa</div>
      <div class="tab" data-tab="reservas">Reservas</div>
      <div class="tab" data-tab="despesas">Despesas</div>
      <div class="tab" data-tab="saldo">Saldo &amp; Splitwise</div>
      <div class="tab" data-tab="orcamento">Orçamento</div>
    </div>
    <div class="panel" id="panelContent"></div>
  </div>

</div>

<div id="modalRoot"></div>

<script>
/* ============================= CONFIGS & CATEGORIAS ============================= */
const CATEGORIES = [
  {key:'alojamento', label:'Alojamento', icon:'🛏️', color:'#7C97B8'},
  {key:'alimentacao', label:'Alimentação', icon:'🍽️', color:'#C9A24D'},
  {key:'transporte', label:'Transporte', icon:'🚗', color:'#4FA39A'},
  {key:'atividades', label:'Atividades', icon:'🎟️', color:'#A9829F'},
  {key:'compras', label:'Compras', icon:'🛍️', color:'#86AE8C'},
  {key:'outros', label:'Outros', icon:'📎', color:'#C1573E'},
];

const BOOKING_CATEGORIES = [
  {key:'voo', label:'Voo', icon:'✈️'},
  {key:'alojamento', label:'Alojamento', icon:'🏨'},
  {key:'transporte', label:'Transporte', icon:'🚗'},
  {key:'atividade', label:'Atividade', icon:'🎫'},
  {key:'outro', label:'Outro', icon:'📄'},
];

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function catInfo(key){ return CATEGORIES.find(c=>c.key===key) || CATEGORIES[CATEGORIES.length-1]; }
function fmtMoney(amount, currency){
  return new Intl.NumberFormat('pt-PT', {style:'currency', currency: currency || 'EUR'}).format(amount||0);
}
function fmtDateShort(dateStr){
  if(!dateStr) return '—';
  const d = new Date(dateStr + 'T00:00:00');
  if(isNaN(d)) return dateStr;
  return d.toLocaleDateString('pt-PT', {day:'2-digit', month:'short'});
}

/* ============================= ESTADO DA APLICAÇÃO ============================= */
const state = {
  trips: [],
  currentTripId: null,
  currentData: null,
  activeTab: 'painel',
  charts: {},
  map: null,
  mapMarkers: [],
  mapPolyline: null,
  tempCoords: null
};

/* ============================= ARMAZENAMENTO ============================= */
async function loadState(){
  try {
    const rawTrips = localStorage.getItem('trips-index');
    state.trips = rawTrips ? JSON.parse(rawTrips) : [];
    const lastId = localStorage.getItem('last-trip-id');
    if (lastId && state.trips.some(t=>t.id===lastId)) {
      state.currentTripId = lastId;
    } else if (state.trips.length) {
      state.currentTripId = state.trips[0].id;
    }
    if (state.currentTripId) {
      const rawData = localStorage.getItem('trip:'+state.currentTripId);
      state.currentData = rawData ? ensureShape(JSON.parse(rawData)) : null;
    }
  } catch(e) { console.error('Erro ao ler do LocalStorage', e); }
}

async function saveAll(){
  if(state.currentTripId && state.currentData){
    localStorage.setItem('trip:'+state.currentTripId, JSON.stringify(state.currentData));
    const idx = state.trips.findIndex(t=>t.id===state.currentTripId);
    if(idx > -1) {
      state.trips[idx].name = state.currentData.info.name;
      state.trips[idx].budgetTotal = state.currentData.info.budgetTotal;
    }
  }
  localStorage.setItem('trips-index', JSON.stringify(state.trips));
  if(state.currentTripId) localStorage.setItem('last-trip-id', state.currentTripId);
}

function ensureShape(data){
  if(!data) return null;
  if(!data.bookings) data.bookings = [];
  if(!data.locations) data.locations = [];
  if(!data.expenses) data.expenses = [];
  if(!data.people) data.people = [];
  if(!data.advances) data.advances = []; // Nova tabela para Levantamentos/Adiantamentos
  if(!data.budgetCategories) data.budgetCategories = CATEGORIES.map(c=>({key:c.key, planned:0}));
  return data;
}

function blankTripData(info){
  return {
    info,
    locations: [],
    expenses: [],
    bookings: [],
    people: [],
    advances: [],
    budgetCategories: CATEGORIES.map(c=>({key:c.key, planned:0})),
  };
}

/* ============================= INICIALIZAÇÃO ============================= */
async function init(){
  await loadState();
  initTheme();
  renderHeader();
  renderTabs();
  renderCurrentTab();
  bindGlobalEvents();
}

function initTheme(){
  const theme = localStorage.getItem('theme') || 'dark';
  document.body.classList.toggle('light-theme', theme === 'light');
  document.getElementById('themeToggle').textContent = theme === 'light' ? '🌙' : '☀️';
}

function bindGlobalEvents(){
  document.getElementById('themeToggle').addEventListener('click', () => {
    const isLight = document.body.classList.toggle('light-theme');
    const newTheme = isLight ? 'light' : 'dark';
    localStorage.setItem('theme', newTheme);
    document.getElementById('themeToggle').textContent = isLight ? '🌙' : '☀️';
    // Recarregar os gráficos para adaptarem as cores
    if(state.activeTab === 'painel') renderCurrentTab();
  });

  document.getElementById('newTripBtn').addEventListener('click', ()=>openTripModal('create'));
  document.getElementById('editTripBtn').addEventListener('click', ()=>openTripModal('edit'));
  document.getElementById('tripSelect').addEventListener('change', async (e)=>{
    state.currentTripId = e.target.value;
    const rawData = localStorage.getItem('trip:'+state.currentTripId);
    state.currentData = rawData ? ensureShape(JSON.parse(rawData)) : null;
    await saveAll();
    renderHeader();
    renderCurrentTab();
  });
  document.getElementById('tabs').addEventListener('click', (e)=>{
    const t = e.target.closest('.tab');
    if(!t) return;
    state.activeTab = t.dataset.tab;
    renderTabs();
    renderCurrentTab();
  });
  document.getElementById('exportBtn').addEventListener('click', exportTripData);
  document.getElementById('importBtn').addEventListener('click', ()=> document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change', importTripData);
}

function renderHeader(){
  const sel = document.getElementById('tripSelect');
  const editBtn = document.getElementById('editTripBtn');
  if(!state.trips.length){
    document.getElementById('tripTitle').textContent = 'Diário de Viagem';
    sel.style.display = 'none';
    editBtn.style.display = 'none';
    return;
  }
  sel.style.display = '';
  editBtn.style.display = '';
  sel.innerHTML = state.trips.map(t=>`<option value="${t.id}" ${t.id===state.currentTripId?'selected':''}>${escapeHtml(t.name)}</option>`).join('');
  const cur = state.trips.find(t=>t.id===state.currentTripId);
  document.getElementById('tripTitle').textContent = cur ? cur.name : 'Diário de Viagem';
}

function renderTabs(){
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.toggle('active', t.dataset.tab === state.activeTab);
  });
}

function escapeHtml(str){
  const d = document.createElement('div'); d.textContent = str==null?'':str; return d.innerHTML;
}

/* ============================= ROTAS DE ABAS ============================= */
function renderCurrentTab(){
  const el = document.getElementById('panelContent');
  if(!state.trips.length || !state.currentData){
    el.innerHTML = `
      <div class="empty">
        <h2 style="font-family:var(--font-display);">Ainda não configurou nenhuma viagem</h2>
        <p>Crie uma viagem para começar a gerir o seu roteiro, reservas, orçamentos e despesas.</p>
        <button class="btn btn-primary" onclick="openTripModal('create')">+ Criar Viagem</button>
      </div>`;
    return;
  }
  if(state.activeTab === 'painel') return renderDashboard(el);
  if(state.activeTab === 'roteiro') return renderRoteiro(el);
  if(state.activeTab === 'reservas') return renderReservas(el);
  if(state.activeTab === 'despesas') return renderDespesas(el);
  if(state.activeTab === 'saldo') return renderSaldo(el);
  if(state.activeTab === 'orcamento') return renderOrcamento(el);
}

/* ============================= PAINEL (RESUMO) ============================= */
function renderDashboard(el){
  const info = state.currentData.info;
  const expenses = state.currentData.expenses;
  const totalSpent = expenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const totalBudget = Number(info.budgetTotal||0);
  const remaining = totalBudget - totalSpent;
  const pct = totalBudget>0 ? Math.min(100, Math.round((totalSpent/totalBudget)*100)) : 0;
  const days = daysBetween(info.startDate, info.endDate);

  el.innerHTML = `
    <h2 class="section-title">Resumo Geral</h2>
    <div class="hero-progress">
      <div class="ring-wrap">
        ${ringSvg(pct)}
        <div class="ring-label"><div class="pct">${pct}%</div><div class="cap">gasto</div></div>
      </div>
      <div class="desc">
        <h3>${totalSpent > totalBudget && totalBudget > 0 ? '⚠️ Orçamento Ultrapassado!' : 'Orçamento sob Controlo'}</h3>
        <p>Gastou ${fmtMoney(totalSpent, info.currency)} do total planeado de ${fmtMoney(totalBudget, info.currency)}.</p>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat-card"><div class="label">Orçamento</div><div class="value">${fmtMoney(totalBudget, info.currency)}</div></div>
      <div class="stat-card"><div class="label">Gasto Total</div><div class="value ${totalSpent>totalBudget && totalBudget>0?'over':''}">${fmtMoney(totalSpent, info.currency)}</div></div>
      <div class="stat-card"><div class="label">Disponível</div><div class="value ${remaining<0?'over':'ok'}">${fmtMoney(remaining, info.currency)}</div></div>
      <div class="stat-card"><div class="label">Duração</div><div class="value">${days!=null ? days+' dias' : '—'}</div></div>
    </div>

    <div class="chart-row">
      <div class="chart-card">
        <h4>Despesas por Categoria</h4>
        <canvas id="catChart"></canvas>
      </div>
      <div class="chart-card">
        <h4>Evolução de Gastos por Dia</h4>
        <canvas id="dayChart"></canvas>
      </div>
    </div>
  `;

  renderCategoryChart(expenses, info.currency);
  renderDayChart(expenses, info.currency);
}

function ringSvg(pct){
  const r = 40, c = 2*Math.PI*r;
  const offset = c - (pct/100)*c;
  const color = pct>=100 ? 'var(--coral)' : (pct>=80 ? 'var(--gold)' : 'var(--teal)');
  return `<svg width="100" height="100" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="var(--bg-alt)" stroke-width="10"/>
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="${color}" stroke-width="10" stroke-linecap="round"

function daysBetween(start, end){
  if(!start || !end) return null;
  const a = new Date(start+'T00:00:00'), b = new Date(end+'T00:00:00');
  if(isNaN(a)||isNaN(b)) return null;
  return Math.max(1, Math.round((b-a)/86400000)+1);
}

function renderLocItem(loc, idx){

  return `

      </div>
    </div>`;

function initLeafletMap(locations){
  const hasCoords = locations.filter(l => l.lat && l.lng);
  const defaultCenter = hasCoords.length > 0 ? [hasCoords[0].lat, hasCoords[0].lng] : [39.5, -8.0]; // Portugal default
  const zoom = hasCoords.length > 0 ? 12 : 6;

  state.map = L.map('leafletMap').setView(defaultCenter, zoom);
  
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(state.map);

  state.mapMarkers = [];
  const points = [];

  hasCoords.forEach((loc, idx) => {
    const marker = L.marker([loc.lat, loc.lng]).addTo(state.map);
    marker.bindPopup(`<b>${idx+1}. ${escapeHtml(loc.name)}</b><br>${escapeHtml(loc.notes || '')}`);
    state.mapMarkers.push(marker);
    points.push([loc.lat, loc.lng]);
  });

  if (points.length > 1) {
    state.mapPolyline = L.polyline(points, {color: 'var(--gold)', weight: 3, dashArray: '5, 10'}).addTo(state.map);
    state.map.fitBounds(state.mapPolyline.getBounds(), {padding: [40, 40]});
  }
}

function focusOnMap(lat, lng, name){
  if(state.map && lat && lng){
    state.map.setView([lat, lng], 15);
    state.mapMarkers.forEach(m => {
      if(m.getLatLng().lat === lat && m.getLatLng().lng === lng){
        m.openPopup();
      }
    });
  }
}

/* ============================= SALDO & SPLITWISE (COM ADIANTAMENTOS) ============================= */
function personName(id){
  const p = state.currentData.people.find(x=>x.id===id);
  return p ? p.name : 'Desconhecido';
}

function computeSplitwiseBalances(){
  const people = state.currentData.people;
  const advances = state.currentData.advances || [];
  const expenses = state.currentData.expenses;

  const paidDirectly = {}; // Gasto direto próprio do bolso
  const owed = {};         // Quanto consome em despesas
  const fundedCash = {};   // Quanto dinheiro vivo levantou para o grupo (Levantamentos)
  const consumedCash = {}; // Quanto consumiu das despesas pagas com o dinheiro comum

  people.forEach(p => {
    paidDirectly[p.id] = 0;
    owed[p.id] = 0;
    fundedCash[p.id] = 0;
    consumedCash[p.id] = 0;
  });

  // 1. Somar Levantamentos/Adiantamentos
  advances.forEach(adv => {
    if(fundedCash.hasOwnProperty(adv.personId)){
      fundedCash[adv.personId] += Number(adv.amount || 0);
    }
  });

  // 2. Processar cada despesa
  expenses.forEach(e => {
    const participants = (e.splitWith && e.splitWith.length) ? e.splitWith.filter(id => owed.hasOwnProperty(id)) : people.map(p=>p.id);
    if (!participants.length) return;
    const share = Number(e.amount || 0) / participants.length;

    if (e.paidBy === 'advance') {
      // Dinheiro veio do fundo comum (levantado por alguém)
      const adv = advances.find(a => a.id === e.advanceId);
      if (adv) {
        // Quem levantou o dinheiro (adv.personId) é quem "pagou" originalmente o bolo financeiro.
        // Logo, os participantes da despesa passam a dever a sua respetiva quota a quem fez o adiantamento.
        participants.forEach(pid => {
          owed[pid] += share;
        });
        // Quem adiantou o dinheiro (adv.personId) recebe o crédito desse pagamento.
        paidDirectly[adv.personId] += Number(e.amount || 0);
      }
    } else if (e.paidBy && paidDirectly.hasOwnProperty(e.paidBy)) {
      // Dinheiro pago diretamente do bolso de um membro do grupo
      paidDirectly[e.paidBy] += Number(e.amount || 0);
      participants.forEach(pid => {
        owed[pid] += share;
      });
    }
  });

  // 3. O saldo final de cada pessoa é: (O que pagou do próprio bolso + Adiantamentos efetuados) - (A sua quota consumida de despesas)
  const net = {};
  people.forEach(p => {
    net[p.id] = round2(paidDirectly[p.id] - owed[p.id]);
  });

  return { paidDirectly, owed, fundedCash, net };
}

    <div id="settlementList">
      ${settlements.length ? settlements.map(s=>`
        <div class="ticket">

function simplifyDebts(net){
  const creditors = [], debtors = [];
  Object.entries(net).forEach(([id, amt])=>{
    if(amt > 0.01) creditors.push({id, amt});
    else if(amt < -0.01) debtors.push({id, amt:-amt});
  });
  creditors.sort((a,b)=>b.amt-a.amt);
  debtors.sort((a,b)=>b.amt-a.amt);
  const settlements = [];
  let i=0, j=0;
  while(i<debtors.length && j<creditors.length){
    const pay = Math.min(debtors[i].amt, creditors[j].amt);
    settlements.push({from:debtors[i].id, to:creditors[j].id, amount: round2(pay)});
    debtors[i].amt -= pay;
    creditors[j].amt -= pay;
    if(debtors[i].amt < 0.01) i++;
    if(creditors[j].amt < 0.01) j++;
  }
  return settlements;
}

function round2(n){ return Math.round(n*100)/100; }

/* ============================= ORÇAMENTO ============================= */
function renderOrcamento(el){
  const info = state.currentData.info;
  const cats = state.currentData.budgetCategories;
  const expenses = state.currentData.expenses;

  el.innerHTML = `
    <h2 class="section-title">Orçamento Global de Viagem</h2>
    <div class="budget-total-row" style="display: flex; gap: 10px; align-items: center; margin-bottom: 25px; flex-wrap: wrap;">
      <label style="font-weight: 600;">Orçamento Total da Viagem:</label>
      <input type="number" min="0" step="10" id="budgetTotalInput" value="${info.budgetTotal||0}" style="width:140px;">
      <span>${info.currency}</span>
      <button class="btn btn-sm btn-primary" id="saveBudgetTotalBtn">Guardar</button>
    </div>

    <div id="catBudgetRows">
      ${CATEGORIES.map(c=>{
        const catData = cats.find(x=>x.key===c.key) || {planned:0};
        const spent = expenses.filter(e=>e.categoryKey===c.key).reduce((s,e)=>s+Number(e.amount||0),0);
        const planned = Number(catData.planned||0);
        const pct = planned>0 ? Math.min(100, Math.round((spent/planned)*100)) : (spent>0?100:0);
        const over = planned>0 && spent>planned;
        return `
        <div class="cat-budget-row" style="margin-bottom: 16px;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
            <div style="font-weight: 600;">${c.icon} ${c.label}</div>
            <div style="font-size: 13px; color: var(--text-dim);">
              Gasto: ${fmtMoney(spent, info.currency)} / 
              Plan: <input class="cat-input" data-cat="${c.key}" type="number" min="0" value="${planned}" style="width:80px; padding: 4px 6px;"> ${info.currency}
            </div>
          </div>
          <div class="bar-track" style="background:var(--bg-alt); height:10px; border-radius:5px; overflow:hidden;">
            <div class="bar-fill" style="width:${pct}%; background:${over?'var(--coral)':c.color}; height:100%; transition: width 0.4s;"></div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div style="margin-top: 20px;">
      <button class="btn btn-primary" id="saveCatsBtn">Guardar Plano de Categorias</button>
    </div>
  `;

  document.getElementById('saveBudgetTotalBtn').addEventListener('click', ()=>{
    const val = Number(document.getElementById('budgetTotalInput').value)||0;
    state.currentData.info.budgetTotal = val;
    saveAll();
    renderHeader();
  });
  document.getElementById('saveCatsBtn').addEventListener('click', ()=>{
    document.querySelectorAll('.cat-input').forEach(inp=>{
      const key = inp.dataset.cat;
      const val = Number(inp.value)||0;
      let entry = state.currentData.budgetCategories.find(c=>c.key===key);
      if(!entry){ entry = {key, planned:0}; state.currentData.budgetCategories.push(entry); }
      entry.planned = val;
    });
    saveAll();
    renderOrcamento(document.getElementById('panelContent'));
    alert('Orçamento por categorias atualizado com sucesso!');
  });
}

/* MODAL DE ADICIONAR PARAGEM COM MAPA REAL E AUTOCOMPLETE (GRÁTIS) */
function openLocationModal(mode, id){
  const editing = mode==='edit';
  const loc = editing ? state.currentData.locations.find(l=>l.id===id) : {name:'', day:'', time:'', notes:'', lat:null, lng:null};
  state.tempCoords = loc.lat && loc.lng ? {lat: loc.lat, lng: loc.lng} : null;

  openModal(`
    <h3>${editing?'Editar Local':'Novo Local'}</h3>
    <div class="field">
      <label>Procurar Morada / Monumento (Autocomplete Grátis)</label>
      <div class="autocomplete-container">
        <input type="text" id="l_search" placeholder="Escreva e escolha na lista..." style="width: 100%;">
        <div id="autocompleteResults" class="autocomplete-results" style="display: none;"></div>
      </div>
    </div>
    <div class="field"><label>Nome Customizado do Local</label><input id="l_name" value="${escapeHtml(loc.name)}" placeholder="Ex: Hotel Quioto"></div>
    <div class="field-row">
      <div class="field"><label>Data</label><input type="date" id="l_day" value="${loc.day||''}"></div>
      <div class="field"><label>Hora</label><input type="time" id="l_time" value="${loc.time||''}"></div>
    </div>
    <div class="field"><label>Notas adicionais</label><textarea id="l_notes" rows="2">${escapeHtml(loc.notes||'')}</textarea></div>
    <div class="field">
      <label>Localização no Mapa</label>
      <div id="miniMap" class="mini-map"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="saveLocBtn">Guardar Local</button>
    </div>
  `);

  let miniMapInst = L.map('miniMap').setView(state.tempCoords ? [state.tempCoords.lat, state.tempCoords.lng] : [39.5, -8.0], state.tempCoords ? 15 : 6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(miniMapInst);

  let tempMarker = state.tempCoords ? L.marker([state.tempCoords.lat, state.tempCoords.lng]).addTo(miniMapInst) : null;

  miniMapInst.on('click', (e) => {
    const {lat, lng} = e.latlng;
    state.tempCoords = {lat, lng};
    if (tempMarker) {
      tempMarker.setLatLng([lat, lng]);
    } else {
      tempMarker = L.marker([lat, lng]).addTo(miniMapInst);
    }
  });

  // Autocomplete - Nominatim Grátis
  const searchInput = document.getElementById('l_search');
  const resultsDiv = document.getElementById('autocompleteResults');
  let searchTimeout;

  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    const query = searchInput.value.trim();
    if(query.length < 3) { resultsDiv.style.display = 'none'; return; }

    searchTimeout = setTimeout(() => {
      fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`)
        .then(res => res.json())
        .then(data => {
          resultsDiv.innerHTML = data.map(item => `
            <div class="autocomplete-item" data-lat="${item.lat}" data-lon="${item.lon}" data-name="${escapeHtml(item.display_name)}">
              ${escapeHtml(item.display_name)}
            </div>
          `).join('');
          resultsDiv.style.display = 'block';

          document.querySelectorAll('.autocomplete-item').forEach(el => {
            el.addEventListener('click', () => {
              const lat = parseFloat(el.dataset.lat);
              const lng = parseFloat(el.dataset.lon);
              const fullName = el.dataset.name;
              
              state.tempCoords = {lat, lng};
              document.getElementById('l_name').value = fullName.split(',')[0]; // Usa o nome curto
              searchInput.value = fullName;
              resultsDiv.style.display = 'none';

              // Atualiza o mini-mapa
              miniMapInst.setView([lat, lng], 16);
              if (tempMarker) {
                tempMarker.setLatLng([lat, lng]);
              } else {
                tempMarker = L.marker([lat, lng]).addTo(miniMapInst);
              }
            });
          });
        });
    }, 400);
  });

  document.getElementById('saveLocBtn').addEventListener('click', ()=>{
    const name = document.getElementById('l_name').value.trim();
    if(!name){ alert('Introduza o nome do local.'); return; }
    const payload = {
      name,
      day: document.getElementById('l_day').value,
      time: document.getElementById('l_time').value,
      notes: document.getElementById('l_notes').value.trim(),
      lat: state.tempCoords ? state.tempCoords.lat : null,
      lng: state.tempCoords ? state.tempCoords.lng : null,
    };
    if(editing){
      Object.assign(loc, payload);
    } else {
      state.currentData.locations.push({id:uid(), ...payload});
    }
    saveAll();
    closeModal();
    renderRoteiro(document.getElementById('panelContent'));
  });
}

/* ============================= IMPORTS & EXPORTS ============================= */
function exportTripData(){
  if(!state.currentData){ alert('Nenhuma viagem selecionada.'); return; }
  const payload = { exportedAt: new Date().toISOString(), trip: state.currentData };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `backup-viagem-${state.currentData.info.name.toLowerCase().replace(/\s+/g, '-')}.json`;
  a.click();
}

async function importTripData(e){
  const file = e.target.files[0];
  if(!file) return;
  try{
    const text = await file.text();
    const parsed = JSON.parse(text);
    let tripData = ensureShape(parsed.trip || parsed);
    if(!tripData || !tripData.info || !tripData.info.name){ alert('Ficheiro inválido.'); return; }
    
    const existingIdx = state.trips.findIndex(t => t.id === tripData.info.id);
    if (existingIdx > -1) {
      if(!confirm('A viagem já existe. Pretende substituir os dados atuais?')) return;
      state.trips[existingIdx].name = tripData.info.name;
    } else {
      state.trips.push({id: tripData.info.id, name: tripData.info.name});
    }
    state.currentTripId = tripData.info.id;
    state.currentData = tripData;
    await saveAll();
    location.reload();
  } catch(err) {
    alert('Erro ao processar ficheiro de backup.');
  }
}
