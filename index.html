function computeBudgetPace(){
  const d = state.currentData, info = d.info;
  const today = todayLocalISO();
  const phase = tripPhase(info, today);
  if(phase!=='active' && phase!=='past') return null;
  const totalDays = daysBetween(info.startDate, info.endDate);
  if(!totalDays) return null;
  const elapsedDays = phase==='past' ? totalDays : Math.min(totalDays, daysUntil(today, info.startDate)+1);
  const fixedSpend = d.expenses.filter(e=>e.bookingId).reduce((s,e)=>s+Number(e.amount||0),0);
  const discretionarySpend = d.expenses.filter(e=>!e.bookingId).reduce((s,e)=>s+Number(e.amount||0),0);
  const dailyRate = discretionarySpend / Math.max(1, elapsedDays);
  const projectedTotal = fixedSpend + dailyRate*totalDays;
  const totalBudget = Number(info.budgetTotal||0);
  const diffPct = totalBudget>0 ? Math.round((projectedTotal/totalBudget-1)*100) : null;
  return {totalDays, elapsedDays, fixedSpend, discretionarySpend, dailyRate, projectedTotal, totalBudget, diffPct, phase};
}

function ringSvg(pct){
  const r = 52, c = 2*Math.PI*r;
  const offset = c - (pct/100)*c;
  const color = pct>=100 ? 'var(--coral)' : (pct>=80 ? 'var(--gold)' : 'var(--teal)');
  return `<svg width="130" height="130" viewBox="0 0 130 130">
    <circle cx="65" cy="65" r="${r}" fill="none" stroke="#0B141F" stroke-width="12"/>
    <circle cx="65" cy="65" r="${r}" fill="none" stroke="${color}" stroke-width="12" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${offset}" transform="rotate(-90 65 65)"
      style="transition:stroke-dashoffset .6s ease"/>
  </svg>`;
}

function daysBetween(start, end){
  if(!start || !end) return null;
  const a = new Date(start+'T00:00:00'), b = new Date(end+'T00:00:00');
  if(isNaN(a)||isNaN(b)) return null;
  return Math.max(1, Math.round((b-a)/86400000)+1);
}

function addDaysISO(dateStr, n){
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m-1, d+n);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function expenseDayShares(e){
  // Uma despesa ligada a uma reserva conta para o(s) dia(s) da reserva (ex: estadia),
  // não para a data em que foi paga — pagar hoje por um voo daqui a 15 dias deve aparecer
  // no dia do voo, não em "hoje". A data da despesa continua a ser só o registo do pagamento.
  const amount = Number(e.amount||0);
  const booking = e.bookingId ? (state.currentData.bookings||[]).find(b=>b.id===e.bookingId) : null;
  if(booking && booking.dateFrom){
    const from = booking.dateFrom;
    // Alojamento: dateTo é o dia de check-out, não uma noite dormida — não entra na conta.
    // Outras reservas de vários dias (seguro, etc.) cobrem o próprio dateTo por inteiro.
    const hasRange = booking.dateTo && booking.dateTo>=from;
    const to = hasRange ? booking.dateTo : from;
    const exclusiveEnd = booking.category==='alojamento' && hasRange && to>from;
    const days = [];
    let cur = from;
    while(cur<=to && days.length<60){
      if(exclusiveEnd && cur===to) break;
      days.push(cur); cur = addDaysISO(cur,1);
    }
    if(!days.length) days.push(from);
    const share = amount/days.length;
    return days.map(day=>({day, amount:share}));
  }
  return [{day: e.date || 'sem data', amount}];
}

}

function relatedBookingsForLocation(loc){

function locationChronoKey(loc){
  if(loc.day) return `${loc.day}T${loc.time||'12:00'}`;
  const related = relatedBookingsForLocation(loc);
  if(related.length){
    const keys = related.map(b=> b.arrivalLocationId===loc.id ? `${b.dateFrom||'9999-12-31'}T${b.timeTo||b.timeFrom||'23:59'}` : bookingSortKey(b));

function computeBearing(lat1, lon1, lat2, lon2){
  const toRad = d=>d*Math.PI/180, toDeg = r=>r*180/Math.PI;
  const phi1=toRad(lat1), phi2=toRad(lat2), dLon=toRad(lon2-lon1);
  const y = Math.sin(dLon)*Math.cos(phi2);
  const x = Math.cos(phi1)*Math.sin(phi2) - Math.sin(phi1)*Math.cos(phi2)*Math.cos(dLon);
  return (toDeg(Math.atan2(y,x))+360)%360;
}

/* ---------- Mapa offline: cache de tiles ---------- */
const TILE_URL_TEMPLATE = 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
const TILE_CACHE_NAME = 'trip-map-tiles-v1';
const TILE_SUBDOMAINS = ['a','b','c'];
function tileCacheSupported(){ return typeof window!=='undefined' && 'caches' in window; }
async function fetchTileWithCache(url, imgEl){
  if(tileCacheSupported()){
    try{
      const cache = await caches.open(TILE_CACHE_NAME);
      const cached = await cache.match(url);
      if(cached){
        imgEl.src = URL.createObjectURL(await cached.blob());
        return true;
      }
    }catch(e){ /* Cache API indisponível ou falhou — segue para a rede */ }
  }
  const res = await fetch(url);
  if(!res.ok) throw new Error('tile '+res.status);
  const blob = await res.blob();
  imgEl.src = URL.createObjectURL(blob);
  if(tileCacheSupported()){
    caches.open(TILE_CACHE_NAME).then(c=>c.put(url, new Response(blob, {headers:{'Content-Type':blob.type||'image/png'}}))).catch(()=>{});
  }
  return false;
}
const OfflineTileLayer = (typeof L!=='undefined') ? L.TileLayer.extend({
  createTile: function(coords, done){
    const tile = document.createElement('img');
    tile.alt = '';
    const url = this.getTileUrl(coords);
    fetchTileWithCache(url, tile).then(()=>done(null, tile)).catch(err=>done(err, tile));
    return tile;
  }
}) : null;
function offlineTileLayer(options){
  return new OfflineTileLayer(TILE_URL_TEMPLATE, {subdomains:TILE_SUBDOMAINS, maxZoom:19, ...options});
}
function tileXY(lat, lon, zoom){
  const n = Math.pow(2, zoom);
  const x = Math.floor((lon+180)/360*n);
  const latRad = lat*Math.PI/180;
  const y = Math.floor((1-Math.log(Math.tan(latRad)+1/Math.cos(latRad))/Math.PI)/2*n);
  return {x, y};
}
async function downloadMapArea(btn){
  if(!leafletMapInstance) return;
  if(!tileCacheSupported()){ alert('O teu browser não suporta guardar o mapa offline.'); return; }
  const bounds = leafletMapInstance.getBounds();
  const baseZoom = leafletMapInstance.getZoom();
  const minZoom = Math.max(2, baseZoom-1);
  const maxZoom = Math.min(18, baseZoom+3);
  const tiles = [];
  for(let z=minZoom; z<=maxZoom; z++){
    const nw = tileXY(bounds.getNorth(), bounds.getWest(), z);
    const se = tileXY(bounds.getSouth(), bounds.getEast(), z);
    for(let x=Math.min(nw.x,se.x); x<=Math.max(nw.x,se.x); x++){
      for(let y=Math.min(nw.y,se.y); y<=Math.max(nw.y,se.y); y++){
        tiles.push({x,y,z});
        if(tiles.length>400) break;
      }
      if(tiles.length>400) break;
    }
    if(tiles.length>400) break;
  }
  const originalText = btn.innerHTML;
  btn.disabled = true;
  let done=0, failed=0;
  const cache = await caches.open(TILE_CACHE_NAME);
  const CONCURRENCY = 6;
  let idx = 0;
  async function worker(){
    while(idx<tiles.length){
      const t = tiles[idx++];
      const sub = TILE_SUBDOMAINS[(t.x+t.y)%TILE_SUBDOMAINS.length];
      const url = TILE_URL_TEMPLATE.replace('{s}',sub).replace('{z}',t.z).replace('{x}',t.x).replace('{y}',t.y);
      try{
        const already = await cache.match(url);
        if(!already){
          const res = await fetch(url);
          if(res.ok) await cache.put(url, res.clone());
          else failed++;
        }
      }catch(e){ failed++; }
      done++;
      btn.innerHTML = `⏳ ${done}/${tiles.length}`;
    }
  }
  await Promise.all(Array.from({length:CONCURRENCY}, worker));
  btn.disabled = false;
  btn.innerHTML = failed ? `⚠️ ${tiles.length-failed}/${tiles.length}` : '✓ Guardado';
  setTimeout(()=>{ btn.innerHTML = originalText; }, 2500);
}
const MapDownloadControl = (typeof L!=='undefined') ? L.Control.extend({
  options:{position:'bottomright'},
  onAdd:function(){
    const btn = L.DomUtil.create('button', 'leaflet-bar map-zoom-btn map-fit-btn');
    btn.type='button'; btn.title='Guardar esta zona do mapa para offline (zoom atual e alguns níveis a mais)';

    btn.style.marginTop='6px';
    L.DomEvent.disableClickPropagation(btn);

function renderMapCanvas(){
  const wrap = document.getElementById('mapCanvas');
  if(!wrap || typeof L==='undefined') return;
  const locs = [...state.currentData.locations].filter(l=>l.lat!=null && l.lon!=null).sort((a,b)=>{
    const ka = locationChronoKey(a), kb = locationChronoKey(b);
    return ka!==kb ? ka.localeCompare(kb) : (a.order||0)-(b.order||0);
  });

  const needsFreshMap = !leafletMapInstance || leafletMapInstance.getContainer() !== wrap;
  if(needsFreshMap){
    if(leafletMapInstance){ try{ leafletMapInstance.remove(); }catch(e){} }
    leafletMarkers = new Map();
    leafletRouteLine = null;
    leafletMapInstance = L.map(wrap, { attributionControl:true, minZoom:2, maxZoom:19, zoomControl:false }).setView([20,0], 2);
    offlineTileLayer({
      attribution:'&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a>'
    }).addTo(leafletMapInstance);
    L.control.zoom({position:'bottomright'}).addTo(leafletMapInstance);
    if(MapFitControl) leafletMapInstance.addControl(new MapFitControl());
    if(MapDownloadControl) leafletMapInstance.addControl(new MapDownloadControl());
    if(MapFullscreenControl) leafletMapInstance.addControl(new MapFullscreenControl());
  }

  const currentIds = new Set(locs.map(l=>l.id));
  for(const [id, marker] of [...leafletMarkers.entries()]){
    if(!currentIds.has(id)){ leafletMapInstance.removeLayer(marker); leafletMarkers.delete(id); }
  }
  const latlngs = [];
  let routeIndex = 0;
  locs.forEach((loc)=>{
    const anchored = locationHasChronoAnchor(loc);
    const badgeIndex = anchored ? routeIndex++ : null;
    const ll = [loc.lat, loc.lon];
    if(anchored) latlngs.push(ll);
    let marker = leafletMarkers.get(loc.id);
    if(marker){
      marker.setLatLng(ll);
      marker.setIcon(buildPinDivIcon(loc, badgeIndex));
      marker.setPopupContent(popoverHtmlFor(loc));
    } else {
      marker = L.marker(ll, {icon:buildPinDivIcon(loc,badgeIndex), draggable:true});
      marker.bindPopup(popoverHtmlFor(loc), {className:'map-popover-wrap', maxWidth:230});
      marker.on('dragend', ()=>onMarkerDragEnd(loc.id));
      marker.addTo(leafletMapInstance);
      leafletMarkers.set(loc.id, marker);
    }
  });

  if(leafletRouteLine){ leafletMapInstance.removeLayer(leafletRouteLine); leafletRouteLine=null; }
  leafletRouteArrows.forEach(a=>leafletMapInstance.removeLayer(a));
  leafletRouteArrows = [];
  if(latlngs.length>1){
    leafletRouteLine = L.polyline(latlngs, {color:'#C9A24D', weight:2.5, dashArray:'6,7', opacity:0.75}).addTo(leafletMapInstance);
    // Setas a meio de cada troço, na ordem cronológica (mesma numeração dos pins),
    // para ficar claro que a linha segue a sequência do roteiro e não a distância.
    for(let i=0; i<latlngs.length-1; i++){
      const [lat1,lon1] = latlngs[i], [lat2,lon2] = latlngs[i+1];
      const midLat = (lat1+lat2)/2, midLon = (lon1+lon2)/2;
      const bearing = computeBearing(lat1,lon1,lat2,lon2);
      const arrow = L.marker([midLat,midLon], {icon:buildRouteArrowIcon(bearing), interactive:false, keyboard:false});
      arrow.addTo(leafletMapInstance);
      leafletRouteArrows.push(arrow);
    }
  }

  let hintEl = wrap.querySelector('.map-empty-hint');
  if(!locs.length){
    if(!hintEl){ hintEl=document.createElement('div'); hintEl.className='map-empty-hint'; wrap.appendChild(hintEl); }
    hintEl.textContent = 'O mapa fica aqui — adiciona uma paragem para veres o percurso, ou arrasta um pin para afinar a posição.';
  } else if(hintEl){ hintEl.remove(); }

  if(needsFreshMap){
    setTimeout(()=>{ if(leafletMapInstance){ leafletMapInstance.invalidateSize(); fitMapToLocations(); } }, 0);
  }
}
async function onMarkerDragEnd(locId){
  const loc = state.currentData.locations.find(l=>l.id===locId);
  const marker = leafletMarkers.get(locId);
  if(!loc || !marker) return;
  const {lat,lng} = marker.getLatLng();
  loc.lat = lat; loc.lon = lng;
  const xy = mapXYFromCoords(lat,lng); loc.x = xy.x; loc.y = xy.y;
  persistCurrentTrip();
  renderMapCanvas();
  try{
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&zoom=18`, {headers:{'Accept-Language':'pt-PT,pt;q=0.9,en;q=0.7'}});
    if(res.ok){
      const data = await res.json();
      if(data && data.display_name){
        loc.address = data.display_name;
        persistCurrentTrip();
        const m = leafletMarkers.get(locId);
        if(m) m.setPopupContent(popoverHtmlFor(loc));
      }
    }
  }catch(err){ /* offline: mantém a nova posição, só a morada não atualiza */ }
}
function fitMapToLocations(){
  if(!leafletMapInstance) return;
  const locs = (state.currentData && state.currentData.locations || []).filter(l=>l.lat!=null && l.lon!=null);
  if(!locs.length){ leafletMapInstance.setView([20,0], 2); return; }
  if(locs.length===1){ leafletMapInstance.setView([locs[0].lat, locs[0].lon], 14); return; }
  leafletMapInstance.fitBounds(L.latLngBounds(locs.map(l=>[l.lat,l.lon])), {padding:[36,36], maxZoom:15});
}

}

const AIRLINE_NAMES={TP:'TAP Air Portugal',FR:'Ryanair',U2:'easyJet',EZY:'easyJet',LH:'Lufthansa',BA:'British Airways',IB:'Iberia',VY:'Vueling',KL:'KLM',AF:'Air France',LX:'SWISS',EK:'Emirates',QR:'Qatar Airways',TK:'Turkish Airlines',W6:'Wizz Air',S4:'Azores Airlines'};
function parseFlexibleDate(text){
  const iso=String(text||'').match(/\b(20\d{2})[-/.](\d{1,2})[-/.](\d{1,2})\b/);if(iso)return `${iso[1]}-${String(iso[2]).padStart(2,'0')}-${String(iso[3]).padStart(2,'0')}`;
  const eu=String(text||'').match(/\b(\d{1,2})[/.\-](\d{1,2})[/.\-](20\d{2})\b/);if(eu)return `${eu[3]}-${String(eu[2]).padStart(2,'0')}-${String(eu[1]).padStart(2,'0')}`;
  return '';
}
function parseReservationConfirmation(raw){
  const text=String(raw||'').replace(/\r/g,'').replace(/[ \t]+/g,' ');const upper=text.toUpperCase();
  const flightMatches=[...upper.matchAll(/\b([A-Z]{2,3})\s*[- ]?(\d{1,4}[A-Z]?)\b/g)].map(m=>({full:(m[1]+m[2]),code:m[1],index:m.index}));
  const ignored=new Set(['AM','PM','UTC','GMT','EUR','USD','THE','AND','FROM','TO']);
  const flight=flightMatches.find(x=>!ignored.has(x.code)&&Number.parseInt(x.full.replace(/\D/g,''),10)>0);
  const iatas=[...upper.matchAll(/(?:\(|\b)([A-Z]{3})(?:\)|\b)/g)].map(m=>m[1]).filter(x=>!['THE','AND','FOR','FROM','ARR','DEP','UTC','GMT','EUR','USD','TAP'].includes(x));
  const uniqueIatas=[...new Set(iatas)];
  const times=[...text.matchAll(/\b([01]?\d|2[0-3]):([0-5]\d)\b/g)].map(m=>`${String(m[1]).padStart(2,'0')}:${m[2]}`);
  const dates=[...text.matchAll(/(?:20\d{2}[-/.]\d{1,2}[-/.]\d{1,2}|\d{1,2}[/.\-]\d{1,2}[/.\-]20\d{2})/g)].map(m=>parseFlexibleDate(m[0])).filter(Boolean);
  const booking=text.match(/(?:BOOKING|RESERVA|CONFIRMATION|LOCATOR|LOCALIZADOR|PNR|REFERENCE|REFERÊNCIA|CODIGO|CÓDIGO)\s*(?:NUMBER|NÚMERO|NO\.?|#|:)?\s*[:#-]?\s*([A-Z0-9]{5,10})/i);
  const terminalDep=text.match(/(?:DEPARTURE|PARTIDA)[^\n]{0,40}TERMINAL\s*([A-Z0-9-]+)/i)||text.match(/TERMINAL\s*([A-Z0-9-]+)/i);
  const terminalArr=text.match(/(?:ARRIVAL|CHEGADA)[^\n]{0,40}TERMINAL\s*([A-Z0-9-]+)/i);
  return {flightNumber:flight?.full||'',provider:flight?(AIRLINE_NAMES[flight.code]||flight.code):'',dateFrom:dates[0]||'',dateTo:dates[1]||dates[0]||'',timeFrom:times[0]||'',timeTo:times[1]||'',departureIata:uniqueIatas[0]||'',arrivalIata:uniqueIatas[1]||'',code:booking?.[1]||'',departureTerminal:terminalDep?.[1]||'',arrivalTerminal:terminalArr?.[1]||''};
}
function findOrCreateAirportByIata(iata){

  if(!loc){loc={id:uid(),name:`Aeroporto ${iata} (${iata})`,address:'',day:'',time:'',notes:'Aeroporto importado de uma confirmação de voo',x:null,y:null,order:nextLocationOrder(),visited:false,airportIata:iata};state.currentData.locations.push(loc);}

}

function findOrCreateTypedLocation(name, note='Local associado a uma reserva'){

  if(!loc){loc={id:uid(),name,address:'',day:'',time:'',notes:note,x:null,y:null,order:nextLocationOrder(),visited:false,fromBooking:true};state.currentData.locations.push(loc);}

function mapXYFromCoords(lat, lon){
  lat = Number(lat); lon = Number(lon);
  // Calibrado por regressão contra as fronteiras reais de várias dezenas de países
  // no mapa-base (que não é uma projeção equiretangular completa -90/90 — a imagem
  // está cortada verticalmente, por isso a fórmula linear ingénua empurrava tudo
  // para norte).
  const x = 0.296438*lon + 47.781;
  const y = -0.601964*lat + 63.226;
  return {x: Math.max(2, Math.min(98, x)), y: Math.max(4, Math.min(96, y))};
}
function xyToLatLon(x, y){
  // Inverso de mapXYFromCoords — só para estimar lat/lon de locais antigos que só
  // tinham x/y (colocados manualmente no mapa ilustrado, antes do mapa real).
  return { lat: (63.226 - Number(y))/0.601964, lon: (Number(x) - 47.781)/0.296438 };
}

async function searchBookingPlace(kind){

  if(!navigator.onLine){status.textContent='Sem internet: o local será guardado pelo nome e poderá ser localizado no mapa mais tarde.';status.style.color='var(--gold)';box.innerHTML='';return;}
  status.textContent='A procurar…';status.style.color='var(--text-dim)';box.innerHTML='';
  try{
    const url=`https://nominatim.openstreetmap.org/search?format=jsonv2&limit=10&addressdetails=1&q=${encodeURIComponent(q)}`;
    const res=await fetch(url,{headers:{'Accept-Language':'pt-PT,pt;q=0.9,en;q=0.7'}});if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const rows=await res.json();if(!rows.length)throw new Error('Local não encontrado');
    status.textContent=`${rows.length} resultado${rows.length>1?'s':''} — escolhe o local certo:`;status.style.color='var(--text-dim)';
    box.innerHTML=rows.map((r,i)=>`<button type="button" class="search-result" data-i="${i}">${escapeHtml(r.display_name)}</button>`).join('');
    box.querySelectorAll('button').forEach(btn=>btn.onclick=()=>chooseBookingPlace(kind, rows[Number(btn.dataset.i)], q));

}

function tripForeignCurrencyUsage(){
  const tripCurrency = state.currentData.info.currency;
  const counts = {};
  (state.currentData.expenses||[]).forEach(e=>{
    if(e.origCurrency && e.origCurrency!==tripCurrency) counts[e.origCurrency] = (counts[e.origCurrency]||0)+1;
  });
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([code,count])=>({code,count}));
}
function formatFxRateLine(code, rate, tripCurrency){
  // Moedas de valor muito baixo (ex: IDR, VND) ficam ilegíveis com "1 X = 0,0000 Y" — inverte-se a leitura.
  if(rate < 0.01) return `1 ${tripCurrency} ≈ ${Math.round(1/rate).toLocaleString('pt-PT')} ${code}`;
  const decimals = rate>=100 ? 0 : (rate>=1 ? 2 : 4);
  return `1 ${code} = ${rate.toFixed(decimals)} ${tripCurrency}`;
}

function personName(id){
  const p = state.currentData.people.find(x=>x.id===id);
  return p ? p.name : null;
}

function advanceUsage(excludeExpenseId=null){
  const usage={}; (state.currentData.advances||[]).forEach(a=>usage[a.id]=0);
  state.currentData.expenses.forEach(e=>{
    if(e.id===excludeExpenseId) return;
    (e.fundAllocations||[]).forEach(x=>{
      if(usage.hasOwnProperty(x.advanceId)) usage[x.advanceId]+=Number(x.amount||0);
    });
  });
  return usage;
}
function allocateFundsAutomatically(amount, excludeExpenseId=null){
  let remaining=round2(Number(amount||0));
  const usage=advanceUsage(excludeExpenseId);
  const funds=[...(state.currentData.advances||[])].sort((a,b)=>
    String(a.date||'9999-12-31').localeCompare(String(b.date||'9999-12-31'))
  );
  const allocations=[];
  for(const fund of funds){
    if(remaining<=0.001) break;
    const available=Math.max(0, round2(Number(fund.amount||0)-Number(usage[fund.id]||0)));
    if(available<=0.001) continue;
    const used=round2(Math.min(available,remaining));
    allocations.push({advanceId:fund.id, amount:used});
    remaining=round2(remaining-used);
  }
  return {allocations, personalAmount:Math.max(0,remaining)};
}
function computeBalances(){
  const people = state.currentData.people;
  const paid = {}, owed = {}, funded = {};
  people.forEach(p=>{ paid[p.id]=0; owed[p.id]=0; funded[p.id]=0; });
  let unassignedCount = 0, unassignedTotal = 0;
  const advancesById=Object.fromEntries((state.currentData.advances||[]).map(a=>[a.id,a]));
  state.currentData.expenses.forEach(e=>{
    const total=Number(e.amount||0);
    let fundedAmount=0;
    (e.fundAllocations||[]).forEach(x=>{
      const fund=advancesById[x.advanceId], value=Number(x.amount||0);
      if(fund && paid.hasOwnProperty(fund.ownerId)){
        paid[fund.ownerId]+=value;
        fundedAmount+=value;
      }
    });
    const personalAmount=Math.max(0,round2(total-fundedAmount));
    if(personalAmount>0.001){
      if(e.paidBy && paid.hasOwnProperty(e.paidBy)) paid[e.paidBy]+=personalAmount;
      else { unassignedCount++; unassignedTotal+=personalAmount; }
    }
    const participants = (e.splitWith && e.splitWith.length) ? e.splitWith.filter(id=>owed.hasOwnProperty(id)) : people.map(p=>p.id);
    if(!participants.length) return;
    const share = total / participants.length;
    participants.forEach(id=>{ owed[id] += share; });
  });
  (state.currentData.advances||[]).forEach(a=>{ if(funded.hasOwnProperty(a.ownerId)) funded[a.ownerId]+=Number(a.amount||0); });
  const net = {};
  people.forEach(p=>{ net[p.id] = round2(paid[p.id] - owed[p.id]); });
  return { paid, owed, funded, net, unassignedCount, unassignedTotal };
}
function round2(n){ return Math.round(n*100)/100; }

function simplifyDebts(net){
  const creditors = [], debtors = [];
  Object.entries(net).forEach(([id, amt])=>{
    if(amt > 0.01) creditors.push({id, amt});
    else if(amt < -0.01) debtors.push({id, amt:-amt});
  });
  creditors.sort((a,b)=>b.amt-a.amt);
  debtors.sort((a,b)=>b.amt-a.amt);
  const settlements = [];
  let i=0, j=0;
  while(i<debtors.length && j<creditors.length){
    const pay = Math.min(debtors[i].amt, creditors[j].amt);
    settlements.push({from:debtors[i].id, to:creditors[j].id, amount: round2(pay)});
    debtors[i].amt -= pay;
    creditors[j].amt -= pay;
    if(debtors[i].amt < 0.01) i++;
    if(creditors[j].amt < 0.01) j++;
  }
  return settlements;
}

function deleteCategory(key){
  const cats = state.currentData.budgetCategories;
  if(cats.length<=1){ alert('Tem de existir pelo menos uma categoria.'); return; }
  const count = state.currentData.expenses.filter(e=>e.categoryKey===key).length;
  const fallback = cats.find(c=>c.key!==key);
  const msg = count>0
    ? `${count} despesa(s) usam esta categoria. Vão passar para "${fallback.label}". Eliminar mesmo assim?`
    : 'Eliminar esta categoria?';
  if(!confirm(msg)) return;
  markDeleted('budgetCategories', key);
  state.currentData.budgetCategories = cats.filter(c=>c.key!==key);
  state.currentData.expenses.forEach(e=>{ if(e.categoryKey===key) e.categoryKey = fallback.key; });
  persistCurrentTrip();
  closeModal();
  renderOrcamento(document.getElementById('panelContent'));
}

let currentSearchResults = [];
function searchTripData(query){
  const q = query.trim().toLowerCase();
  if(!q || !state.currentData) return [];
  const d = state.currentData;
  const results = [];
  d.locations.forEach(l=>{
    const hay = [l.name, l.notes, l.address].filter(Boolean).join(' ').toLowerCase();
    if(hay.includes(q)){
      const v = locationPinVisual(l);
      results.push({type:'location', id:l.id, title:l.name, meta:l.address||l.notes||v.label, icon:v.icon});
    }
  });
  d.bookings.forEach(b=>{
    const hay = [b.provider,b.code,b.flightNumber,b.notes].filter(Boolean).join(' ').toLowerCase();
    if(hay.includes(q)){
      const c = BOOKING_CATEGORIES.find(x=>x.key===b.category)||BOOKING_CATEGORIES[4];
      results.push({type:'booking', id:b.id, title:b.provider||c.label, meta:[b.code,b.flightNumber].filter(Boolean).join(' · ')||c.label, icon:c.icon});
    }
  });
  d.expenses.forEach(e=>{
    if((e.description||'').toLowerCase().includes(q)){
      const c = catInfo(e.categoryKey);
      results.push({type:'expense', id:e.id, title:e.description||c.label, meta:`${fmtMoney(e.amount, d.info.currency)} · ${c.label}`, icon:c.icon});
    }
  });
  d.tasks.forEach(t=>{
    if((t.title||'').toLowerCase().includes(q)) results.push({type:'task', id:t.id, title:t.title, meta:t.done?'Concluída':'Pendente', icon:'✅'});
  });
  (d.packingLists||[]).forEach(list=>{
    (list.items||[]).forEach(i=>{
      if((i.name||'').toLowerCase().includes(q)) results.push({type:'packing', id:i.id, listId:list.id, title:i.name, meta:'Lista: '+list.name, icon:list.icon||'🎒'});
    });
  });
  return results;
}

function goToSearchResult(i){
  const r = currentSearchResults[i];

async function deleteCurrentTrip(){
  if(!confirm('Eliminar esta viagem e todos os seus dados? Esta ação não pode ser desfeita.')) return;
  const id = state.currentTripId;
  if(!state.deletedTripIds.includes(id)) state.deletedTripIds.push(id);
  await deviceSet('deleted-trip-ids', JSON.stringify(state.deletedTripIds));
  state.trips = state.trips.filter(t=>t.id!==id);
  await saveTripsIndex(state.trips);
  await deleteTripData(id);
  schedulePush();
  if(state.trips.length){
    state.currentTripId = state.trips[0].id;
    state.currentData = ensureShape(await getTripData(state.currentTripId));
  } else {
    state.currentTripId = null;
    state.currentData = null;
  }
  closeModal();
  renderHeader();
  renderCurrentTab();
}

function initMiniMap(){
  const el = document.getElementById('miniMap');
  if(!el || typeof L==='undefined') return;
  if(miniMapInstance){ try{ miniMapInstance.remove(); }catch(e){} }
  miniMapMarker = null;
  const start = state.modalPendingLatLon || {lat:20, lon:0};
  miniMapInstance = L.map(el, {attributionControl:false, minZoom:2, maxZoom:19}).setView([start.lat, start.lon], state.modalPendingLatLon?15:2);
  offlineTileLayer().addTo(miniMapInstance);
  if(state.modalPendingLatLon) placeMiniMapMarker(state.modalPendingLatLon.lat, state.modalPendingLatLon.lon, {reverseGeocode:false});
  miniMapInstance.on('click', e=>placeMiniMapMarker(e.latlng.lat, e.latlng.lng, {reverseGeocode:true}));
  setTimeout(()=>{ if(miniMapInstance) miniMapInstance.invalidateSize(); }, 0);
}
function placeMiniMapMarker(lat, lon, opts){
  opts = opts || {};
  state.modalPendingLatLon = {lat, lon};
  if(!miniMapMarker){
    miniMapMarker = L.marker([lat,lon], {draggable:true}).addTo(miniMapInstance);
    miniMapMarker.on('dragend', ()=>{ const p=miniMapMarker.getLatLng(); placeMiniMapMarker(p.lat, p.lng, {reverseGeocode:true}); });
  } else {
    miniMapMarker.setLatLng([lat,lon]);
  }
  const hint = document.getElementById('miniMapHint');
  if(hint) hint.textContent = 'Arrasta o pin para afinar a posição exata — a morada atualiza-se sozinha.';
  if(opts.recenter) miniMapInstance.setView([lat,lon], 15);
  if(opts.reverseGeocode) reverseGeocodeIntoAddressField(lat, lon);
}
async function reverseGeocodeIntoAddressField(lat, lon){
  const addrInput = document.getElementById('l_address'), nameInput = document.getElementById('l_name'), hint = document.getElementById('miniMapHint');
  if(!addrInput) return;
  try{
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&zoom=18`, {headers:{'Accept-Language':'pt-PT,pt;q=0.9,en;q=0.7'}});
    if(res.ok){
      const data = await res.json();
      if(data && data.display_name){
        addrInput.value = data.display_name;
        if(!nameInput.value.trim()) nameInput.value = data.name || data.display_name.split(',')[0];
      }
    }
  }catch(err){
    if(hint) hint.textContent = 'Posição guardada, mas sem internet para ir buscar a morada agora.';
  }
}

      </div>
      <div class="field"><label>Local associado</label>
        <select id="e_loc"><option value="">— nenhum —</option>${locs.map(l=>`<option value="${l.id}" ${exp.locationId===l.id?'selected':''}>${escapeHtml(l.name)}</option>`).join('')}</select>
      </div>
    </div>
    <div class="field"><label>Reserva associada (opcional)</label>
      <select id="e_booking"><option value="">— nenhuma —</option>${bookings.map(b=>`<option value="${b.id}" ${exp.bookingId===b.id?'selected':''}>${escapeHtml((b.dateFrom?fmtDateShort(b.dateFrom)+' · ':'')+(b.provider||(BOOKING_CATEGORIES.find(c=>c.key===b.category)||{}).label||'Reserva'))}</option>`).join('')}</select>
    </div>
    ${people.length ? `
      ${(state.currentData.advances||[]).length ? `<div class="field"><div style="padding:11px 12px;border:1px solid var(--border);border-radius:8px;background:var(--panel-alt);font-size:12px;color:var(--text-dim);line-height:1.5;"><strong style="color:var(--text)">Uso automático do Fundo de viagem</strong><br>Esta despesa utilizará automaticamente todo o saldo disponível, começando pelo fundo mais antigo. Só o valor que faltar será atribuído à carteira pessoal.</div></div>` : ''}
      <div class="field"><label>Pago/realizado por</label>
        <select id="e_paidby"><option value="">— não especificado —</option>${people.map(p=>`<option value="${p.id}" ${exp.paidBy===p.id?'selected':''}>${escapeHtml(p.name)}</option>`).join('')}</select>
      </div>
      <div class="field">
        <label>Dividir com</label>
        <div style="display:flex; flex-wrap:wrap; gap:12px;">
          ${people.map(p=>`
            <label style="display:flex; align-items:center; gap:6px; font-size:13.5px; font-family:var(--font-body);">
              <input type="checkbox" class="e_split" value="${p.id}" ${splitWith.includes(p.id)?'checked':''}> ${escapeHtml(p.name)}
            </label>
          `).join('')}
        </div>
        <p style="font-size:11.5px; color:var(--text-dim); margin:2px 0 0;">Por definição divide-se por igual entre quem selecionares.</p>
      </div>
    ` : `<p style="font-size:12px; color:var(--text-dim);">Adiciona pessoas na aba "Saldo" para poderes indicar quem pagou e dividir despesas.</p>`}
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="saveExpBtn">${editing?'Guardar':'Adicionar'}</button>
    </div>
  `);
  document.getElementById('e_now_btn').addEventListener('click', ()=>{
    const now = new Date();
    document.getElementById('e_date').value = todayLocalISO();
    document.getElementById('e_time').value = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  });
  document.getElementById('e_booking').addEventListener('change', (e)=>{
    const booking = bookings.find(b=>b.id===e.target.value);
    if(!booking) return;
    const suggested = BOOKING_TO_EXPENSE_CATEGORY[booking.category];
    if(suggested) document.getElementById('e_cat').value = suggested;
  });
  let convertTimer = null;
  function scheduleConversionHint(){
    clearTimeout(convertTimer);
    convertTimer = setTimeout(updateExpenseConversionHint, 300);
  }
  document.getElementById('e_amount').addEventListener('input', scheduleConversionHint);
  document.getElementById('e_curr').addEventListener('change', scheduleConversionHint);
  updateExpenseConversionHint();
  document.getElementById('saveExpBtn').addEventListener('click', async ()=>{
    const rawAmount = Number(document.getElementById('e_amount').value);
    if(!rawAmount || rawAmount<=0){ alert('Indica um valor válido.'); return; }
    const tripCurrency = state.currentData.info.currency;
    const selectedCurrency = document.getElementById('e_curr').value;
    let amount = rawAmount, origAmount = null, origCurrency = null;
    if(selectedCurrency !== tripCurrency){
      const saveBtn = document.getElementById('saveExpBtn');
      saveBtn.disabled = true; saveBtn.textContent = 'A converter…';
      try{
        const rate = await getExchangeRate(selectedCurrency, tripCurrency);
        amount = round2(rawAmount*rate);
        origAmount = rawAmount; origCurrency = selectedCurrency;
      }catch(e){
        saveBtn.disabled = false; saveBtn.textContent = editing?'Guardar':'Adicionar';
        alert(`Não foi possível converter ${selectedCurrency} para ${tripCurrency} agora (sem internet?). Muda a moeda para ${tripCurrency} ou tenta novamente.`);
        return;
      }
      saveBtn.disabled = false; saveBtn.textContent = editing?'Guardar':'Adicionar';
    }
    const paidByEl = document.getElementById('e_paidby');
    const splitEls = document.querySelectorAll('.e_split:checked');
    const payload = {
      date: document.getElementById('e_date').value,
      time: document.getElementById('e_time').value,
      categoryKey: document.getElementById('e_cat').value,
      description: document.getElementById('e_desc').value.trim(),
      amount, origAmount, origCurrency,
      locationId: document.getElementById('e_loc').value || null,
      bookingId: document.getElementById('e_booking').value || null,
      paidBy: paidByEl ? (paidByEl.value || null) : null,
      splitWith: splitEls ? [...splitEls].map(el=>el.value) : [],
    };
    const autoPayment=allocateFundsAutomatically(amount, editing ? exp.id : null);
    payload.fundAllocations=autoPayment.allocations;
    if(autoPayment.personalAmount<=0.001) payload.paidBy=null;
    if(editing){ Object.assign(exp, payload); }
    else { state.currentData.expenses.push({id:uid(), ...payload}); }
    persistCurrentTrip();
    closeModal();
    renderDespesas(document.getElementById('panelContent'));
  });
}

function bootApp(){
  init().catch(err=>{
    console.error('Erro inesperado no arranque:', err);
    try { bindGlobalEvents(); } catch(_) {}
    try { setSyncStatus('A app arrancou com limitações, mas os controlos continuam disponíveis.'); } catch(_) {}
  });
}
if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', bootApp, {once:true});
else bootApp();
</script>
</body>
</html>
