/* ============================= SALDO (quem pagou / quem deve) ============================= */
function personName(id){
  const p = state.currentData.people.find(x=>x.id===id);
  return p ? p.name : null;
}

function advanceUsage(excludeExpenseId=null){
  const usage={}; (state.currentData.advances||[]).forEach(a=>usage[a.id]=0);
  state.currentData.expenses.forEach(e=>{
    if(e.id===excludeExpenseId) return;
    (e.fundAllocations||[]).forEach(x=>{
      if(usage.hasOwnProperty(x.advanceId)) usage[x.advanceId]+=Number(x.amount||0);
    });
  });
  return usage;
}
function allocateFundsAutomatically(amount, excludeExpenseId=null){
  let remaining=round2(Number(amount||0));
  const usage=advanceUsage(excludeExpenseId);
  const funds=[...(state.currentData.advances||[])].sort((a,b)=>
    String(a.date||'9999-12-31').localeCompare(String(b.date||'9999-12-31'))
  );
  const allocations=[];
  for(const fund of funds){
    if(remaining<=0.001) break;
    const available=Math.max(0, round2(Number(fund.amount||0)-Number(usage[fund.id]||0)));
    if(available<=0.001) continue;
    const used=round2(Math.min(available,remaining));
    allocations.push({advanceId:fund.id, amount:used});
    remaining=round2(remaining-used);
  }
  return {allocations, personalAmount:Math.max(0,remaining)};
}
function computeBalances(){
  const people = state.currentData.people;
  const paid = {}, owed = {}, funded = {};
  people.forEach(p=>{ paid[p.id]=0; owed[p.id]=0; funded[p.id]=0; });
  let unassignedCount = 0, unassignedTotal = 0;
  const advancesById=Object.fromEntries((state.currentData.advances||[]).map(a=>[a.id,a]));
  state.currentData.expenses.forEach(e=>{
    const total=Number(e.amount||0);
    let fundedAmount=0;
    (e.fundAllocations||[]).forEach(x=>{
      const fund=advancesById[x.advanceId], value=Number(x.amount||0);
      if(fund && paid.hasOwnProperty(fund.ownerId)){
        paid[fund.ownerId]+=value;
        fundedAmount+=value;
      }
    });
    const personalAmount=Math.max(0,round2(total-fundedAmount));
    if(personalAmount>0.001){
      if(e.paidBy && paid.hasOwnProperty(e.paidBy)) paid[e.paidBy]+=personalAmount;
      else { unassignedCount++; unassignedTotal+=personalAmount; }
    }
    const participants = (e.splitWith && e.splitWith.length) ? e.splitWith.filter(id=>owed.hasOwnProperty(id)) : people.map(p=>p.id);
    if(!participants.length) return;
    const share = total / participants.length;
    participants.forEach(id=>{ owed[id] += share; });
  });
  (state.currentData.advances||[]).forEach(a=>{ if(funded.hasOwnProperty(a.ownerId)) funded[a.ownerId]+=Number(a.amount||0); });
  const net = {};
  people.forEach(p=>{ net[p.id] = round2(paid[p.id] - owed[p.id]); });
  return { paid, owed, funded, net, unassignedCount, unassignedTotal };
}
function round2(n){ return Math.round(n*100)/100; }

function simplifyDebts(net){
  const creditors = [], debtors = [];
  Object.entries(net).forEach(([id, amt])=>{
    if(amt > 0.01) creditors.push({id, amt});
    else if(amt < -0.01) debtors.push({id, amt:-amt});
  });
  creditors.sort((a,b)=>b.amt-a.amt);
  debtors.sort((a,b)=>b.amt-a.amt);
  const settlements = [];
  let i=0, j=0;
  while(i<debtors.length && j<creditors.length){
    const pay = Math.min(debtors[i].amt, creditors[j].amt);
    settlements.push({from:debtors[i].id, to:creditors[j].id, amount: round2(pay)});
    debtors[i].amt -= pay;
    creditors[j].amt -= pay;
    if(debtors[i].amt < 0.01) i++;
    if(creditors[j].amt < 0.01) j++;
  }
  return settlements;
}

function renderSaldoDetails(){
  const people = state.currentData.people;
  const currency = state.currentData.info.currency;
  const { paid, owed, funded, net, unassignedCount, unassignedTotal } = computeBalances();
  const settlements = simplifyDebts(net);

  return `
    <div class="stat-row" style="grid-template-columns:repeat(${Math.min(people.length,4)},1fr);">
      ${people.map(p=>`
        <div class="stat-card">

        </div>

    </div>

    <h4 style="font-family:var(--font-mono); font-size:11.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim); margin:22px 0 12px;">Para acertar contas</h4>
    ${settlements.length ? settlements.map(s=>`
      <div class="ticket">
        <div class="cat-chip" style="background:#4FA39A22; border:1px solid #4FA39A55;">💸</div>
        <div class="info">
          <div class="desc">${escapeHtml(personName(s.from))} → ${escapeHtml(personName(s.to))}</div>
          <div class="meta">Para ficarem equilibrados</div>
        </div>
        <div class="amount">${fmtMoney(s.amount, currency)}</div>

function addPerson(){
  const input = document.getElementById('newPersonName');
  const name = input.value.trim();
  if(!name) return;
  state.currentData.people.push({id:uid(), name});
  persistCurrentTrip();
  renderSaldo(document.getElementById('panelContent'));
}
function removePerson(id){
  if((state.currentData.advances||[]).some(a=>a.ownerId===id)){ alert('Esta pessoa financia um fundo. Elimina o fundo primeiro.'); return; }
  if(!confirm('Remover esta pessoa? As despesas ficam sem "pago por" se estavam associadas a ela.')) return;
  markDeleted('people', id);
  state.currentData.people = state.currentData.people.filter(p=>p.id!==id);
  state.currentData.expenses.forEach(e=>{
    if(e.paidBy===id) e.paidBy = null;

  });
  persistCurrentTrip();
  renderSaldo(document.getElementById('panelContent'));
}

/* ============================= ORÇAMENTO ============================= */
function renderOrcamento(el){
  const info = state.currentData.info;

  const expenses = state.currentData.expenses;
  const totalBudget = Number(info.budgetTotal||0);
  const allocated = cats.reduce((s,c)=>s+Number(c.planned||0),0);
  const free = totalBudget - allocated;

  el.innerHTML = `
    <h2 class="section-title">Orçamento</h2>
    <div class="budget-total-row">
      <label>Orçamento total da viagem</label>
      <input type="number" min="0" step="10" id="budgetTotalInput" value="${info.budgetTotal||0}" style="width:150px;">
      <span style="color:var(--text-dim); font-size:13px;">${info.currency}</span>
      <button class="btn btn-sm" id="saveBudgetTotalBtn">Guardar</button>
    </div>
    ${totalBudget>0 ? `
    <div class="stat-row">
      <div class="stat-card"><div class="label">Orçamento total</div><div class="value">${fmtMoney(totalBudget, info.currency)}</div></div>
      <div class="stat-card"><div class="label">Atribuído a categorias</div><div class="value">${fmtMoney(allocated, info.currency)}</div></div>
      <div class="stat-card"><div class="label">${free<0?'Categorias acima do total':'Orçamento livre'}</div><div class="value ${free<0?'over':'ok'}">${fmtMoney(Math.abs(free), info.currency)}</div></div>
    </div>
    <p style="font-size:12.5px; color:var(--text-dim); margin:-14px 0 20px; line-height:1.5;">
      ${free<0
        ? 'As categorias juntas ultrapassam o orçamento total — ajusta os valores abaixo ou aumenta o orçamento total.'
        : 'Orçamento livre é o que ainda não atribuíste a nenhuma categoria — dá para gastar onde precisares, sem categoria fixa.'}
    </p>` : ''}

    <div class="flex-head" style="margin-bottom:10px;">
      <h3 class="section-title" style="font-size:16px; margin:0;">Categorias</h3>
      <button class="btn btn-sm" onclick="openCategoryModal('create')">+ Nova categoria</button>
    </div>
    <div id="catBudgetRows">
      ${cats.map(c=>{
        const spent = expenses.filter(e=>e.categoryKey===c.key).reduce((s,e)=>s+Number(e.amount||0),0);
        const planned = Number(c.planned||0);
        const pct = planned>0 ? Math.min(100, Math.round((spent/planned)*100)) : (spent>0?100:0);
        const over = planned>0 && spent>planned;
        return `
        <div class="cat-budget-row">
          <div class="cat-budget-head">
            <div class="name">${c.icon} ${c.label}</div>
            <div class="nums">
              ${fmtMoney(spent, info.currency)} / <input class="cat-input" data-cat="${c.key}" type="number" min="0" step="5" value="${planned}"> ${info.currency}
              <button type="button" class="icon-btn" title="Editar categoria" onclick="openCategoryModal('edit','${c.key}')" style="margin-left:6px;">✎</button>
            </div>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:${over?'var(--coral)':c.color};"></div></div>
        </div>`;
      }).join('')}
    </div>
    <div class="modal-actions" style="justify-content:flex-start; margin-top:20px;">
      <button class="btn btn-primary" id="saveCatsBtn">Guardar categorias</button>
    </div>
  `;

  document.getElementById('saveBudgetTotalBtn').addEventListener('click', ()=>{
    const val = Number(document.getElementById('budgetTotalInput').value)||0;
    state.currentData.info.budgetTotal = val;
    updateTripIndexEntry();
    persistCurrentTrip();
    renderHeader();
  });
  document.getElementById('saveCatsBtn').addEventListener('click', ()=>{
    document.querySelectorAll('.cat-input').forEach(inp=>{
      const key = inp.dataset.cat;
      const val = Number(inp.value)||0;
      const entry = state.currentData.budgetCategories.find(c=>c.key===key);
      if(entry) entry.planned = val;
    });

    renderOrcamento(document.getElementById('panelContent'));
  });

function nextAvailableCategoryColor(){
  const used = new Set(getCategories().map(c=>c.color));

}

      Object.assign(c, {label, icon, color:selectedColor});

      state.currentData.budgetCategories.push({id:newKey, key:newKey, label, icon, color:selectedColor, planned:0});

function deleteCategory(key){
  const cats = state.currentData.budgetCategories;
  if(cats.length<=1){ alert('Tem de existir pelo menos uma categoria.'); return; }
  const count = state.currentData.expenses.filter(e=>e.categoryKey===key).length;
  const fallback = cats.find(c=>c.key!==key);
  const msg = count>0
    ? `${count} despesa(s) usam esta categoria. Vão passar para "${fallback.label}". Eliminar mesmo assim?`
    : 'Eliminar esta categoria?';
  if(!confirm(msg)) return;
  state.currentData.budgetCategories = cats.filter(c=>c.key!==key);
  state.currentData.expenses.forEach(e=>{ if(e.categoryKey===key) e.categoryKey = fallback.key; });
  persistCurrentTrip();
  closeModal();
  renderOrcamento(document.getElementById('panelContent'));
}

/* ============================= PERSIST HELPERS ============================= */
async function persistCurrentTrip(){
  if(!state.currentTripId) return;
  await saveTripData(state.currentTripId, state.currentData);
  setSyncStatus(syncConfigured() ? (navigator.onLine?'Alterações guardadas · sincronização pendente':'Modo offline · sincronizar mais tarde') : 'Guardado neste dispositivo');
  schedulePush();
}
async function updateTripIndexEntry(){
  const idx = state.trips.findIndex(t=>t.id===state.currentTripId);
  if(idx>-1){
    state.trips[idx] = {...state.trips[idx], ...pickIndexFields(state.currentData.info)};
    await saveTripsIndex(state.trips);
    schedulePush();
  }
}
function pickIndexFields(info){
  return {id:info.id, name:info.name, destination:info.destination, startDate:info.startDate, endDate:info.endDate, currency:info.currency, budgetTotal:info.budgetTotal};
}

async function deleteCurrentTrip(){
  if(!confirm('Eliminar esta viagem e todos os seus dados? Esta ação não pode ser desfeita.')) return;
  const id = state.currentTripId;
  if(!state.deletedTripIds.includes(id)) state.deletedTripIds.push(id);
  await deviceSet('deleted-trip-ids', JSON.stringify(state.deletedTripIds));
  state.trips = state.trips.filter(t=>t.id!==id);
  await saveTripsIndex(state.trips);
  await deleteTripData(id);
  schedulePush();
  if(state.trips.length){
    state.currentTripId = state.trips[0].id;
    state.currentData = ensureShape(await getTripData(state.currentTripId));
  } else {
    state.currentTripId = null;
    state.currentData = null;
  }
  closeModal();
  renderHeader();
  renderCurrentTab();
}

function initMiniMap(){
  const el = document.getElementById('miniMap');
  if(!el || typeof L==='undefined') return;
  if(miniMapInstance){ try{ miniMapInstance.remove(); }catch(e){} }
  miniMapMarker = null;
  const start = state.modalPendingLatLon || {lat:20, lon:0};
  miniMapInstance = L.map(el, {attributionControl:false, minZoom:2, maxZoom:19}).setView([start.lat, start.lon], state.modalPendingLatLon?15:2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19}).addTo(miniMapInstance);
  if(state.modalPendingLatLon) placeMiniMapMarker(state.modalPendingLatLon.lat, state.modalPendingLatLon.lon, {reverseGeocode:false});
  miniMapInstance.on('click', e=>placeMiniMapMarker(e.latlng.lat, e.latlng.lng, {reverseGeocode:true}));
  setTimeout(()=>{ if(miniMapInstance) miniMapInstance.invalidateSize(); }, 0);
}
function placeMiniMapMarker(lat, lon, opts){
  opts = opts || {};
  state.modalPendingLatLon = {lat, lon};
  if(!miniMapMarker){
    miniMapMarker = L.marker([lat,lon], {draggable:true}).addTo(miniMapInstance);
    miniMapMarker.on('dragend', ()=>{ const p=miniMapMarker.getLatLng(); placeMiniMapMarker(p.lat, p.lng, {reverseGeocode:true}); });
  } else {
    miniMapMarker.setLatLng([lat,lon]);
  }
  const hint = document.getElementById('miniMapHint');
  if(hint) hint.textContent = 'Arrasta o pin para afinar a posição exata — a morada atualiza-se sozinha.';
  if(opts.recenter) miniMapInstance.setView([lat,lon], 15);
  if(opts.reverseGeocode) reverseGeocodeIntoAddressField(lat, lon);
}
async function reverseGeocodeIntoAddressField(lat, lon){
  const addrInput = document.getElementById('l_address'), nameInput = document.getElementById('l_name'), hint = document.getElementById('miniMapHint');
  if(!addrInput) return;
  try{
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&zoom=18`, {headers:{'Accept-Language':'pt-PT,pt;q=0.9,en;q=0.7'}});
    if(res.ok){
      const data = await res.json();
      if(data && data.display_name){
        addrInput.value = data.display_name;
        if(!nameInput.value.trim()) nameInput.value = data.name || data.display_name.split(',')[0];
      }
    }
  }catch(err){
    if(hint) hint.textContent = 'Posição guardada, mas sem internet para ir buscar a morada agora.';
  }
}

async function searchAddressForLocation(){
  const q=document.getElementById('l_address').value.trim(), box=document.getElementById('addressResults');

}

      <div class="field"><label>Valor (${state.currentData.info.currency})</label><input type="number" min="0" step="0.01" id="e_amount" value="${exp.amount}"></div>
      <div class="field"><label>Local associado</label>
        <select id="e_loc"><option value="">— nenhum —</option>${locs.map(l=>`<option value="${l.id}" ${exp.locationId===l.id?'selected':''}>${escapeHtml(l.name)}</option>`).join('')}</select>
      </div>
    </div>
    <div class="field"><label>Reserva associada (opcional)</label>
      <select id="e_booking"><option value="">— nenhuma —</option>${bookings.map(b=>`<option value="${b.id}" ${exp.bookingId===b.id?'selected':''}>${escapeHtml((b.dateFrom?fmtDateShort(b.dateFrom)+' · ':'')+(b.provider||(BOOKING_CATEGORIES.find(c=>c.key===b.category)||{}).label||'Reserva'))}</option>`).join('')}</select>
    </div>
    ${people.length ? `
      ${(state.currentData.advances||[]).length ? `<div class="field"><div style="padding:11px 12px;border:1px solid var(--border);border-radius:8px;background:var(--panel-alt);font-size:12px;color:var(--text-dim);line-height:1.5;"><strong style="color:var(--text)">Uso automático do Fundo de viagem</strong><br>Esta despesa utilizará automaticamente todo o saldo disponível, começando pelo fundo mais antigo. Só o valor que faltar será atribuído à carteira pessoal.</div></div>` : ''}
      <div class="field"><label>Pago/realizado por</label>
        <select id="e_paidby"><option value="">— não especificado —</option>${people.map(p=>`<option value="${p.id}" ${exp.paidBy===p.id?'selected':''}>${escapeHtml(p.name)}</option>`).join('')}</select>
      </div>
      <div class="field">
        <label>Dividir com</label>
        <div style="display:flex; flex-wrap:wrap; gap:12px;">
          ${people.map(p=>`
            <label style="display:flex; align-items:center; gap:6px; font-size:13.5px; font-family:var(--font-body);">
              <input type="checkbox" class="e_split" value="${p.id}" ${splitWith.includes(p.id)?'checked':''}> ${escapeHtml(p.name)}
            </label>
          `).join('')}
        </div>
        <p style="font-size:11.5px; color:var(--text-dim); margin:2px 0 0;">Por definição divide-se por igual entre quem selecionares.</p>
      </div>
    ` : `<p style="font-size:12px; color:var(--text-dim);">Adiciona pessoas na aba "Saldo" para poderes indicar quem pagou e dividir despesas.</p>`}
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="saveExpBtn">${editing?'Guardar':'Adicionar'}</button>
    </div>
  `);
  document.getElementById('e_booking').addEventListener('change', (e)=>{
    const booking = bookings.find(b=>b.id===e.target.value);
    if(!booking) return;
    const suggested = BOOKING_TO_EXPENSE_CATEGORY[booking.category];
    if(suggested) document.getElementById('e_cat').value = suggested;
  });
  document.getElementById('saveExpBtn').addEventListener('click', ()=>{
    const amount = Number(document.getElementById('e_amount').value);
    if(!amount || amount<=0){ alert('Indica um valor válido.'); return; }
    const paidByEl = document.getElementById('e_paidby');
    const splitEls = document.querySelectorAll('.e_split:checked');
    const payload = {
      date: document.getElementById('e_date').value,
      categoryKey: document.getElementById('e_cat').value,
      description: document.getElementById('e_desc').value.trim(),
      amount,
      locationId: document.getElementById('e_loc').value || null,
      bookingId: document.getElementById('e_booking').value || null,
      paidBy: paidByEl ? (paidByEl.value || null) : null,
      splitWith: splitEls ? [...splitEls].map(el=>el.value) : [],
    };
    const autoPayment=allocateFundsAutomatically(amount, editing ? exp.id : null);
    payload.fundAllocations=autoPayment.allocations;
    if(autoPayment.personalAmount<=0.001) payload.paidBy=null;
    if(editing){ Object.assign(exp, payload); }
    else { state.currentData.expenses.push({id:uid(), ...payload}); }
    persistCurrentTrip();
    closeModal();
    renderDespesas(document.getElementById('panelContent'));
  });
}

function bootApp(){
  init().catch(err=>{
    console.error('Erro inesperado no arranque:', err);
    try { bindGlobalEvents(); } catch(_) {}
    try { setSyncStatus('A app arrancou com limitações, mas os controlos continuam disponíveis.'); } catch(_) {}
  });
}
if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', bootApp, {once:true});
else bootApp();
</script>
</body>
</html>
