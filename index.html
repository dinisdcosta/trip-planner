<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diário de Viagem V3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#0F1B2B;
  --bg-alt:#0B141F;
  --panel:#152437;
  --panel-alt:#1C3049;
  --linen:#F1E8D3;
  --linen-dim:#DCD2B6;
  --gold:#C9A24D;
  --gold-dim:#8C7239;
  --teal:#4FA39A;
  --coral:#C1573E;
  --sage:#86AE8C;
  --slate-blue:#7C97B8;
  --mauve:#A9829F;
  --text:#EDE6D3;
  --text-dim:#93A5BB;
  --border:rgba(237,230,211,0.14);
  --font-display:'Fraunces', serif;
  --font-body:'IBM Plex Sans', sans-serif;
  --font-mono:'IBM Plex Mono', monospace;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(ellipse 900px 500px at 10% -10%, rgba(79,163,154,0.10), transparent 60%),
    radial-gradient(ellipse 700px 500px at 100% 0%, rgba(201,162,77,0.08), transparent 55%),
    var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

.app{max-width:1180px;margin:0 auto;padding:28px 20px 80px;}

.header{
  display:flex; align-items:flex-end; justify-content:space-between; gap:20px;
  flex-wrap:wrap; margin-bottom:22px; padding-bottom:18px; border-bottom:1px solid var(--border);
}
.brand{display:flex; flex-direction:column; gap:2px;}
.brand .eyebrow{
  font-family:var(--font-mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase;
  color:var(--gold); opacity:.9;
}
.brand h1{
  font-family:var(--font-display); font-weight:600; font-size:clamp(28px,4vw,40px); margin:2px 0 0;
  letter-spacing:-0.01em;
}
.trip-picker{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
select, input, textarea{
  font-family:var(--font-body); background:var(--panel-alt); color:var(--text);
  border:1px solid var(--border); border-radius:8px; padding:9px 12px; font-size:14px;
}
select:focus, input:focus, textarea:focus{outline:2px solid var(--gold); outline-offset:1px;}
.btn{
  font-family:var(--font-mono); font-size:12.5px; letter-spacing:.03em; text-transform:uppercase;
  border:1px solid var(--border); background:var(--panel-alt); color:var(--text);
  padding:10px 16px; border-radius:8px; cursor:pointer; transition:transform .12s ease, background .12s ease, border-color .12s ease;
  white-space:nowrap;
}
.btn:hover{background:#233a58; transform:translateY(-1px);}
.btn:focus-visible{outline:2px solid var(--gold); outline-offset:2px;}
.btn-primary{background:var(--gold); color:#20160A; border-color:var(--gold); font-weight:600;}
.btn-primary:hover{background:#DAB65E;}
.btn-ghost{background:transparent;}
.btn-danger{color:var(--coral); border-color:rgba(193,87,62,.5);}
.btn-danger:hover{background:rgba(193,87,62,.12);}
.btn-sm{padding:6px 10px; font-size:11px;}
.icon-btn{background:transparent; border:none; color:var(--text-dim); cursor:pointer; font-size:15px; padding:4px 6px; border-radius:6px;}
.icon-btn:hover{color:var(--text); background:var(--panel-alt);}

.tabs{display:flex; gap:6px; margin-bottom:24px; overflow-x:auto; padding-bottom:2px;}
.tab{
  font-family:var(--font-mono); font-size:12.5px; letter-spacing:.04em; text-transform:uppercase;
  padding:11px 18px; border-radius:10px 10px 0 0; cursor:pointer; color:var(--text-dim);
  background:var(--panel); border:1px solid var(--border); border-bottom:none; white-space:nowrap;
}
.tab.active{color:var(--gold); background:var(--panel-alt); box-shadow:inset 0 2px 0 var(--gold);}

.panel{background:var(--panel); border:1px solid var(--border); border-radius:0 12px 12px 12px; padding:26px; animation:fade .25s ease;}
@keyframes fade{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}

.empty{
  text-align:center; padding:70px 20px; color:var(--text-dim);
}
.empty h2{font-family:var(--font-display); color:var(--text); font-weight:600; font-size:24px; margin-bottom:8px;}
.empty p{max-width:420px; margin:0 auto 20px; font-size:14.5px; line-height:1.6;}

.section-title{
  font-family:var(--font-display); font-weight:600; font-size:20px; margin:0 0 16px;
  display:flex; align-items:center; gap:8px;
}
.stat-row{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:26px;}
@media (max-width:820px){.stat-row{grid-template-columns:repeat(2,1fr);}}
.stat-card{
  background:var(--panel-alt); border:1px solid var(--border); border-radius:10px; padding:16px 18px;
}
.stat-card .label{font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-dim);}
.stat-card .value{font-family:var(--font-display); font-size:26px; font-weight:600; margin-top:6px;}
.stat-card .value.over{color:var(--coral);}
.stat-card .value.ok{color:var(--sage);}

.hero-progress{display:flex; gap:28px; align-items:center; background:var(--panel-alt); border:1px solid var(--border); border-radius:12px; padding:22px; margin-bottom:26px; flex-wrap:wrap;}
.hero-progress .ring-wrap{position:relative; width:130px; height:130px; flex-shrink:0;}
.hero-progress .ring-label{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
.hero-progress .ring-label .pct{font-family:var(--font-display); font-size:26px; font-weight:700;}
.hero-progress .ring-label .cap{font-family:var(--font-mono); font-size:10px; color:var(--text-dim); text-transform:uppercase;}
.hero-progress .desc{flex:1; min-width:220px;}
.hero-progress .desc h3{font-family:var(--font-display); margin:0 0 8px; font-size:19px;}
.hero-progress .desc p{margin:0; color:var(--text-dim); font-size:14px; line-height:1.6;}

.chart-row{display:grid; grid-template-columns:1.1fr 1.4fr; gap:18px;}
@media (max-width:820px){.chart-row{grid-template-columns:1fr;}}
.chart-card{background:var(--panel-alt); border:1px solid var(--border); border-radius:10px; padding:18px;}
.chart-card h4{font-family:var(--font-mono); font-size:11.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim); margin:0 0 14px;}
.chart-card canvas{max-height:240px;}

.itin-layout{display:grid; grid-template-columns:1fr 1.15fr; gap:20px;}
@media (max-width:900px){.itin-layout{grid-template-columns:1fr;}}
.day-group{margin-bottom:18px;}
.day-group .day-label{font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--gold); margin-bottom:8px;}
.loc-item{
  display:flex; align-items:flex-start; gap:12px; background:var(--panel-alt); border:1px solid var(--border);
  border-radius:9px; padding:12px 14px; margin-bottom:8px;
}
.loc-pin-num{
  font-family:var(--font-mono); font-size:12px; font-weight:600; width:24px; height:24px; border-radius:50%;
  background:var(--gold); color:#20160A; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px;
}
.loc-body{flex:1; min-width:0;}
.loc-body .name{font-weight:600; font-size:14.5px;}
.loc-body .notes{font-size:13px; color:var(--text-dim); margin-top:3px; line-height:1.5;}
.loc-body .spend{font-family:var(--font-mono); font-size:12px; color:var(--teal); margin-top:4px;}
.loc-actions{display:flex; gap:2px; flex-shrink:0;}

.map-canvas{
  position:relative; width:100%; aspect-ratio:784/510; border-radius:12px; overflow:hidden;
  border:1px solid var(--border);
  background:
    radial-gradient(circle at 20% 25%, rgba(79,163,154,0.10), transparent 40%),
    radial-gradient(circle at 75% 15%, rgba(201,162,77,0.09), transparent 38%),
    radial-gradient(circle at 60% 75%, rgba(169,130,159,0.09), transparent 42%),
    var(--bg-alt);
}
.map-canvas.placing{cursor:crosshair;}
.map-canvas svg.routes{position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:1;}
svg.world-bg{position:absolute; inset:0; width:100%; height:100%; z-index:0;}
svg.world-bg path{fill:rgba(124,151,184,0.30); stroke:rgba(237,230,211,0.28); stroke-width:0.6; transition:fill .2s ease;}
svg.world-bg path:hover{fill:rgba(201,162,77,0.35);}
.map-credit{font-size:10.5px; color:var(--text-dim); opacity:.7; margin-top:4px;}
.map-pin{
  position:absolute; transform:translate(-50%,-100%); display:flex; flex-direction:column; align-items:center;
  cursor:pointer; z-index:2;
}
.map-pin .dot{
  width:26px; height:26px; border-radius:50% 50% 50% 0; background:var(--gold); border:2px solid var(--bg-alt);
  transform:rotate(-45deg); display:flex; align-items:center; justify-content:center; box-shadow:0 2px 6px rgba(0,0,0,.4);
}
.map-pin .dot span{transform:rotate(45deg); font-family:var(--font-mono); font-size:11px; font-weight:700; color:#20160A;}
.map-pin:hover .dot{filter:brightness(1.15);}
.map-empty-hint{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center; text-align:center;
  color:var(--text-dim); font-size:13.5px; padding:30px; pointer-events:none;
}
.map-popover{
  position:absolute; transform:translate(-50%,calc(-100% - 32px)); background:var(--panel); border:1px solid var(--border);
  border-radius:9px; padding:12px 14px; width:200px; z-index:5; box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.map-popover h5{margin:0 0 4px; font-family:var(--font-display); font-size:15px;}
.map-popover .day{font-family:var(--font-mono); font-size:10.5px; color:var(--gold); text-transform:uppercase; margin-bottom:6px;}
.map-popover .spend{font-family:var(--font-mono); font-size:13px; color:var(--teal);}
.map-popover .notes{font-size:12.5px; color:var(--text-dim); margin-top:6px; line-height:1.5;}
.map-legend{margin-top:12px; font-size:12px; color:var(--text-dim); display:flex; align-items:center; gap:8px;}

.expense-toolbar{display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap;}
.filter-row{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
.ticket{
  position:relative; display:flex; align-items:center; gap:14px; background:var(--panel-alt);
  border:1px dashed var(--border); border-radius:8px; padding:13px 16px; margin-bottom:10px;
}
.ticket::before, .ticket::after{
  content:""; position:absolute; width:14px; height:14px; border-radius:50%; background:var(--panel); top:50%; transform:translateY(-50%);
}
.ticket::before{left:-8px;} .ticket::after{right:-8px;}
.ticket .cat-chip{
  width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;
}
.ticket .info{flex:1; min-width:0;}
.ticket .info .desc{font-weight:600; font-size:14px;}
.ticket .info .meta{font-family:var(--font-mono); font-size:11.5px; color:var(--text-dim); margin-top:2px;}
.ticket .amount{font-family:var(--font-mono); font-weight:600; font-size:15.5px; white-space:nowrap;}
.ticket .actions{display:flex; gap:0; flex-shrink:0;}

.budget-total-row{display:flex; align-items:center; gap:12px; margin-bottom:22px; flex-wrap:wrap;}
.budget-total-row label{font-family:var(--font-mono); font-size:12px; text-transform:uppercase; color:var(--text-dim);}
.cat-budget-row{margin-bottom:16px;}
.cat-budget-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; gap:10px; flex-wrap:wrap;}
.cat-budget-head .name{display:flex; align-items:center; gap:8px; font-weight:600; font-size:14px;}
.cat-budget-head .nums{font-family:var(--font-mono); font-size:12.5px; color:var(--text-dim);}
.bar-track{height:9px; border-radius:5px; background:#0B141F; overflow:hidden; border:1px solid var(--border);}
.bar-fill{height:100%; border-radius:5px; transition:width .5s ease;}
.cat-input{width:110px;}

.modal-overlay{
  position:fixed; inset:0; background:rgba(4,8,14,.68); display:flex; align-items:center; justify-content:center;
  z-index:50; padding:16px; backdrop-filter:blur(2px);
}
.modal{
  background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:26px; width:100%; max-width:440px;
  max-height:88vh; overflow-y:auto;
}
.modal h3{font-family:var(--font-display); font-size:21px; margin:0 0 18px;}
.field{margin-bottom:14px; display:flex; flex-direction:column; gap:6px;}
.field label{font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-dim);}
.field-row{display:flex; gap:10px;}
.field-row .field{flex:1;}
.modal-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:20px;}
.mini-map{
  width:100%; aspect-ratio:784/510; border-radius:10px; position:relative; overflow:hidden; cursor:crosshair;
  border:1px solid var(--border);
  background:
    radial-gradient(circle at 20% 25%, rgba(79,163,154,0.10), transparent 40%),
    radial-gradient(circle at 75% 15%, rgba(201,162,77,0.09), transparent 38%),
    var(--bg-alt);
}
.mini-map .hint{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:12px; text-align:center; padding:14px; pointer-events:none; z-index:2;}
.mini-map .pin-preview{
  position:absolute; width:20px; height:20px; border-radius:50% 50% 50% 0; background:var(--gold); transform:translate(-50%,-100%) rotate(-45deg);
  border:2px solid var(--bg-alt); z-index:2;
}

::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-thumb{background:var(--panel-alt); border-radius:6px;}
.visually-hidden{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0);}

:root[data-theme="light"]{
  --bg:#F4F7FB; --bg-alt:#EAF0F7; --panel:#FFFFFF; --panel-alt:#F5F8FC;
  --linen:#17324D; --linen-dim:#48627A; --gold:#B97816; --gold-dim:#D7A34E;
  --teal:#147D75; --coral:#C94E43; --sage:#3F8B59; --slate-blue:#5277A3;
  --mauve:#946987; --text:#172B3E; --text-dim:#61758A; --border:rgba(23,43,62,.14);
}
:root[data-theme="light"] body{background:linear-gradient(145deg,#F8FAFD,#EDF3F9 55%,#F8FAFD);}
:root[data-theme="light"] .btn:hover{background:#E7EEF7;}
:root[data-theme="light"] .btn-primary{color:#fff;}
:root[data-theme="light"] .bar-track{background:#E1E8F0;}
:root[data-theme="light"] .ticket::before,:root[data-theme="light"] .ticket::after{background:var(--panel);}
.theme-btn{display:inline-flex;align-items:center;gap:7px;}
.fund-card{background:linear-gradient(135deg,rgba(79,163,154,.12),rgba(201,162,77,.10));border:1px solid var(--border);border-radius:12px;padding:17px;margin-bottom:12px;}
.fund-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.fund-progress{height:8px;background:var(--bg-alt);border-radius:999px;overflow:hidden;margin-top:12px;border:1px solid var(--border);}
.fund-progress>span{display:block;height:100%;background:var(--teal);border-radius:999px;}
.address-search{display:flex;gap:8px;}.address-search input{flex:1;min-width:0;}.search-results{display:grid;gap:7px;margin-top:8px;max-height:190px;overflow:auto;}.search-result{width:100%;text-align:left;background:var(--panel-alt);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:9px 10px;cursor:pointer;font-size:12.5px;line-height:1.4;}.search-result:hover{border-color:var(--gold);}
@media(max-width:640px){
  .app{padding:14px 12px 76px}.header{align-items:flex-start;margin-bottom:14px}.trip-picker{width:100%;display:grid;grid-template-columns:1fr 1fr}.trip-picker select{grid-column:1/-1;width:100%}.trip-picker .btn{padding:10px 8px;font-size:10.5px}.tabs{position:sticky;top:0;z-index:20;background:var(--bg);margin:0 -12px 14px;padding:8px 12px;gap:5px}.tab{padding:9px 12px;font-size:10.5px;border-radius:9px;border-bottom:1px solid var(--border)}.panel{padding:18px 14px;border-radius:12px}.ticket{gap:9px;padding:12px 10px}.ticket .amount{font-size:13px}.field-row{flex-direction:column;gap:0}.modal{padding:20px 16px}.stat-row{grid-template-columns:1fr 1fr!important}.address-search{flex-direction:column}.fund-head{flex-direction:column}}

@media (prefers-reduced-motion: reduce){*{animation:none !important; transition:none !important;}}

.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}.quick-card,.list-card{background:var(--panel-alt);border:1px solid var(--border);border-radius:12px;padding:16px}.quick-card .kicker{font:11px var(--font-mono);text-transform:uppercase;letter-spacing:.07em;color:var(--text-dim)}.quick-card .big{font:600 20px var(--font-display);margin-top:6px}.flex-head{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}.check-row{display:flex;align-items:flex-start;gap:11px;padding:12px 0;border-bottom:1px solid var(--border)}.check-row:last-child{border-bottom:0}.check-row.done{opacity:.58}.check-row.done .check-title{text-decoration:line-through}.round-check{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--sage);cursor:pointer;flex:0 0 auto}.round-check.checked{background:rgba(134,174,140,.14);border-color:var(--sage)}.check-main{flex:1;min-width:0}.check-title{font-weight:600;font-size:14px}.check-meta{color:var(--text-dim);font-size:12px;margin-top:3px;line-height:1.45}.badge{display:inline-flex;padding:3px 7px;border-radius:999px;background:rgba(201,162,77,.12);color:var(--gold);font:10.5px var(--font-mono);text-transform:uppercase}.module-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.offline-pill{display:inline-flex;align-items:center;gap:6px;font:10.5px var(--font-mono);color:var(--text-dim)}.offline-pill::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--sage)}.offline-pill.offline::before{background:var(--coral)}
@media(max-width:820px){.quick-grid{grid-template-columns:1fr}.module-grid{grid-template-columns:1fr}.mobile-primary{position:fixed;right:18px;bottom:18px;z-index:30;border-radius:999px;box-shadow:0 8px 24px rgba(0,0,0,.3)}}
</style>

<script>
/* ============================= DATA LAYER ============================= */
const CATEGORIES = [
  {key:'alojamento', label:'Alojamento', icon:'🛏️', color:'#7C97B8'},
  {key:'alimentacao', label:'Alimentação', icon:'🍽️', color:'#C9A24D'},
  {key:'transporte', label:'Transporte', icon:'🚗', color:'#4FA39A'},
  {key:'atividades', label:'Atividades', icon:'🎟️', color:'#A9829F'},
  {key:'compras', label:'Compras', icon:'🛍️', color:'#86AE8C'},
  {key:'outros', label:'Outros', icon:'📎', color:'#C1573E'},
];
const CURRENCIES = ['EUR','USD','GBP','BRL'];
const BOOKING_CATEGORIES = [
  {key:'voo', label:'Voo', icon:'✈️'},
  {key:'alojamento', label:'Alojamento', icon:'🏨'},
  {key:'transporte', label:'Transporte', icon:'🚗'},
  {key:'atividade', label:'Atividade', icon:'🎫'},
  {key:'outro', label:'Outro', icon:'📄'},
];

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function catInfo(key){ return CATEGORIES.find(c=>c.key===key) || CATEGORIES[CATEGORIES.length-1]; }
function fmtMoney(amount, currency){
  try{ return new Intl.NumberFormat('pt-PT', {style:'currency', currency: currency || 'EUR'}).format(amount||0); }
  catch(e){ return (amount||0).toFixed(2) + ' ' + (currency||'EUR'); }
}
function todayLocalISO(){
  const d = new Date();
  const off = d.getTimezoneOffset();
  const local = new Date(d.getTime() - off*60000);
  return local.toISOString().slice(0,10);
}
function fmtDateShort(dateStr){
  if(!dateStr) return '—';
  const d = new Date(dateStr + 'T00:00:00');
  if(isNaN(d)) return dateStr;
  return d.toLocaleDateString('pt-PT', {day:'2-digit', month:'short'});
}

const HAS_CLAUDE_STORAGE = (typeof window.storage !== 'undefined' && window.storage);
async function deviceGet(key){
  if(HAS_CLAUDE_STORAGE){
    try{ const r = await window.storage.get(key, false); return r ? r.value : null; }catch(e){ return null; }
  }
  try{ return localStorage.getItem(key); }catch(e){ return null; }
}
async function deviceSet(key, value){
  if(HAS_CLAUDE_STORAGE){
    try{ await window.storage.set(key, value, false); }catch(e){ console.error('Erro a guardar', key, e); }
    return;
  }
  try{ localStorage.setItem(key, value); }catch(e){ console.error('Erro a guardar', key, e); }
}
async function deviceDelete(key){
  if(HAS_CLAUDE_STORAGE){ try{ await window.storage.delete(key, false); }catch(e){} return; }
  try{ localStorage.removeItem(key); }catch(e){}
}

async function getTripsIndex(){
  try{ const v = await deviceGet('trips-index'); return v ? JSON.parse(v) : []; }catch(e){ return []; }
}
async function saveTripsIndex(list){ await deviceSet('trips-index', JSON.stringify(list)); }
async function getTripData(id){
  try{ const v = await deviceGet('trip:'+id); return v ? JSON.parse(v) : null; }catch(e){ return null; }
}
async function saveTripData(id, data){ await deviceSet('trip:'+id, JSON.stringify(data)); }
async function deleteTripData(id){ await deviceDelete('trip:'+id); }

/* ---- GitHub sync ---- */
function utf8ToBase64(str){ return btoa(unescape(encodeURIComponent(str))); }
function base64ToUtf8(str){ return decodeURIComponent(escape(atob(str.replace(/\n/g,'')))); }

async function loadSyncSettings(){
  try{
    const v = await deviceGet('github-sync-settings');
    state.sync = v ? {...state.sync, ...JSON.parse(v)} : state.sync;
  }catch(e){}
}
async function saveSyncSettings(){
  const {owner, repo, path, branch, token, enabled, sha, lastSyncedAt} = state.sync;
  await deviceSet('github-sync-settings', JSON.stringify({owner, repo, path, branch, token, enabled, sha, lastSyncedAt}));
}
function syncConfigured(){
  const s = state.sync;
  return !!(s.enabled && s.owner && s.repo && s.token);
}
function setSyncStatus(msg){
  state.sync.statusMsg = msg;
  const el = document.getElementById('syncStatus');
  if(el) el.textContent = msg;
}
function githubUrl(){
  const {owner, repo, path} = state.sync;
  return `https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/contents/${encodeURIComponent(path || 'travel-data.json')}`;
}
async function githubGet(){
  const res = await fetch(githubUrl() + `?ref=${encodeURIComponent(state.sync.branch||'main')}`, {
    headers: { 'Authorization': `Bearer ${state.sync.token}`, 'Accept':'application/vnd.github+json' }
  });
  return res;
}
async function githubPut(body){
  const res = await fetch(githubUrl(), {
    method:'PUT',
    headers: { 'Authorization': `Bearer ${state.sync.token}`, 'Accept':'application/vnd.github+json', 'Content-Type':'application/json' },
    body: JSON.stringify(body)
  });
  return res;
}

let pushTimer = null;
let localRevision = 0;
let syncRunning = false;
let syncRequestedWhileBusy = false;
function modalIsOpen(){ return !!document.querySelector('#modalRoot .modal-overlay'); }

function schedulePush(delay=4000){
  if(!syncConfigured() || !navigator.onLine) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(()=>{
    if(modalIsOpen()){
      schedulePush(2500);
      return;
    }
    pushToGitHub();
  }, delay);
}

function mergeRecords(remoteList, localList){
  const merged = new Map();
  for(const item of (remoteList || [])){
    if(item && item.id != null) merged.set(String(item.id), item);
  }
  for(const item of (localList || [])){
    if(item && item.id != null) merged.set(String(item.id), item);
  }
  return [...merged.values()];
}
function mergeTripData(remoteData, localData){
  if(!remoteData) return ensureShape(localData);
  if(!localData) return ensureShape(remoteData);
  const merged = {...remoteData, ...localData};
  for(const key of ['locations','expenses','bookings','people','advances','tasks','packingLists','budgetCategories']){
    merged[key] = mergeRecords(remoteData[key], localData[key]);
  }
  return ensureShape(merged);
}
function mergeSyncPayload(remote, local){
  const remoteTrips = remote?.trips || [];
  const localTrips = local?.trips || [];
  const trips = mergeRecords(remoteTrips, localTrips);
  const tripsData = {};
  const ids = new Set([
    ...Object.keys(remote?.tripsData || {}),
    ...Object.keys(local?.tripsData || {}),
    ...trips.map(t=>String(t.id))
  ]);
  for(const id of ids){
    tripsData[id] = mergeTripData(remote?.tripsData?.[id], local?.tripsData?.[id]);
  }
  return {updatedAt:new Date().toISOString(), trips, tripsData};
}
async function buildLocalSyncPayload(){
  const tripsData = {};
  for(const t of state.trips){
    tripsData[t.id] = (t.id===state.currentTripId) ? state.currentData : await getTripData(t.id);
  }
  return {updatedAt:new Date().toISOString(), trips:state.trips, tripsData};
}

async function pushToGitHub(){
  if(!syncConfigured()) return false;
  if(!navigator.onLine){ setSyncStatus('Modo offline · sincronizar mais tarde'); return false; }
  if(modalIsOpen()){
    setSyncStatus('Alterações guardadas · sincronização em espera');
    schedulePush(2500);
    return false;
  }
  if(syncRunning){ syncRequestedWhileBusy = true; return false; }
  syncRunning = true;
  const revisionAtStart = localRevision;
  setSyncStatus('A sincronizar…');
  try{
    let localPayload = await buildLocalSyncPayload();
    const maxAttempts = 3;
    for(let attempt=1; attempt<=maxAttempts; attempt++){
      const getRes = await githubGet();
      let sha = null;
      let remotePayload = null;
      
      if(getRes.status===200){
        const remoteFile = await getRes.json();
        sha = remoteFile.sha;
        try{ remotePayload = JSON.parse(base64ToUtf8(remoteFile.content)); }
        catch(e){ throw new Error('O ficheiro remoto não contém dados válidos da aplicação.'); }
      } else if(getRes.status!==404){
        const j = await getRes.json().catch(()=>({}));
        throw new Error(j.message || ('Erro HTTP '+getRes.status+' ao ler o ficheiro remoto'));
      }

      const payload = mergeSyncPayload(remotePayload, localPayload);
      const body = {
        message:'Atualizar diário de viagem — '+new Date().toLocaleString('pt-PT'),
        content:utf8ToBase64(JSON.stringify(payload, null, 2)),
        branch:state.sync.branch || 'main'
      };
      if(sha) body.sha = sha;

      const putRes = await githubPut(body);
      if(putRes.ok){
        const putJson = await putRes.json();
        
        state.sync.sha = putJson.content.sha;
        state.sync.lastSyncedAt = new Date().toISOString();
        await saveSyncSettings();
        
        if(localRevision === revisionAtStart && !modalIsOpen()){
          state.trips = payload.trips;
          await saveTripsIndex(payload.trips);
          for(const [id,data] of Object.entries(payload.tripsData)) await saveTripData(id, data);
        }
        setSyncStatus(localRevision === revisionAtStart ? 'Sincronizado às '+new Date().toLocaleTimeString('pt-PT') : 'Novas alterações guardadas · nova sincronização pendente');
        if(localRevision !== revisionAtStart) schedulePush(1800);
        return true;
      }

      const errJson = await putRes.json().catch(()=>({}));
      const msg = errJson.message || ('Erro HTTP '+putRes.status);
      const isConflict = putRes.status===409 || putRes.status===422 || /does not match|sha/i.test(msg);
      if(isConflict && attempt<maxAttempts){
        setSyncStatus('Foram encontradas alterações noutro dispositivo · a combinar…');
        localPayload = payload;
        continue;
      }
      throw new Error(msg);
    }
  }catch(err){
    console.error(err);
    setSyncStatus('Falha ao sincronizar: '+err.message);
    return false;
  } finally {
    syncRunning = false;
    if(syncRequestedWhileBusy){
      syncRequestedWhileBusy = false;
      schedulePush(1800);
    }
  }
}

async function pullFromGitHub(){
  if(!syncConfigured()) return false;
  setSyncStatus('A ler dados partilhados…');
  try{
    const res = await githubGet();
    if(res.status===404){ setSyncStatus('Ainda não há dados partilhados neste repositório.'); return false; }
    if(!res.ok){ const j = await res.json().catch(()=>({})); throw new Error(j.message || ('Erro HTTP '+res.status)); }
    const json = await res.json();
    state.sync.sha = json.sha;
    const remote = JSON.parse(base64ToUtf8(json.content));
    await saveTripsIndex(remote.trips || []);
    for(const id of Object.keys(remote.tripsData || {})){
      await saveTripData(id, ensureShape(remote.tripsData[id]));
    }
    state.trips = remote.trips || [];
    if(state.trips.length){
      const stillExists = state.trips.find(t=>t.id===state.currentTripId);
      state.currentTripId = stillExists ? state.currentTripId : state.trips[0].id;
      state.currentData = ensureShape(await getTripData(state.currentTripId));
    } else {
      state.currentTripId = null;
      state.currentData = null;
    }
    await saveSyncSettings();
    setSyncStatus('Sincronizado às ' + new Date().toLocaleTimeString('pt-PT'));
    return true;
  }catch(err){
    console.error(err);
    setSyncStatus('Falha ao sincronizar: ' + err.message);
    return false;
  }
}

function blankTripData(info){
  return {
    info,
    locations: [],
    expenses: [],
    bookings: [],
    people: [],
    advances: [],
    tasks: [],
    packingLists: [{id:uid(), name:'Mala principal', items:[]}],
    modules: {today:true,locations:true,bookings:true,preparation:true,expenses:true,budget:true,dashboard:true},
    budgetCategories: CATEGORIES.map(c=>({key:c.key, planned:0})),
  };
}
function ensureShape(data){
  if(!data) return data;
  if(!data.bookings) data.bookings = [];
  if(!data.locations) data.locations = [];
  if(!data.expenses) data.expenses = [];
  if(!data.people) data.people = [];
  if(!data.advances) data.advances = [];
  if(!data.tasks) data.tasks = [];
  if(!data.packingLists) data.packingLists = [{id:uid(), name:'Mala principal', items:[]}];
  if(!data.modules) data.modules = {today:true,locations:true,bookings:true,preparation:true,expenses:true,budget:true,dashboard:true};
  data.locations.forEach(l=>{ if(l.visited==null) l.visited=false; });
  data.expenses.forEach(e=>{
    if(!Array.isArray(e.fundAllocations)){
      e.fundAllocations = e.advanceId ? [{advanceId:e.advanceId, amount:Number(e.amount||0)}] : [];
    }
    e.advanceId = null;
  });
  if(!data.budgetCategories) data.budgetCategories = CATEGORIES.map(c=>({key:c.key, planned:0}));
  return data;
}

/* ============================= STATE ============================= */
const state = {
  trips: [],
  currentTripId: null,
  currentData: null,
  activeTab: 'hoje',
  charts: {},
  mapPopoverId: null,
  modalPendingXY: null,
  sync: { owner:'', repo:'', path:'travel-data.json', branch:'main', token:'', enabled:false, sha:null, lastSyncedAt:null, statusMsg:'' },
};

/* ============================= INIT ============================= */
let WORLD_MAP_PATHS = '';
function worldMapBgSvg(){
  return `<svg class="world-bg" viewBox="30.767 241.591 784.077 458.627" preserveAspectRatio="xMidYMid meet" aria-hidden="true">${WORLD_MAP_PATHS}</svg>`;
}

let GLOBAL_EVENTS_BOUND = false;

async function init(){
  const tpl = document.getElementById('worldMapPaths');
  if(tpl && tpl.content){
    const innerSvg = tpl.content.querySelector('svg');
    if(innerSvg) WORLD_MAP_PATHS = innerSvg.innerHTML;
  }

  try { bindGlobalEvents(); } catch(err) { console.error('Falha ao ligar eventos globais:', err); }
  try { renderHeader(); renderTabs(); renderCurrentTab(); } catch(err) { console.error('Falha no desenho inicial:', err); }

  try {
    await loadSyncSettings();
  } catch(err) {
    console.error('Falha ao ler definições de sincronização:', err);
    setSyncStatus('Não foi possível ler as definições locais; a app continua disponível.');
  }

  try {
    state.trips = (await getTripsIndex()) || [];
    if(state.trips.length){
      state.currentTripId = state.trips[0].id;
      state.currentData = ensureShape(await getTripData(state.currentTripId));
    }
  } catch(err) {
    console.error('Falha ao carregar dados locais:', err);
    state.trips = Array.isArray(state.trips) ? state.trips : [];
    state.currentTripId = null;
    state.currentData = null;
    setSyncStatus('Erro ao carregar os dados locais; podes importar uma cópia de segurança.');
  }

  try { renderHeader(); renderTabs(); renderCurrentTab(); } catch(err) { console.error('Falha ao redesenhar dados locais:', err); }

  if(syncConfigured() && navigator.onLine){
    Promise.resolve().then(()=>pullFromGitHub()).then(ok=>{
      if(ok && !modalIsOpen()){
        try { renderHeader(); renderTabs(); renderCurrentTab(); }
        catch(err) { console.error('Falha ao redesenhar após sincronização:', err); }
      }
    }).catch(err=>{
      console.error(err);
      setSyncStatus('Falha ao sincronizar: '+err.message);
    });
  }
}

function bindGlobalEvents(){
  if(GLOBAL_EVENTS_BOUND) return;
  GLOBAL_EVENTS_BOUND = true;
  document.getElementById('newTripBtn').addEventListener('click', ()=>openTripModal('create'));
  document.getElementById('editTripBtn').addEventListener('click', ()=>openTripModal('edit'));
  document.getElementById('tripSelect').addEventListener('change', async (e)=>{
    state.currentTripId = e.target.value;
    state.currentData = ensureShape(await getTripData(state.currentTripId));
    renderHeader();
    renderTabs();
    renderCurrentTab();
  });
  document.getElementById('tabs').addEventListener('click', (e)=>{
    const t = e.target.closest('.tab');
    if(!t) return;
    state.activeTab = t.dataset.tab;
    renderTabs();
    renderCurrentTab();
  });
  document.getElementById('exportBtn').addEventListener('click', exportTripData);
  document.getElementById('importBtn').addEventListener('click', ()=> document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change', importTripData);
  document.getElementById('syncSettingsBtn').addEventListener('click', openSyncModal);
  initTheme();
  document.getElementById('themeBtn').addEventListener('click', toggleTheme);
  updateNetworkStatus();
  window.addEventListener('online', ()=>{ updateNetworkStatus(); if(syncConfigured()) schedulePush(1800); });
  window.addEventListener('offline', updateNetworkStatus);
  setSyncStatus(syncConfigured() ? (state.sync.statusMsg || 'Sincronização activa') : 'Só neste dispositivo — liga o 🔗 Sincronizar para partilhar');
}

function openSyncModal(){
  const s = state.sync;
  openModal(`
    <h3>Sincronização via GitHub</h3>
    <p style="font-size:12.5px; color:var(--text-dim); line-height:1.6; margin:-8px 0 16px;">
      Guarda os dados num repositório GitHub <strong>privado</strong> teu. Quem tiver estas mesmas definições vê os mesmos dados. Precisas de:
      1) um repositório privado; 2) um token pessoal (fine-grained) com permissão <em>Contents: Read and write</em> nesse repositório.
    </p>
    <div class="field"><label>Utilizador ou organização</label><input id="s_owner" value="${escapeHtml(s.owner)}" placeholder="ex: joaosilva"></div>
    <div class="field"><label>Nome do repositório</label><input id="s_repo" value="${escapeHtml(s.repo)}" placeholder="ex: viagem-japao-dados"></div>
    <div class="field-row">
      <div class="field"><label>Ramo (branch)</label><input id="s_branch" value="${escapeHtml(s.branch||'main')}"></div>
      <div class="field"><label>Ficheiro</label><input id="s_path" value="${escapeHtml(s.path||'travel-data.json')}"></div>
    </div>
    <div class="field"><label>Token de acesso pessoal</label><input type="password" id="s_token" value="${escapeHtml(s.token)}" placeholder="github_pat_..."></div>
    <p style="font-size:11.5px; color:var(--coral); line-height:1.5; margin:-6px 0 16px;">
      ⚠️ O token fica guardado só neste navegador em texto simples. Não uses um token com mais acesso do que este único repositório.
    </p>
    <div id="syncModalStatus" style="font-family:var(--font-mono); font-size:12px; color:var(--text-dim); margin-bottom:14px;">${escapeHtml(s.statusMsg||'')}</div>
    <div class="modal-actions" style="justify-content:space-between;">
      <label style="display:flex; align-items:center; gap:6px; font-size:13px;">
        <input type="checkbox" id="s_enabled" ${s.enabled?'checked':''}> Ativar sincronização
      </label>
      <div style="display:flex; gap:10px;">
        <button class="btn btn-ghost" onclick="closeModal()">Fechar</button>
        <button class="btn btn-primary" id="saveSyncBtn">Guardar e sincronizar</button>
      </div>
    </div>
  `);
  document.getElementById('saveSyncBtn').addEventListener('click', async ()=>{
    state.sync.owner = document.getElementById('s_owner').value.trim();
    state.sync.repo = document.getElementById('s_repo').value.trim();
    state.sync.branch = document.getElementById('s_branch').value.trim() || 'main';
    state.sync.path = document.getElementById('s_path').value.trim() || 'travel-data.json';
    state.sync.token = document.getElementById('s_token').value.trim();
    state.sync.enabled = document.getElementById('s_enabled').checked;
    await saveSyncSettings();
    const statusEl = document.getElementById('syncModalStatus');
    if(!syncConfigured()){
      statusEl.textContent = 'Preenche utilizador, repositório e token, e ativa a sincronização.';
      renderHeader();
      return;
    }
    statusEl.textContent = 'A verificar…';
    const ok = await pullFromGitHub();
    statusEl.textContent = state.sync.statusMsg;
    if(ok || state.sync.statusMsg.includes('Ainda não há')){
      await pushToGitHub();
      statusEl.textContent = state.sync.statusMsg;
    }
    renderHeader();
  });
}

function exportTripData(){
  if(!state.currentData){ alert('Cria ou escolhe uma viagem primeiro.'); return; }
  try{
    const payload = {
      exportedAt: new Date().toISOString(),
      appVersion: 1,
      trip: state.currentData,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const safeName = (state.currentData.info.name||'viagem').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
    a.href = url;
    a.download = `diario-viagem-${safeName || 'export'}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }catch(e){
    console.error(e);
    alert('Não foi possível criar o ficheiro de exportação neste ambiente.');
  }
}

function normalizeImportedTrip(tripData){
  if(!tripData.info.id) tripData.info.id = uid();
  if(!tripData.info.currency) tripData.info.currency = 'EUR';
  if(tripData.info.budgetTotal==null) tripData.info.budgetTotal = 0;
  tripData.people = (tripData.people||[]).map(p=>({ id: p.id || uid(), name: p.name||'' })).filter(p=>p.name);
  tripData.locations = (tripData.locations||[]).map((l,i)=>({
    id: l.id || uid(), name: l.name||'', day: l.day||'', time: l.time||'', notes: l.notes||'',
    x: l.x!=null ? l.x : null, y: l.y!=null ? l.y : null, order: l.order!=null ? l.order : i,
  }));
  tripData.expenses = (tripData.expenses||[]).map(e=>({
    id: e.id || uid(), date: e.date||'', categoryKey: CATEGORIES.some(c=>c.key===e.categoryKey) ? e.categoryKey : 'outros',
    description: e.description||'', amount: Number(e.amount)||0, locationId: e.locationId||null,
    paidBy: e.paidBy||null, splitWith: Array.isArray(e.splitWith) ? e.splitWith : [],
  }));
  tripData.bookings = (tripData.bookings||[]).map(b=>({
    id: b.id || uid(), category: BOOKING_CATEGORIES.some(c=>c.key===b.category) ? b.category : 'outro',
    provider: b.provider||'', code: b.code||'', dateFrom: b.dateFrom||'', dateTo: b.dateTo||'',
    timeFrom: b.timeFrom||'', timeTo: b.timeTo||'', locationId: b.locationId||null,
    arrivalLocationId: b.arrivalLocationId||null, flightNumber:b.flightNumber||'', flightStatus:b.flightStatus||'',
    departureTerminal:b.departureTerminal||'', arrivalTerminal:b.arrivalTerminal||'', lastFlightUpdate:b.lastFlightUpdate||'',
    notes: b.notes||'', link: b.link||'',
  }));
  const catKeys = CATEGORIES.map(c=>c.key);
  tripData.budgetCategories = catKeys.map(key=>{
    const found = (tripData.budgetCategories||[]).find(b=>b.key===key);
    return { key, planned: found ? Number(found.planned)||0 : 0 };
  });
  const locIds = new Set(tripData.locations.map(l=>l.id));
  tripData.expenses.forEach(e=>{ if(e.locationId && !locIds.has(e.locationId)) e.locationId = null; });
  const peopleIds = new Set(tripData.people.map(p=>p.id));
  tripData.expenses.forEach(e=>{
    if(e.paidBy && !peopleIds.has(e.paidBy)) e.paidBy = null;
    e.splitWith = (e.splitWith||[]).filter(id=>peopleIds.has(id));
  });
  return ensureShape(tripData);
}

async function importTripData(e){
  const file = e.target.files[0];
  e.target.value = '';
  if(!file) return;
  try{
    const text = await file.text();
    const parsed = JSON.parse(text);
    let tripData = ensureShape(parsed.trip || parsed);
    if(!tripData || !tripData.info || !tripData.info.name){ alert('Ficheiro inválido.'); return; }
    tripData = normalizeImportedTrip(tripData);
    const existing = state.trips.find(t=>t.id===tripData.info.id);
    if(existing && !confirm(`Deseja substituir a viagem "${existing.name}"?`)) return;
    if(!existing){
      state.trips.push(pickIndexFields(tripData.info));
    } else {
      const idx = state.trips.findIndex(t=>t.id===tripData.info.id);
      state.trips[idx] = pickIndexFields(tripData.info);
    }
    await saveTripsIndex(state.trips);
    await saveTripData(tripData.info.id, tripData);
    state.currentTripId = tripData.info.id;
    state.currentData = tripData;
    renderHeader();
    renderCurrentTab();
    alert('Viagem importada.');
  }catch(err){
    console.error(err);
    alert('Erro ao importar ficheiro.');
  }
}

function initTheme(){
  const saved = localStorage.getItem('travel-theme');
  const preferred = saved || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  document.documentElement.dataset.theme = preferred;
  updateThemeButton();
}
function toggleTheme(){
  document.documentElement.dataset.theme = document.documentElement.dataset.theme==='light' ? 'dark' : 'light';
  localStorage.setItem('travel-theme', document.documentElement.dataset.theme);
  updateThemeButton();
}
function updateThemeButton(){
  const b=document.getElementById('themeBtn'); if(!b) return;
  b.textContent=document.documentElement.dataset.theme==='light'?'🌙 Escuro':'☀️ Claro';
}

function renderHeader(){
  const sel = document.getElementById('tripSelect');
  const editBtn = document.getElementById('editTripBtn');
  const exportBtn = document.getElementById('exportBtn');
  if(!state.trips.length){
    document.getElementById('tripTitle').textContent = 'A tua primeira viagem';
    sel.innerHTML = '';
    sel.style.display = 'none';
    editBtn.style.display = 'none';
    exportBtn.style.display = 'none';
    return;
  }
  sel.style.display = '';
  editBtn.style.display = '';
  exportBtn.style.display = '';
  sel.innerHTML = state.trips.map(t=>`<option value="${t.id}" ${t.id===state.currentTripId?'selected':''}>${escapeHtml(t.name)}</option>`).join('');
  const cur = state.trips.find(t=>t.id===state.currentTripId);
  document.getElementById('tripTitle').textContent = cur ? cur.name : 'Diário de Viagem';
}

function renderTabs(){
  const modules=(state.currentData&&state.currentData.modules)||{};
  document.querySelectorAll('.tab').forEach(t=>{
    const visible=!t.dataset.module || modules[t.dataset.module]!==false;
    t.style.display=visible?'':'none';
    t.classList.toggle('active', t.dataset.tab === state.activeTab);
  });
  const active=document.querySelector(`.tab[data-tab="${state.activeTab}"]`);
  if(active && active.style.display==='none'){
    const first=[...document.querySelectorAll('.tab')].find(t=>t.style.display!=='none');
    if(first) state.activeTab=first.dataset.tab;
  }
}

function escapeHtml(str){
  const d = document.createElement('div'); d.textContent = str==null?'':str; return d.innerHTML;
}

/* ============================= TAB ROUTER ============================= */
function renderCurrentTab(){
  const el = document.getElementById('panelContent');
  if(!state.trips.length || !state.currentData){
    el.innerHTML = `
      <div class="empty">
        <h2>Ainda não há nenhuma viagem</h2>
        <p>Cria a tua primeira viagem para começar.</p>
        <button class="btn btn-primary" onclick="openTripModal('create')">+ Criar primeira viagem</button>
      </div>`;
    return;
  }
  if(state.activeTab === 'hoje') return renderToday(el);
  if(state.activeTab === 'preparacao') return renderPreparation(el);
  if(state.activeTab === 'painel') return renderDashboard(el);
  if(state.activeTab === 'roteiro') return renderRoteiro(el);
  if(state.activeTab === 'reservas') return renderReservas(el);
  if(state.activeTab === 'despesas') return renderDespesas(el);
  if(state.activeTab === 'saldo') return renderSaldo(el);
  if(state.activeTab === 'orcamento') return renderOrcamento(el);
}

function updateNetworkStatus(){
  const el=document.getElementById('networkStatus'); if(!el)return;
  const online=navigator.onLine;
  el.classList.toggle('offline',!online);
  el.textContent=online?'Disponível offline':'Modo offline';
}

function renderToday(el){
  const d=state.currentData, today=todayLocalISO();
  const datedBookings=d.bookings.filter(b=>b.dateFrom===today || b.dateTo===today).sort((a,b)=>bookingSortKey(a).localeCompare(bookingSortKey(b)));
  const urgent=d.tasks.filter(t=>!t.done && (!t.dueDate || t.dueDate<=today)).sort((a,b)=>(a.dueDate||'9999').localeCompare(b.dueDate||'9999'));
  const ideas=d.locations.filter(l=>!l.visited && (!l.day || l.day===today)).slice(0,8);
  const fund=(d.advances||[]).reduce((sum,a)=>sum+advanceRemaining(a.id),0);
  el.innerHTML=`
    <div class="flex-head"><div><h2 class="section-title" style="margin-bottom:4px">Hoje</h2></div><button class="btn btn-primary" onclick="openLocationModal('create')">+ Guardar local</button></div>
    <div class="quick-grid" style="margin-top:20px">
      <div class="quick-card"><div class="kicker">Compromissos hoje</div><div class="big">${datedBookings.length}</div></div>
      <div class="quick-card"><div class="kicker">Falta tratar</div><div class="big">${urgent.length}</div></div>
      <div class="quick-card"><div class="kicker">Fundo disponível</div><div class="big">${fmtMoney(fund,d.info.currency)}</div></div>
    </div>
    <div class="chart-row" style="margin-top:14px;">
      <div class="list-card"><div class="flex-head"><h3 class="section-title">Reservas</h3></div>${datedBookings.length?datedBookings.map(b=>`<div class="check-row"><div style="font-size:20px">${(BOOKING_CATEGORIES.find(c=>c.key===b.category)||BOOKING_CATEGORIES[4]).icon}</div><div class="check-main"><div class="check-title">${b.timeFrom?escapeHtml(b.timeFrom)+' · ':''}${escapeHtml(b.provider||'Reserva')}</div></div></div>`).join(''):'<div class="check-meta">Nenhuma reserva para hoje.</div>'}</div>
      <div class="list-card"><div class="flex-head"><h3 class="section-title">Falta tratar</h3></div>${renderTaskRows(urgent)}</div>
    </div>`;
}

function advanceRemaining(id){
  const f=state.currentData.advances.find(x=>x.id===id); if(!f) return 0;
  const used=state.currentData.expenses.reduce((sum,e)=>{
    const alloc=(e.fundAllocations||[]).find(x=>x.advanceId===id);
    return sum+(alloc?Number(alloc.amount||0):0);
  },0);
  return Math.max(0, Number(f.amount||0)-used);
}

function renderInterestRow(loc){
 return `<div class="check-row ${loc.visited?'done':''}"><button class="round-check ${loc.visited?'checked':''}" onclick="toggleLocationVisited('${loc.id}')">${loc.visited?'✓':''}</button><div class="check-main"><div class="check-title">${escapeHtml(loc.name)}</div></div></div>`;
}
function toggleLocationVisited(id){const l=state.currentData.locations.find(x=>x.id===id);if(!l)return;l.visited=!l.visited;persistCurrentTrip();renderCurrentTab();}
function renderTaskRows(tasks){return tasks.length?tasks.map(t=>`<div class="check-row ${t.done?'done':''}"><button class="round-check ${t.done?'checked':''}" onclick="toggleTask('${t.id}')">${t.done?'✓':''}</button><div class="check-main"><div class="check-title">${escapeHtml(t.title)}</div></div></div>`).join(''):'<div class="check-meta">Nada pendente.</div>'}
function toggleTask(id){const t=state.currentData.tasks.find(x=>x.id===id);if(t){t.done=!t.done;persistCurrentTrip();renderCurrentTab();}}

function renderPreparation(el){
 const d=state.currentData, pending=d.tasks.filter(t=>!t.done), done=d.tasks.filter(t=>t.done);
 el.innerHTML=`<div class="flex-head"><div><h2 class="section-title">Preparação</h2></div><button class="btn btn-primary" onclick="openTaskModal()">+ Tarefa</button></div>
 <div class="chart-row" style="margin-top:20px"><div class="list-card"><h3 class="section-title">Tarefas</h3>${renderTaskRows(pending)}</div>
 <div class="list-card"><div class="flex-head"><h3 class="section-title">Malas</h3><button class="btn btn-sm" onclick="addPackingList()">+ Lista</button></div>${d.packingLists.map(renderPackingList).join('')}</div></div>`;
}
function renderPackingList(list){const checked=list.items.filter(i=>i.done).length;return `<div style="margin-bottom:18px"><strong>${escapeHtml(list.name)}</strong> (${checked}/${list.items.length})${list.items.map(i=>`<div class="check-row"><div class="check-title">${escapeHtml(i.name)}</div></div>`).join('')}</div>`}
function openTaskModal(){openModal(`<h3>Nova tarefa</h3><div class="field"><label>Título</label><input id="t_title"></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="saveTask">Adicionar</button></div>`);document.getElementById('saveTask').onclick=()=>{const title=document.getElementById('t_title').value.trim();if(!title)return;state.currentData.tasks.push({id:uid(),title,done:false});persistCurrentTrip();closeModal();renderCurrentTab();};}
function addPackingList(){const name=prompt('Nome da lista:');if(!name)return;state.currentData.packingLists.push({id:uid(),name,items:[]});persistCurrentTrip();renderCurrentTab();}

/* ============================= DASHBOARD ============================= */
function renderDashboard(el){
  const info = state.currentData.info;
  const expenses = state.currentData.expenses;
  const totalSpent = expenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const totalBudget = Number(info.budgetTotal||0);
  const remaining = totalBudget - totalSpent;
  const pct = totalBudget>0 ? Math.min(100, Math.round((totalSpent/totalBudget)*100)) : 0;

  el.innerHTML = `
    <h2 class="section-title">Resumo</h2>
    <div class="hero-progress">
      <div class="ring-wrap">${ringSvg(pct)}<div class="ring-label"><div class="pct">${pct}%</div></div></div>
      <div class="desc"><p>Gastou ${fmtMoney(totalSpent, info.currency)} de ${fmtMoney(totalBudget, info.currency)}.</p></div>
    </div>
    <div class="chart-row">
      <div class="chart-card"><h4>Categorias</h4><canvas id="catChart"></canvas></div>
      <div class="chart-card"><h4>Histórico por Dia</h4><canvas id="dayChart"></canvas></div>
    </div>`;

  renderCategoryChart(expenses, info.currency);
  renderDayChart(expenses, info.currency);
}

function ringSvg(pct){
  const r = 52, c = 2*Math.PI*r;
  const offset = c - (pct/100)*c;
  return `<svg width="130" height="130" viewBox="0 0 130 130"><circle cx="65" cy="65" r="${r}" fill="none" stroke="#0B141F" stroke-width="12"/><circle cx="65" cy="65" r="${r}" fill="none" stroke="var(--teal)" stroke-width="12" stroke-dasharray="${c}" stroke-dashoffset="${offset}" transform="rotate(-90 65 65)"/></svg>`;
}

function renderCategoryChart(expenses, currency){
  const ctx = document.getElementById('catChart'); if(!ctx) return;
  const totals = CATEGORIES.map(c => expenses.filter(e=>e.categoryKey===c.key).reduce((s,e)=>s+Number(e.amount||0),0));
  if(state.charts.cat) state.charts.cat.destroy();
  state.charts.cat = new Chart(ctx, {
    type:'doughnut',
    data:{ labels: CATEGORIES.map(c=>c.label), datasets:[{ data: totals, backgroundColor: CATEGORIES.map(c=>c.color) }]}
  });
}
function renderDayChart(expenses, currency){
  const ctx = document.getElementById('dayChart'); if(!ctx) return;
  const byDay = {}; expenses.forEach(e=>{ const d = e.date || 'sem data'; byDay[d] = (byDay[d]||0) + Number(e.amount||0); });
  const labels = Object.keys(byDay).sort();
  if(state.charts.day) state.charts.day.destroy();
  state.charts.day = new Chart(ctx, {
    type:'bar',
    data:{ labels: labels, datasets:[{ data: labels.map(l=>byDay[l]), backgroundColor:'#C9A24D' }]}
  });
}

/* ============================= ROTEIRO ============================= */
function bookingSortKey(b){ return `${b.dateFrom||'9999-12-31'}T${b.timeFrom||'23:59'}`; }
function bookingLocationText(b){
  const a=state.currentData.locations.find(l=>l.id===b.locationId);
  return a?.name || '';
}

function renderRoteiro(el){
  const locs = [...state.currentData.locations];
  el.innerHTML = `
    <div class="flex-head"><h2 class="section-title">Roteiro</h2><button class="btn btn-primary" onclick="openLocationModal('create')">+ Local</button></div>
    <div class="itin-layout" style="margin-top:14px;">
      <div>${locs.map(l=>`<div class="loc-item"><strong>${escapeHtml(l.name)}</strong></div>`).join('')}</div>
      <div id="mapCanvas" class="map-canvas"></div>
    </div>`;
  renderMapCanvas();
}

function renderMapCanvas(){
  const wrap = document.getElementById('mapCanvas'); if(!wrap) return;
  wrap.innerHTML = worldMapBgSvg();
}

/* ============================= RESERVAS ============================= */
function renderBookingTicket(b){
  return `<div class="ticket"><div class="info"><div class="desc">${escapeHtml(b.provider)}</div></div></div>`;
}
function renderReservas(el){
  const bookings=state.currentData.bookings;
  el.innerHTML=`<div class="flex-head"><h2 class="section-title">Reservas</h2><button class="btn btn-primary" onclick="openBookingModal('create')">+ Adicionar</button></div>
  <div style="margin-top:14px;">${bookings.map(renderBookingTicket).join('')}</div>`;
}
function openBookingModal(mode){
  openModal(`<h3>Nova Reserva</h3><div class="field"><label>Fornecedor</label><input id="b_provider"></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="saveBooking">Guardar</button></div>`);
  document.getElementById('saveBooking').onclick=()=>{
    state.currentData.bookings.push({id:uid(), provider:document.getElementById('b_provider').value, category:'outro'});
    persistCurrentTrip(); closeModal(); renderCurrentTab();
  };
}

/* ============================= DESPESAS & SALDO ============================= */
function renderDespesas(el){
  el.innerHTML=`<div class="flex-head"><h2 class="section-title">Despesas</h2><button class="btn btn-primary" onclick="openExpenseModal('create')">+ Despesa</button></div>
  <div style="margin-top:14px;">${state.currentData.expenses.map(e=>`<div class="ticket"><div class="info">${escapeHtml(e.description)}</div><div class="amount">${fmtMoney(e.amount)}</div></div>`).join('')}</div>`;
}
function openExpenseModal(mode){
  openModal(`<h3>Nova Despesa</h3><div class="field"><label>Descrição</label><input id="e_desc"></div><div class="field"><label>Valor</label><input type="number" id="e_amount"></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="saveExp">Adicionar</button></div>`);
  document.getElementById('saveExp').onclick=()=>{
    state.currentData.expenses.push({id:uid(), description:document.getElementById('e_desc').value, amount:Number(document.getElementById('e_amount').value), categoryKey:'outros'});
    persistCurrentTrip(); closeModal(); renderCurrentTab();
  };
}

function renderSaldo(el){
  el.innerHTML=`<h2 class="section-title">Saldos</h2><p style="color:var(--text-dim)">Adicione participantes para gerir divisões de despesas.</p>`;
}
function renderOrcamento(el){
  el.innerHTML=`<h2 class="section-title">Orçamento</h2><p style="color:var(--text-dim)">Configure os limites de gastos planeados da sua viagem.</p>`;
}

/* ============================= PERSISTENCIA ============================= */
async function persistCurrentTrip(){
  if(!state.currentTripId) return;
  localRevision++;
  await saveTripData(state.currentTripId, state.currentData);
  schedulePush(3000);
}
async function updateTripIndexEntry(){
  const idx = state.trips.findIndex(t=>t.id===state.currentTripId);
  if(idx>-1){
    state.trips[idx] = {...state.trips[idx], ...pickIndexFields(state.currentData.info)};
    localRevision++;
    await saveTripsIndex(state.trips);
    schedulePush(3000);
  }
}
function pickIndexFields(info){
  return {id:info.id, name:info.name, destination:info.destination, startDate:info.startDate, endDate:info.endDate, currency:info.currency, budgetTotal:info.budgetTotal};
}

/* ============================= MODALS ============================= */
function openModal(html){
  clearTimeout(pushTimer);
  const root = document.getElementById('modalRoot');
  root.innerHTML = `<div class="modal-overlay" id="modalOverlay"><div class="modal">${html}</div></div>`;
  document.getElementById('modalOverlay').addEventListener('click', (e)=>{ if(e.target.id==='modalOverlay') closeModal(); });
}
function closeModal(){
  document.getElementById('modalRoot').innerHTML='';
  state.modalPendingXY = null;
  if(syncConfigured()) schedulePush(1500);
}

function openTripModal(mode){
  openModal(`<h3>Nova Viagem</h3><div class="field"><label>Nome</label><input id="f_name"></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="saveTrip">Criar</button></div>`);
  document.getElementById('saveTrip').onclick=async ()=>{
    const name = document.getElementById('f_name').value.trim() || 'Nova Viagem';
    const id = uid(); const info = {id, name, currency:'EUR', budgetTotal:0};
    const data = blankTripData(info);
    state.trips.push(pickIndexFields(info));
    await saveTripsIndex(state.trips);
    await saveTripData(id, data);
    state.currentTripId = id; state.currentData = data;
    closeModal(); renderHeader(); renderTabs(); renderCurrentTab();
    if(syncConfigured()) schedulePush(1000);
  };
}

function openLocationModal(mode){
  openModal(`<h3>Nova Paragem</h3><div class="field"><label>Nome do local</label><input id="l_name"></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="saveLoc">Adicionar</button></div>`);
  document.getElementById('saveLoc').onclick=()=>{
    const name = document.getElementById('l_name').value.trim(); if(!name) return;
    state.currentData.locations.push({id:uid(), name, visited:false, x:null, y:null, order:state.currentData.locations.length});
    persistCurrentTrip(); closeModal(); renderCurrentTab();
  };
}

function bootApp(){
  init().catch(err=>{
    console.error(err);
    setSyncStatus('Erro no arranque.');
  });
}
if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', bootApp, {once:true});
else bootApp();
</script>
