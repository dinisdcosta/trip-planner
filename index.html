<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diário de Viagem</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#0F1B2B;
  --bg-alt:#0B141F;
  --panel:#152437;
  --panel-alt:#1C3049;
  --linen:#F1E8D3;
  --linen-dim:#DCD2B6;
  --gold:#C9A24D;
  --gold-dim:#8C7239;
  --teal:#4FA39A;
  --coral:#C1573E;
  --sage:#86AE8C;
  --slate-blue:#7C97B8;
  --mauve:#A9829F;
  --text:#EDE6D3;
  --text-dim:#93A5BB;
  --border:rgba(237,230,211,0.14);
  --font-display:'Fraunces', serif;
  --font-body:'IBM Plex Sans', sans-serif;
  --font-mono:'IBM Plex Mono', monospace;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(ellipse 900px 500px at 10% -10%, rgba(79,163,154,0.10), transparent 60%),
    radial-gradient(ellipse 700px 500px at 100% 0%, rgba(201,162,77,0.08), transparent 55%),
    var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

.app{max-width:1180px;margin:0 auto;padding:28px 20px 80px;}

/* ---------- Header ---------- */
.header{
  display:flex; align-items:flex-end; justify-content:space-between; gap:20px;
  flex-wrap:wrap; margin-bottom:22px; padding-bottom:18px; border-bottom:1px solid var(--border);
}
.brand{display:flex; flex-direction:column; gap:2px;}
.brand .eyebrow{
  font-family:var(--font-mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase;
  color:var(--gold); opacity:.9;
}
.brand h1{
  font-family:var(--font-display); font-weight:600; font-size:clamp(28px,4vw,40px); margin:2px 0 0;
  letter-spacing:-0.01em;
}
.trip-picker{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
select, input, textarea{
  font-family:var(--font-body); background:var(--panel-alt); color:var(--text);
  border:1px solid var(--border); border-radius:8px; padding:9px 12px; font-size:14px;
}
select:focus, input:focus, textarea:focus{outline:2px solid var(--gold); outline-offset:1px;}
.btn{
  font-family:var(--font-mono); font-size:12.5px; letter-spacing:.03em; text-transform:uppercase;
  border:1px solid var(--border); background:var(--panel-alt); color:var(--text);
  padding:10px 16px; border-radius:8px; cursor:pointer; transition:transform .12s ease, background .12s ease, border-color .12s ease;
  white-space:nowrap;
}
.btn:hover{background:#233a58; transform:translateY(-1px);}
.btn:focus-visible{outline:2px solid var(--gold); outline-offset:2px;}
.btn-primary{background:var(--gold); color:#20160A; border-color:var(--gold); font-weight:600;}
.btn-primary:hover{background:#DAB65E;}
.btn-ghost{background:transparent;}
.btn-danger{color:var(--coral); border-color:rgba(193,87,62,.5);}
.btn-danger:hover{background:rgba(193,87,62,.12);}
.btn-sm{padding:6px 10px; font-size:11px;}
.icon-btn{background:transparent; border:none; color:var(--text-dim); cursor:pointer; font-size:15px; padding:4px 6px; border-radius:6px;}
.icon-btn:hover{color:var(--text); background:var(--panel-alt);}

/* ---------- Tabs ---------- */
.tabs{display:flex; gap:6px; margin-bottom:24px; overflow-x:auto; padding-bottom:2px;}
.tab{
  font-family:var(--font-mono); font-size:12.5px; letter-spacing:.04em; text-transform:uppercase;
  padding:11px 18px; border-radius:10px 10px 0 0; cursor:pointer; color:var(--text-dim);
  background:var(--panel); border:1px solid var(--border); border-bottom:none; white-space:nowrap;
}
.tab.active{color:var(--gold); background:var(--panel-alt); box-shadow:inset 0 2px 0 var(--gold);}

.panel{background:var(--panel); border:1px solid var(--border); border-radius:0 12px 12px 12px; padding:26px; animation:fade .25s ease;}
@keyframes fade{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}

.empty{
  text-align:center; padding:70px 20px; color:var(--text-dim);
}
.empty h2{font-family:var(--font-display); color:var(--text); font-weight:600; font-size:24px; margin-bottom:8px;}
.empty p{max-width:420px; margin:0 auto 20px; font-size:14.5px; line-height:1.6;}

/* ---------- Dashboard ---------- */
.section-title{
  font-family:var(--font-display); font-weight:600; font-size:20px; margin:0 0 16px;
  display:flex; align-items:center; gap:8px;
}
.stat-row{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:26px;}
@media (max-width:820px){.stat-row{grid-template-columns:repeat(2,1fr);}}
.stat-card{
  background:var(--panel-alt); border:1px solid var(--border); border-radius:10px; padding:16px 18px;
}
.stat-card .label{font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-dim);}
.stat-card .value{font-family:var(--font-display); font-size:26px; font-weight:600; margin-top:6px;}
.stat-card .value.over{color:var(--coral);}
.stat-card .value.ok{color:var(--sage);}

.hero-progress{display:flex; gap:28px; align-items:center; background:var(--panel-alt); border:1px solid var(--border); border-radius:12px; padding:22px; margin-bottom:26px; flex-wrap:wrap;}
.hero-progress .ring-wrap{position:relative; width:130px; height:130px; flex-shrink:0;}
.hero-progress .ring-label{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
.hero-progress .ring-label .pct{font-family:var(--font-display); font-size:26px; font-weight:700;}
.hero-progress .ring-label .cap{font-family:var(--font-mono); font-size:10px; color:var(--text-dim); text-transform:uppercase;}
.hero-progress .desc{flex:1; min-width:220px;}
.hero-progress .desc h3{font-family:var(--font-display); margin:0 0 8px; font-size:19px;}
.hero-progress .desc p{margin:0; color:var(--text-dim); font-size:14px; line-height:1.6;}

.chart-row{display:grid; grid-template-columns:1.1fr 1.4fr; gap:18px;}
@media (max-width:820px){.chart-row{grid-template-columns:1fr;}}
.chart-card{background:var(--panel-alt); border:1px solid var(--border); border-radius:10px; padding:18px;}
.chart-card h4{font-family:var(--font-mono); font-size:11.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim); margin:0 0 14px;}
.chart-card canvas{max-height:240px;}

/* ---------- Roteiro & Mapa ---------- */
.itin-layout{display:grid; grid-template-columns:1fr 1.15fr; gap:20px;}
@media (max-width:900px){.itin-layout{grid-template-columns:1fr;}}
.day-group{margin-bottom:18px;}
.day-group .day-label{font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--gold); margin-bottom:8px;}
.loc-item{
  display:flex; align-items:flex-start; gap:12px; background:var(--panel-alt); border:1px solid var(--border);
  border-radius:9px; padding:12px 14px; margin-bottom:8px;
}
.loc-pin-num{
  font-family:var(--font-mono); font-size:12px; font-weight:600; width:24px; height:24px; border-radius:50%;
  background:var(--gold); color:#20160A; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px;
}
.loc-body{flex:1; min-width:0;}
.loc-body .name{font-weight:600; font-size:14.5px;}
.loc-body .notes{font-size:13px; color:var(--text-dim); margin-top:3px; line-height:1.5;}
.loc-body .spend{font-family:var(--font-mono); font-size:12px; color:var(--teal); margin-top:4px;}
.loc-actions{display:flex; gap:2px; flex-shrink:0;}

.map-canvas{
  position:relative; width:100%; aspect-ratio:784/510; border-radius:12px; overflow:hidden;
  border:1px solid var(--border);
  background:
    radial-gradient(circle at 20% 25%, rgba(79,163,154,0.10), transparent 40%),
    radial-gradient(circle at 75% 15%, rgba(201,162,77,0.09), transparent 38%),
    radial-gradient(circle at 60% 75%, rgba(169,130,159,0.09), transparent 42%),
    var(--bg-alt);
}
.map-canvas.placing{cursor:crosshair;}
.map-canvas svg.routes{position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:1;}
svg.world-bg{position:absolute; inset:0; width:100%; height:100%; z-index:0;}
svg.world-bg path{fill:rgba(124,151,184,0.30); stroke:rgba(237,230,211,0.28); stroke-width:0.6; transition:fill .2s ease;}
svg.world-bg path:hover{fill:rgba(201,162,77,0.35);}
.map-credit{font-size:10.5px; color:var(--text-dim); opacity:.7; margin-top:4px;}
.map-pin{
  position:absolute; transform:translate(-50%,-100%); display:flex; flex-direction:column; align-items:center;
  cursor:pointer; z-index:2;
}
.map-pin .dot{
  width:26px; height:26px; border-radius:50% 50% 50% 0; background:var(--gold); border:2px solid var(--bg-alt);
  transform:rotate(-45deg); display:flex; align-items:center; justify-content:center; box-shadow:0 2px 6px rgba(0,0,0,.4);
}
.map-pin .dot span{transform:rotate(45deg); font-family:var(--font-mono); font-size:11px; font-weight:700; color:#20160A;}
.map-pin:hover .dot{filter:brightness(1.15);}
.map-empty-hint{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center; text-align:center;
  color:var(--text-dim); font-size:13.5px; padding:30px; pointer-events:none;
}
.map-popover{
  position:absolute; transform:translate(-50%,calc(-100% - 32px)); background:var(--panel); border:1px solid var(--border);
  border-radius:9px; padding:12px 14px; width:200px; z-index:5; box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.map-popover h5{margin:0 0 4px; font-family:var(--font-display); font-size:15px;}
.map-popover .day{font-family:var(--font-mono); font-size:10.5px; color:var(--gold); text-transform:uppercase; margin-bottom:6px;}
.map-popover .spend{font-family:var(--font-mono); font-size:13px; color:var(--teal);}
.map-popover .notes{font-size:12.5px; color:var(--text-dim); margin-top:6px; line-height:1.5;}
.map-legend{margin-top:12px; font-size:12px; color:var(--text-dim); display:flex; align-items:center; gap:8px;}

/* ---------- Despesas (ticket rows) ---------- */
.expense-toolbar{display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap;}
.filter-row{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
.ticket{
  position:relative; display:flex; align-items:center; gap:14px; background:var(--panel-alt);
  border:1px dashed var(--border); border-radius:8px; padding:13px 16px; margin-bottom:10px;
}
.ticket::before, .ticket::after{
  content:""; position:absolute; width:14px; height:14px; border-radius:50%; background:var(--panel); top:50%; transform:translateY(-50%);
}
.ticket::before{left:-8px;} .ticket::after{right:-8px;}
.ticket .cat-chip{
  width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;
}
.ticket .info{flex:1; min-width:0;}
.ticket .info .desc{font-weight:600; font-size:14px;}
.ticket .info .meta{font-family:var(--font-mono); font-size:11.5px; color:var(--text-dim); margin-top:2px;}
.ticket .amount{font-family:var(--font-mono); font-weight:600; font-size:15.5px; white-space:nowrap;}
.ticket .actions{display:flex; gap:0; flex-shrink:0;}

/* ---------- Orçamento ---------- */
.budget-total-row{display:flex; align-items:center; gap:12px; margin-bottom:22px; flex-wrap:wrap;}
.budget-total-row label{font-family:var(--font-mono); font-size:12px; text-transform:uppercase; color:var(--text-dim);}
.cat-budget-row{margin-bottom:16px;}
.cat-budget-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; gap:10px; flex-wrap:wrap;}
.cat-budget-head .name{display:flex; align-items:center; gap:8px; font-weight:600; font-size:14px;}
.cat-budget-head .nums{font-family:var(--font-mono); font-size:12.5px; color:var(--text-dim);}
.bar-track{height:9px; border-radius:5px; background:#0B141F; overflow:hidden; border:1px solid var(--border);}
.bar-fill{height:100%; border-radius:5px; transition:width .5s ease;}
.cat-input{width:110px;}

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed; inset:0; background:rgba(4,8,14,.68); display:flex; align-items:center; justify-content:center;
  z-index:50; padding:16px; backdrop-filter:blur(2px);
}
.modal{
  background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:26px; width:100%; max-width:440px;
  max-height:88vh; overflow-y:auto;
}
.modal h3{font-family:var(--font-display); font-size:21px; margin:0 0 18px;}
.field{margin-bottom:14px; display:flex; flex-direction:column; gap:6px;}
.field label{font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-dim);}
.field-row{display:flex; gap:10px;}
.field-row .field{flex:1;}
.modal-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:20px;}
.mini-map{
  width:100%; aspect-ratio:784/510; border-radius:10px; position:relative; overflow:hidden; cursor:crosshair;
  border:1px solid var(--border);
  background:
    radial-gradient(circle at 20% 25%, rgba(79,163,154,0.10), transparent 40%),
    radial-gradient(circle at 75% 15%, rgba(201,162,77,0.09), transparent 38%),
    var(--bg-alt);
}
.mini-map .hint{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:12px; text-align:center; padding:14px; pointer-events:none; z-index:2;}
.mini-map .pin-preview{
  position:absolute; width:20px; height:20px; border-radius:50% 50% 50% 0; background:var(--gold); transform:translate(-50%,-100%) rotate(-45deg);
  border:2px solid var(--bg-alt); z-index:2;
}

::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-thumb{background:var(--panel-alt); border-radius:6px;}

.visually-hidden{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0);}

/* ---------- Tema claro, mobile e fundos ---------- */
:root[data-theme="light"]{
  --bg:#F4F7FB; --bg-alt:#EAF0F7; --panel:#FFFFFF; --panel-alt:#F5F8FC;
  --linen:#17324D; --linen-dim:#48627A; --gold:#B97816; --gold-dim:#D7A34E;
  --teal:#147D75; --coral:#C94E43; --sage:#3F8B59; --slate-blue:#5277A3;
  --mauve:#946987; --text:#172B3E; --text-dim:#61758A; --border:rgba(23,43,62,.14);
}
:root[data-theme="light"] body{background:linear-gradient(145deg,#F8FAFD,#EDF3F9 55%,#F8FAFD);}
:root[data-theme="light"] .btn:hover{background:#E7EEF7;}
:root[data-theme="light"] .btn-primary{color:#fff;}
:root[data-theme="light"] .bar-track{background:#E1E8F0;}
:root[data-theme="light"] .ticket::before,:root[data-theme="light"] .ticket::after{background:var(--panel);}
.theme-btn{display:inline-flex;align-items:center;gap:7px;}
.fund-card{background:linear-gradient(135deg,rgba(79,163,154,.12),rgba(201,162,77,.10));border:1px solid var(--border);border-radius:12px;padding:17px;margin-bottom:12px;}
.fund-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.fund-progress{height:8px;background:var(--bg-alt);border-radius:999px;overflow:hidden;margin-top:12px;border:1px solid var(--border);}
.fund-progress>span{display:block;height:100%;background:var(--teal);border-radius:999px;}
.address-search{display:flex;gap:8px;}.address-search input{flex:1;min-width:0;}.search-results{display:grid;gap:7px;margin-top:8px;max-height:190px;overflow:auto;}.search-result{width:100%;text-align:left;background:var(--panel-alt);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:9px 10px;cursor:pointer;font-size:12.5px;line-height:1.4;}.search-result:hover{border-color:var(--gold);}
@media(max-width:640px){
  .app{padding:14px 12px 76px}.header{align-items:flex-start;margin-bottom:14px}.trip-picker{width:100%;display:grid;grid-template-columns:1fr 1fr}.trip-picker select{grid-column:1/-1;width:100%}.trip-picker .btn{padding:10px 8px;font-size:10.5px}.tabs{position:sticky;top:0;z-index:20;background:var(--bg);margin:0 -12px 14px;padding:8px 12px;gap:5px}.tab{padding:9px 12px;font-size:10.5px;border-radius:9px;border-bottom:1px solid var(--border)}.panel{padding:18px 14px;border-radius:12px}.ticket{gap:9px;padding:12px 10px}.ticket .amount{font-size:13px}.field-row{flex-direction:column;gap:0}.modal{padding:20px 16px}.stat-row{grid-template-columns:1fr 1fr!important}.address-search{flex-direction:column}.fund-head{flex-direction:column}}

@media (prefers-reduced-motion: reduce){*{animation:none !important; transition:none !important;}}
</style>
</head>

</div>

<script>
/* ============================= DATA LAYER ============================= */
const CATEGORIES = [
  {key:'alojamento', label:'Alojamento', icon:'🛏️', color:'#7C97B8'},
  {key:'alimentacao', label:'Alimentação', icon:'🍽️', color:'#C9A24D'},
  {key:'transporte', label:'Transporte', icon:'🚗', color:'#4FA39A'},
  {key:'atividades', label:'Atividades', icon:'🎟️', color:'#A9829F'},
  {key:'compras', label:'Compras', icon:'🛍️', color:'#86AE8C'},
  {key:'outros', label:'Outros', icon:'📎', color:'#C1573E'},
];
const CURRENCIES = ['EUR','USD','GBP','BRL'];
const BOOKING_CATEGORIES = [
  {key:'voo', label:'Voo', icon:'✈️'},
  {key:'alojamento', label:'Alojamento', icon:'🏨'},
  {key:'transporte', label:'Transporte', icon:'🚗'},
  {key:'atividade', label:'Atividade', icon:'🎫'},
  {key:'outro', label:'Outro', icon:'📄'},
];

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function catInfo(key){ return CATEGORIES.find(c=>c.key===key) || CATEGORIES[CATEGORIES.length-1]; }
function fmtMoney(amount, currency){
  try{ return new Intl.NumberFormat('pt-PT', {style:'currency', currency: currency || 'EUR'}).format(amount||0); }
  catch(e){ return (amount||0).toFixed(2) + ' ' + (currency||'EUR'); }
}
function todayLocalISO(){
  // Avoids the classic toISOString() UTC-shift bug that can push the date back by one day
  const d = new Date();
  const off = d.getTimezoneOffset();
  const local = new Date(d.getTime() - off*60000);
  return local.toISOString().slice(0,10);
}
function fmtDateShort(dateStr){
  if(!dateStr) return '—';
  const d = new Date(dateStr + 'T00:00:00');
  if(isNaN(d)) return dateStr;
  return d.toLocaleDateString('pt-PT', {day:'2-digit', month:'short'});
}

/* ---- Local device storage: uses Claude's window.storage when running as an artifact,
       falls back to localStorage when opened as a standalone/hosted file. Device-only, not shared. ---- */
const HAS_CLAUDE_STORAGE = (typeof window.storage !== 'undefined' && window.storage);
async function deviceGet(key){
  if(HAS_CLAUDE_STORAGE){
    try{ const r = await window.storage.get(key, false); return r ? r.value : null; }catch(e){ return null; }
  }
  try{ return localStorage.getItem(key); }catch(e){ return null; }
}
async function deviceSet(key, value){
  if(HAS_CLAUDE_STORAGE){
    try{ await window.storage.set(key, value, false); }catch(e){ console.error('Erro a guardar', key, e); }
    return;
  }
  try{ localStorage.setItem(key, value); }catch(e){ console.error('Erro a guardar', key, e); }
}
async function deviceDelete(key){
  if(HAS_CLAUDE_STORAGE){ try{ await window.storage.delete(key, false); }catch(e){} return; }
  try{ localStorage.removeItem(key); }catch(e){}
}

async function getTripsIndex(){
  try{ const v = await deviceGet('trips-index'); return v ? JSON.parse(v) : []; }catch(e){ return []; }
}
async function saveTripsIndex(list){ await deviceSet('trips-index', JSON.stringify(list)); }
async function getTripData(id){
  try{ const v = await deviceGet('trip:'+id); return v ? JSON.parse(v) : null; }catch(e){ return null; }
}
async function saveTripData(id, data){ await deviceSet('trip:'+id, JSON.stringify(data)); }
async function deleteTripData(id){ await deviceDelete('trip:'+id); }

/* ---- GitHub sync: stores one combined JSON file in a private repo, used as shared storage. ---- */
function utf8ToBase64(str){ return btoa(unescape(encodeURIComponent(str))); }
function base64ToUtf8(str){ return decodeURIComponent(escape(atob(str.replace(/\n/g,'')))); }

async function loadSyncSettings(){
  try{
    const v = await deviceGet('github-sync-settings');
    state.sync = v ? {...state.sync, ...JSON.parse(v)} : state.sync;
  }catch(e){}
}
async function saveSyncSettings(){
  const {owner, repo, path, branch, token, enabled, sha, lastSyncedAt} = state.sync;
  await deviceSet('github-sync-settings', JSON.stringify({owner, repo, path, branch, token, enabled, sha, lastSyncedAt}));
}
function syncConfigured(){
  const s = state.sync;
  return !!(s.enabled && s.owner && s.repo && s.token);
}
function setSyncStatus(msg){
  state.sync.statusMsg = msg;
  const el = document.getElementById('syncStatus');
  if(el) el.textContent = msg;
}
function githubUrl(){
  const {owner, repo, path} = state.sync;
  return `https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/contents/${encodeURIComponent(path || 'travel-data.json')}`;
}
async function githubGet(){
  const res = await fetch(githubUrl() + `?ref=${encodeURIComponent(state.sync.branch||'main')}`, {
    headers: { 'Authorization': `Bearer ${state.sync.token}`, 'Accept':'application/vnd.github+json' }
  });
  return res;
}
async function githubPut(body){
  const res = await fetch(githubUrl(), {
    method:'PUT',
    headers: { 'Authorization': `Bearer ${state.sync.token}`, 'Accept':'application/vnd.github+json', 'Content-Type':'application/json' },
    body: JSON.stringify(body)
  });
  return res;
}

let pushTimer = null;
function schedulePush(){
  if(!syncConfigured()) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(()=>{ pushToGitHub(); }, 1200);
}

async function pushToGitHub(){
  if(!syncConfigured()) return;
  setSyncStatus('A enviar…');
  try{
    const getRes = await githubGet();
    let sha;
    if(getRes.status===200){ const j = await getRes.json(); sha = j.sha; }
    else if(getRes.status!==404){ throw new Error('Erro HTTP '+getRes.status+' ao ler o ficheiro remoto'); }

    const tripsData = {};
    for(const t of state.trips){
      tripsData[t.id] = (t.id===state.currentTripId) ? state.currentData : await getTripData(t.id);
    }
    const payload = { updatedAt: new Date().toISOString(), trips: state.trips, tripsData };
    const body = {
      message: 'Atualizar diário de viagem — ' + new Date().toLocaleString('pt-PT'),
      content: utf8ToBase64(JSON.stringify(payload, null, 2)),
      branch: state.sync.branch || 'main',
    };
    if(sha) body.sha = sha;
    const putRes = await githubPut(body);
    if(!putRes.ok){ const j = await putRes.json().catch(()=>({})); throw new Error(j.message || ('Erro HTTP '+putRes.status)); }
    const putJson = await putRes.json();
    state.sync.sha = putJson.content.sha;
    state.sync.lastSyncedAt = new Date().toISOString();
    await saveSyncSettings();
    setSyncStatus('Sincronizado às ' + new Date().toLocaleTimeString('pt-PT'));
  }catch(err){
    console.error(err);
    setSyncStatus('Falha ao sincronizar: ' + err.message);
  }
}

async function pullFromGitHub(){
  if(!syncConfigured()) return false;
  setSyncStatus('A ler dados partilhados…');
  try{
    const res = await githubGet();
    if(res.status===404){ setSyncStatus('Ainda não há dados partilhados neste repositório.'); return false; }
    if(!res.ok){ const j = await res.json().catch(()=>({})); throw new Error(j.message || ('Erro HTTP '+res.status)); }
    const json = await res.json();
    state.sync.sha = json.sha;
    const remote = JSON.parse(base64ToUtf8(json.content));
    await saveTripsIndex(remote.trips || []);
    for(const id of Object.keys(remote.tripsData || {})){
      await saveTripData(id, ensureShape(remote.tripsData[id]));
    }
    state.trips = remote.trips || [];
    if(state.trips.length){
      const stillExists = state.trips.find(t=>t.id===state.currentTripId);
      state.currentTripId = stillExists ? state.currentTripId : state.trips[0].id;
      state.currentData = ensureShape(await getTripData(state.currentTripId));
    } else {
      state.currentTripId = null;
      state.currentData = null;
    }
    await saveSyncSettings();
    setSyncStatus('Sincronizado às ' + new Date().toLocaleTimeString('pt-PT'));
    return true;
  }catch(err){
    console.error(err);
    setSyncStatus('Falha ao sincronizar: ' + err.message);
    return false;
  }
}

function blankTripData(info){
  return {
    info,
    locations: [],
    expenses: [],
    bookings: [],
    people: [],
    advances: [],
    budgetCategories: CATEGORIES.map(c=>({key:c.key, planned:0})),
  };
}
function ensureShape(data){
  if(!data) return data;
  if(!data.bookings) data.bookings = [];
  if(!data.locations) data.locations = [];
  if(!data.expenses) data.expenses = [];
  if(!data.people) data.people = [];
  if(!data.advances) data.advances = [];
  data.expenses.forEach(e=>{ if(e.advanceId===undefined) e.advanceId=null; });
  if(!data.budgetCategories) data.budgetCategories = CATEGORIES.map(c=>({key:c.key, planned:0}));
  return data;
}

function exportTripData(){
  if(!state.currentData){ alert('Cria ou escolhe uma viagem primeiro.'); return; }
  try{
    const payload = {
      exportedAt: new Date().toISOString(),
      appVersion: 1,
      trip: state.currentData,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const safeName = (state.currentData.info.name||'viagem').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
    a.href = url;
    a.download = `diario-viagem-${safeName || 'export'}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }catch(e){
    console.error(e);
    alert('Não foi possível criar o ficheiro de exportação neste ambiente. Tenta copiar os dados manualmente ou usar outro navegador.');
  }
}

function normalizeImportedTrip(tripData){
  if(!tripData.info.id) tripData.info.id = uid();
  if(!tripData.info.currency) tripData.info.currency = 'EUR';
  if(tripData.info.budgetTotal==null) tripData.info.budgetTotal = 0;
  tripData.people = (tripData.people||[]).map(p=>({ id: p.id || uid(), name: p.name||'' })).filter(p=>p.name);
  tripData.locations = (tripData.locations||[]).map((l,i)=>({
    id: l.id || uid(), name: l.name||'', day: l.day||'', time: l.time||'', notes: l.notes||'',
    x: l.x!=null ? l.x : null, y: l.y!=null ? l.y : null, order: l.order!=null ? l.order : i,
  }));
  tripData.expenses = (tripData.expenses||[]).map(e=>({
    id: e.id || uid(), date: e.date||'', categoryKey: CATEGORIES.some(c=>c.key===e.categoryKey) ? e.categoryKey : 'outros',
    description: e.description||'', amount: Number(e.amount)||0, locationId: e.locationId||null,
    paidBy: e.paidBy||null, splitWith: Array.isArray(e.splitWith) ? e.splitWith : [],
  }));
  tripData.bookings = (tripData.bookings||[]).map(b=>({
    id: b.id || uid(), category: BOOKING_CATEGORIES.some(c=>c.key===b.category) ? b.category : 'outro',
    provider: b.provider||'', code: b.code||'', dateFrom: b.dateFrom||'', dateTo: b.dateTo||'',
    notes: b.notes||'', link: b.link||'',
  }));
  const catKeys = CATEGORIES.map(c=>c.key);
  tripData.budgetCategories = catKeys.map(key=>{
    const found = (tripData.budgetCategories||[]).find(b=>b.key===key);
    return { key, planned: found ? Number(found.planned)||0 : 0 };
  });
  // reconcile locationId references that don't match any imported location
  const locIds = new Set(tripData.locations.map(l=>l.id));
  tripData.expenses.forEach(e=>{ if(e.locationId && !locIds.has(e.locationId)) e.locationId = null; });
  const peopleIds = new Set(tripData.people.map(p=>p.id));
  tripData.expenses.forEach(e=>{
    if(e.paidBy && !peopleIds.has(e.paidBy)) e.paidBy = null;
    e.splitWith = (e.splitWith||[]).filter(id=>peopleIds.has(id));
  });
  return tripData;
}

async function importTripData(e){
  const file = e.target.files[0];
  e.target.value = '';
  if(!file) return;
  try{
    const text = await file.text();
    const parsed = JSON.parse(text);
    let tripData = ensureShape(parsed.trip || parsed);
    if(!tripData || !tripData.info || !tripData.info.name){ alert('Este ficheiro não parece ser uma exportação válida do Diário de Viagem.'); return; }
    tripData = normalizeImportedTrip(tripData);
    const existing = state.trips.find(t=>t.id===tripData.info.id);
    if(existing && !confirm(`Já existe uma viagem "${existing.name}" com este mesmo identificador. Queres substituir os dados guardados por este ficheiro?`)) return;
    if(!existing){
      state.trips.push(pickIndexFields(tripData.info));
    } else {
      const idx = state.trips.findIndex(t=>t.id===tripData.info.id);
      state.trips[idx] = pickIndexFields(tripData.info);
    }
    await saveTripsIndex(state.trips);
    await saveTripData(tripData.info.id, tripData);
    state.currentTripId = tripData.info.id;
    state.currentData = tripData;
    renderHeader();
    renderCurrentTab();
    alert('Viagem importada com sucesso.');
  }catch(err){
    console.error(err);
    alert('Não foi possível ler este ficheiro. Confirma que é um ficheiro exportado por esta ferramenta.');
  }
}

/* ============================= DASHBOARD ============================= */
function renderDashboard(el){
  const info = state.currentData.info;
  const expenses = state.currentData.expenses;
  const totalSpent = expenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const totalBudget = Number(info.budgetTotal||0);
  const remaining = totalBudget - totalSpent;
  const pct = totalBudget>0 ? Math.min(100, Math.round((totalSpent/totalBudget)*100)) : 0;
  const days = daysBetween(info.startDate, info.endDate);

  el.innerHTML = `
    <h2 class="section-title">Resumo da viagem</h2>
    <div class="hero-progress">
      <div class="ring-wrap">
        ${ringSvg(pct)}
        <div class="ring-label"><div class="pct">${pct}%</div><div class="cap">usado</div></div>
      </div>
      <div class="desc">
        <h3>${totalSpent>totalBudget && totalBudget>0 ? 'Orçamento ultrapassado' : 'Dentro do plano'}</h3>
        <p>Gastaste ${fmtMoney(totalSpent, info.currency)} de um total planeado de ${fmtMoney(totalBudget, info.currency)}.
        ${remaining>=0 ? `Ainda tens ${fmtMoney(remaining, info.currency)} disponíveis.` : `Excedeste em ${fmtMoney(Math.abs(remaining), info.currency)}.`}</p>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat-card"><div class="label">Orçamento total</div><div class="value">${fmtMoney(totalBudget, info.currency)}</div></div>
      <div class="stat-card"><div class="label">Gasto total</div><div class="value ${totalSpent>totalBudget && totalBudget>0?'over':''}">${fmtMoney(totalSpent, info.currency)}</div></div>
      <div class="stat-card"><div class="label">Restante</div><div class="value ${remaining<0?'over':'ok'}">${fmtMoney(remaining, info.currency)}</div></div>
      <div class="stat-card"><div class="label">Duração</div><div class="value">${days!=null ? days+' dias' : '—'}</div></div>
    </div>

    <div class="chart-row">
      <div class="chart-card">
        <h4>Gastos por categoria</h4>
        <canvas id="catChart"></canvas>
      </div>
      <div class="chart-card">
        <h4>Gastos por dia</h4>
        <canvas id="dayChart"></canvas>
      </div>
    </div>
  `;

  renderCategoryChart(expenses, info.currency);
  renderDayChart(expenses, info.currency);
}

function ringSvg(pct){
  const r = 52, c = 2*Math.PI*r;
  const offset = c - (pct/100)*c;
  const color = pct>=100 ? 'var(--coral)' : (pct>=80 ? 'var(--gold)' : 'var(--teal)');
  return `<svg width="130" height="130" viewBox="0 0 130 130">
    <circle cx="65" cy="65" r="${r}" fill="none" stroke="#0B141F" stroke-width="12"/>
    <circle cx="65" cy="65" r="${r}" fill="none" stroke="${color}" stroke-width="12" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${offset}" transform="rotate(-90 65 65)"
      style="transition:stroke-dashoffset .6s ease"/>
  </svg>`;
}

function daysBetween(start, end){
  if(!start || !end) return null;
  const a = new Date(start+'T00:00:00'), b = new Date(end+'T00:00:00');
  if(isNaN(a)||isNaN(b)) return null;
  return Math.max(1, Math.round((b-a)/86400000)+1);
}

function renderCategoryChart(expenses, currency){
  const ctx = document.getElementById('catChart');
  if(!ctx) return;
  const totals = CATEGORIES.map(c => expenses.filter(e=>e.categoryKey===c.key).reduce((s,e)=>s+Number(e.amount||0),0));
  if(state.charts.cat) state.charts.cat.destroy();
  if(totals.every(t=>t===0)){

function renderMapCanvas(){
  const wrap = document.getElementById('mapCanvas');
  if(!wrap) return;
  const locs = [...state.currentData.locations].filter(l=>l.x!=null && l.y!=null).sort((a,b)=>(a.order||0)-(b.order||0));
  let html = worldMapBgSvg();
  if(!locs.length){
    html += `<div class="map-empty-hint">O mapa fica aqui — adiciona uma paragem e posiciona-a no mapa para veres o percurso.</div>`;
  }
  // route lines
  if(locs.length>1){
    let path = locs.map(l=>`${l.x},${l.y}`).join(' ');
    html += `<svg class="routes" viewBox="0 0 100 100" preserveAspectRatio="none"><polyline points="${path}" fill="none" stroke="#C9A24D" stroke-width="0.6" stroke-dasharray="2,2" opacity="0.7" vector-effect="non-scaling-stroke"/></svg>`;
  }
  locs.forEach((loc, i)=>{
    html += `<div class="map-pin" style="left:${loc.x}%; top:${loc.y}%;" onclick="event.stopPropagation(); toggleMapPopover('${loc.id}')">
      <div class="dot"><span>${i+1}</span></div>
    </div>`;
  });
  wrap.innerHTML = html;

  if(state.mapPopoverId){
    const loc = state.currentData.locations.find(l=>l.id===state.mapPopoverId);
    if(loc && loc.x!=null){
      const spend = state.currentData.expenses.filter(e=>e.locationId===loc.id).reduce((s,e)=>s+Number(e.amount||0),0);
      const pop = document.createElement('div');
      pop.className = 'map-popover';
      pop.style.left = loc.x+'%';
      pop.style.top = loc.y+'%';
      pop.innerHTML = `
        <div class="day">${loc.day ? fmtDateShort(loc.day) : 'Sem data'}${loc.time ? ' · '+loc.time : ''}</div>
        <h5>${escapeHtml(loc.name)}</h5>
        ${spend>0 ? `<div class="spend">${fmtMoney(spend, state.currentData.info.currency)}</div>` : `<div class="spend" style="color:var(--text-dim)">Sem gastos associados</div>`}
        ${loc.notes ? `<div class="notes">${escapeHtml(loc.notes)}</div>` : ''}
      `;
      wrap.appendChild(pop);
    }
  }
  wrap.onclick = ()=>{ if(state.mapPopoverId){ state.mapPopoverId=null; renderMapCanvas(); } };
}
function toggleMapPopover(id){
  state.mapPopoverId = state.mapPopoverId === id ? null : id;

}

function deleteDayGroup(day){

/* ============================= SALDO (quem pagou / quem deve) ============================= */
function personName(id){
  const p = state.currentData.people.find(x=>x.id===id);
  return p ? p.name : null;
}

function advanceUsage(){
  const usage={}; (state.currentData.advances||[]).forEach(a=>usage[a.id]=0);
  state.currentData.expenses.forEach(e=>{ if(e.advanceId && usage.hasOwnProperty(e.advanceId)) usage[e.advanceId]+=Number(e.amount||0); });
  return usage;
}
function computeBalances(){
  const people = state.currentData.people;
  const paid = {}, owed = {}, funded = {};
  people.forEach(p=>{ paid[p.id]=0; owed[p.id]=0; funded[p.id]=0; });
  let unassignedCount = 0, unassignedTotal = 0;
  const advancesById=Object.fromEntries((state.currentData.advances||[]).map(a=>[a.id,a]));
  state.currentData.expenses.forEach(e=>{
    let effectivePayer=e.paidBy;
    if(e.advanceId && advancesById[e.advanceId]) effectivePayer=advancesById[e.advanceId].ownerId;
    if(!effectivePayer || !paid.hasOwnProperty(effectivePayer)){ unassignedCount++; unassignedTotal += Number(e.amount||0); return; }
    paid[effectivePayer] += Number(e.amount||0);
    const participants = (e.splitWith && e.splitWith.length) ? e.splitWith.filter(id=>owed.hasOwnProperty(id)) : people.map(p=>p.id);
    if(!participants.length) return;
    const share = Number(e.amount||0) / participants.length;
    participants.forEach(id=>{ owed[id] += share; });
  });
  (state.currentData.advances||[]).forEach(a=>{ if(funded.hasOwnProperty(a.ownerId)) funded[a.ownerId]+=Number(a.amount||0); });
  const net = {};
  people.forEach(p=>{ net[p.id] = round2(paid[p.id] - owed[p.id]); });
  return { paid, owed, funded, net, unassignedCount, unassignedTotal };
}
function round2(n){ return Math.round(n*100)/100; }

function simplifyDebts(net){
  const creditors = [], debtors = [];
  Object.entries(net).forEach(([id, amt])=>{
    if(amt > 0.01) creditors.push({id, amt});
    else if(amt < -0.01) debtors.push({id, amt:-amt});
  });
  creditors.sort((a,b)=>b.amt-a.amt);
  debtors.sort((a,b)=>b.amt-a.amt);
  const settlements = [];
  let i=0, j=0;
  while(i<debtors.length && j<creditors.length){
    const pay = Math.min(debtors[i].amt, creditors[j].amt);
    settlements.push({from:debtors[i].id, to:creditors[j].id, amount: round2(pay)});
    debtors[i].amt -= pay;
    creditors[j].amt -= pay;
    if(debtors[i].amt < 0.01) i++;
    if(creditors[j].amt < 0.01) j++;
  }
  return settlements;
}

function openAdvanceModal(){
  const people=state.currentData.people;
  openModal(`<h3>Novo fundo de viagem</h3><div class="field"><label>Nome</label><input id="a_label" value="Dinheiro levantado" placeholder="Ex: Caixa comum"></div><div class="field-row"><div class="field"><label>Valor (${state.currentData.info.currency})</label><input type="number" min="0" step="0.01" id="a_amount"></div><div class="field"><label>Data</label><input type="date" id="a_date"></div></div><div class="field"><label>Financiado por</label><select id="a_owner">${people.map(p=>`<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('')}</select></div><p style="font-size:12px;color:var(--text-dim);line-height:1.5;">Este valor é saldo disponível, não uma despesa. Nas despesas podes selecionar este fundo como origem do pagamento.</p><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="saveAdvanceBtn">Criar fundo</button></div>`);
  document.getElementById('saveAdvanceBtn').onclick=()=>{const amount=Number(document.getElementById('a_amount').value);if(amount<=0){alert('Indica um valor válido.');return;}state.currentData.advances.push({id:uid(),label:document.getElementById('a_label').value.trim()||'Fundo de viagem',amount,date:document.getElementById('a_date').value,ownerId:document.getElementById('a_owner').value});persistCurrentTrip();closeModal();renderSaldo(document.getElementById('panelContent'));};
}
function deleteAdvance(id){
  if(state.currentData.expenses.some(e=>e.advanceId===id)){alert('Este fundo já está associado a despesas. Altera primeiro essas despesas.');return;}
  if(!confirm('Eliminar este fundo?'))return; state.currentData.advances=state.currentData.advances.filter(a=>a.id!==id);persistCurrentTrip();renderSaldo(document.getElementById('panelContent'));
}

function renderSaldoDetails(){
  const people = state.currentData.people;
  const currency = state.currentData.info.currency;
  const { paid, owed, funded, net, unassignedCount, unassignedTotal } = computeBalances();
  const settlements = simplifyDebts(net);

  return `
    <div class="stat-row" style="grid-template-columns:repeat(${Math.min(people.length,4)},1fr);">
      ${people.map(p=>`
        <div class="stat-card">
          <div class="label">${escapeHtml(p.name)}</div>
          <div class="value ${net[p.id]>0?'ok':(net[p.id]<0?'over':'')}">${net[p.id]>=0?'+':''}${fmtMoney(net[p.id], currency)}</div>
          <div style="font-family:var(--font-mono); font-size:11px; color:var(--text-dim); margin-top:4px;">pagou ${fmtMoney(paid[p.id], currency)} · parte ${fmtMoney(owed[p.id], currency)} · fundos ${fmtMoney(funded[p.id], currency)}</div>
        </div>
      `).join('')}
    </div>

    <h4 style="font-family:var(--font-mono); font-size:11.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim); margin:22px 0 12px;">Para acertar contas</h4>
    ${settlements.length ? settlements.map(s=>`
      <div class="ticket">
        <div class="cat-chip" style="background:#4FA39A22; border:1px solid #4FA39A55;">💸</div>
        <div class="info">
          <div class="desc">${escapeHtml(personName(s.from))} → ${escapeHtml(personName(s.to))}</div>
          <div class="meta">Para ficarem equilibrados</div>
        </div>
        <div class="amount">${fmtMoney(s.amount, currency)}</div>
      </div>
    `).join('') : `<p style="color:var(--text-dim); font-size:14px;">Contas equilibradas — ninguém deve nada a ninguém.</p>`}

    ${unassignedCount ? `<p style="color:var(--text-dim); font-size:12.5px; margin-top:16px;">ℹ️ ${unassignedCount} despesa(s) sem "pago por" definido (total ${fmtMoney(unassignedTotal, currency)}) não entram neste cálculo. Edita-as em Despesas para as incluíres.</p>` : ''}
  `;
}

function addPerson(){
  const input = document.getElementById('newPersonName');
  const name = input.value.trim();
  if(!name) return;
  state.currentData.people.push({id:uid(), name});
  persistCurrentTrip();
  renderSaldo(document.getElementById('panelContent'));
}
function removePerson(id){
  if((state.currentData.advances||[]).some(a=>a.ownerId===id)){ alert('Esta pessoa financia um fundo. Elimina o fundo primeiro.'); return; }
  if(!confirm('Remover esta pessoa? As despesas ficam sem "pago por" se estavam associadas a ela.')) return;
  state.currentData.people = state.currentData.people.filter(p=>p.id!==id);
  state.currentData.expenses.forEach(e=>{
    if(e.paidBy===id) e.paidBy = null;
    if(e.splitWith) e.splitWith = e.splitWith.filter(x=>x!==id);
  });
  persistCurrentTrip();
  renderSaldo(document.getElementById('panelContent'));
}

/* ============================= ORÇAMENTO ============================= */
function renderOrcamento(el){
  const info = state.currentData.info;
  const cats = state.currentData.budgetCategories;
  const expenses = state.currentData.expenses;

  el.innerHTML = `
    <h2 class="section-title">Orçamento</h2>
    <div class="budget-total-row">
      <label>Orçamento total da viagem</label>
      <input type="number" min="0" step="10" id="budgetTotalInput" value="${info.budgetTotal||0}" style="width:150px;">
      <span style="color:var(--text-dim); font-size:13px;">${info.currency}</span>
      <button class="btn btn-sm" id="saveBudgetTotalBtn">Guardar</button>
    </div>

    <div id="catBudgetRows">
      ${CATEGORIES.map(c=>{
        const catData = cats.find(x=>x.key===c.key) || {planned:0};
        const spent = expenses.filter(e=>e.categoryKey===c.key).reduce((s,e)=>s+Number(e.amount||0),0);
        const planned = Number(catData.planned||0);
        const pct = planned>0 ? Math.min(100, Math.round((spent/planned)*100)) : (spent>0?100:0);
        const over = planned>0 && spent>planned;
        return `
        <div class="cat-budget-row">
          <div class="cat-budget-head">
            <div class="name">${c.icon} ${c.label}</div>
            <div class="nums">${fmtMoney(spent, info.currency)} / <input class="cat-input" data-cat="${c.key}" type="number" min="0" step="5" value="${planned}"> ${info.currency}</div>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:${over?'var(--coral)':c.color};"></div></div>
        </div>`;
      }).join('')}
    </div>
    <div class="modal-actions" style="justify-content:flex-start; margin-top:20px;">
      <button class="btn btn-primary" id="saveCatsBtn">Guardar categorias</button>
    </div>
  `;

  document.getElementById('saveBudgetTotalBtn').addEventListener('click', ()=>{
    const val = Number(document.getElementById('budgetTotalInput').value)||0;
    state.currentData.info.budgetTotal = val;
    updateTripIndexEntry();
    persistCurrentTrip();
    renderHeader();
  });
  document.getElementById('saveCatsBtn').addEventListener('click', ()=>{
    document.querySelectorAll('.cat-input').forEach(inp=>{
      const key = inp.dataset.cat;
      const val = Number(inp.value)||0;
      let entry = state.currentData.budgetCategories.find(c=>c.key===key);
      if(!entry){ entry = {key, planned:0}; state.currentData.budgetCategories.push(entry); }
      entry.planned = val;
    });
    persistCurrentTrip();
    renderOrcamento(document.getElementById('panelContent'));
  });
}

/* ============================= PERSIST HELPERS ============================= */
async function persistCurrentTrip(){
  if(!state.currentTripId) return;
  await saveTripData(state.currentTripId, state.currentData);
  schedulePush();
}
async function updateTripIndexEntry(){
  const idx = state.trips.findIndex(t=>t.id===state.currentTripId);
  if(idx>-1){
    state.trips[idx] = {...state.trips[idx], ...pickIndexFields(state.currentData.info)};
    await saveTripsIndex(state.trips);
    schedulePush();
  }
}
function pickIndexFields(info){
  return {id:info.id, name:info.name, destination:info.destination, startDate:info.startDate, endDate:info.endDate, currency:info.currency, budgetTotal:info.budgetTotal};
}

/* ============================= MODALS ============================= */
function openModal(html){
  const root = document.getElementById('modalRoot');
  root.innerHTML = `<div class="modal-overlay" id="modalOverlay"><div class="modal">${html}</div></div>`;
  document.getElementById('modalOverlay').addEventListener('click', (e)=>{ if(e.target.id==='modalOverlay') closeModal(); });
}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; state.modalPendingXY = null; }

function openTripModal(mode){
  const editing = mode==='edit';
  const info = editing ? state.currentData.info : {name:'', destination:'', startDate:'', endDate:'', currency:'EUR', budgetTotal:0};
  openModal(`
    <h3>${editing ? 'Editar viagem' : 'Nova viagem'}</h3>
    <div class="field"><label>Nome da viagem</label><input id="f_name" value="${escapeHtml(info.name)}" placeholder="Ex: Japão em Outubro"></div>
    <div class="field"><label>Destino</label><input id="f_dest" value="${escapeHtml(info.destination)}" placeholder="Ex: Tóquio, Quioto, Osaka"></div>
    <div class="field-row">
      <div class="field"><label>Data de início</label><input type="date" id="f_start" value="${info.startDate||''}"></div>
      <div class="field"><label>Data de fim</label><input type="date" id="f_end" value="${info.endDate||''}"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Moeda</label><select id="f_curr">${CURRENCIES.map(c=>`<option ${info.currency===c?'selected':''}>${c}</option>`).join('')}</select></div>
      <div class="field"><label>Orçamento total</label><input type="number" min="0" step="10" id="f_budget" value="${info.budgetTotal||0}"></div>
    </div>
    <div class="modal-actions">
      ${editing ? `<button class="btn btn-danger" id="deleteTripBtn" style="margin-right:auto;">Eliminar viagem</button>`:''}
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="saveTripBtn">${editing?'Guardar':'Criar viagem'}</button>
    </div>
  `);
  if(editing) document.getElementById('deleteTripBtn').addEventListener('click', deleteCurrentTrip);
  document.getElementById('saveTripBtn').addEventListener('click', async ()=>{
    const name = document.getElementById('f_name').value.trim() || 'Viagem sem nome';
    const destination = document.getElementById('f_dest').value.trim();
    const startDate = document.getElementById('f_start').value;
    const endDate = document.getElementById('f_end').value;
    const currency = document.getElementById('f_curr').value;
    const budgetTotal = Number(document.getElementById('f_budget').value)||0;

    if(editing){
      Object.assign(state.currentData.info, {name, destination, startDate, endDate, currency, budgetTotal});
      await updateTripIndexEntry();
      await persistCurrentTrip();
    } else {
      const id = uid();
      const info = {id, name, destination, startDate, endDate, currency, budgetTotal};
      const data = blankTripData(info);
      state.trips.push(pickIndexFields(info));
      await saveTripsIndex(state.trips);
      await saveTripData(id, data);
      state.currentTripId = id;
      state.currentData = data;
      schedulePush();
    }
    closeModal();
    renderHeader();
    renderCurrentTab();
  });
}

async function deleteCurrentTrip(){
  if(!confirm('Eliminar esta viagem e todos os seus dados? Esta ação não pode ser desfeita.')) return;
  const id = state.currentTripId;
  state.trips = state.trips.filter(t=>t.id!==id);
  await saveTripsIndex(state.trips);
  await deleteTripData(id);
  schedulePush();
  if(state.trips.length){
    state.currentTripId = state.trips[0].id;
    state.currentData = ensureShape(await getTripData(state.currentTripId));
  } else {
    state.currentTripId = null;
    state.currentData = null;
  }
  closeModal();
  renderHeader();
  renderCurrentTab();
}

function openLocationModal(mode, id){
  const editing = mode==='edit';
  const loc = editing ? state.currentData.locations.find(l=>l.id===id) : {name:'', day:'', time:'', notes:'', x:null, y:null};
  state.modalPendingXY = (loc.x!=null) ? {x:loc.x, y:loc.y} : null;
  openModal(`
    <h3>${editing?'Editar paragem':'Nova paragem'}</h3>
    <div class="field"><label>Nome do local</label><input id="l_name" value="${escapeHtml(loc.name)}" placeholder="Ex: Templo Fushimi Inari"></div>
    <div class="field"><label>Pesquisar morada</label><div class="address-search"><input id="l_address" value="${escapeHtml(loc.address||'')}" placeholder="Ex: Praça do Comércio, Lisboa"><button class="btn btn-sm" type="button" id="searchAddressBtn">🔎 Procurar</button></div><div id="addressResults" class="search-results"></div><div style="font-size:10.5px;color:var(--text-dim);margin-top:4px;">Pesquisa gratuita por OpenStreetMap/Nominatim. A posição é adicionada automaticamente.</div></div>
    <div class="field-row">
      <div class="field"><label>Data</label><input type="date" id="l_day" value="${loc.day||''}"></div>
      <div class="field"><label>Hora (opcional)</label><input type="time" id="l_time" value="${loc.time||''}"></div>
    </div>
    <div class="field"><label>Notas (opcional)</label><textarea id="l_notes" rows="2" placeholder="Horário, dicas, reserva...">${escapeHtml(loc.notes||'')}</textarea></div>
    <div class="field">
      <label>Posição no mapa (clica para marcar)</label>
      <div class="mini-map" id="miniMap">
        ${worldMapBgSvg()}
        <div class="hint">${state.modalPendingXY ? '' : 'Clica para marcares onde fica'}</div>
      </div>
      <div class="map-credit">Mapa base: Wikimedia Commons, CC BY-SA 3.0</div>
    </div>
    <div class="modal-actions">
      ${editing ? `<button class="btn btn-danger" style="margin-right:auto;" onclick="deleteLocation('${id}'); closeModal();">Eliminar</button>`:''}
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="saveLocBtn">${editing?'Guardar':'Adicionar'}</button>
    </div>
  `);
  const miniMap = document.getElementById('miniMap');
  document.getElementById('searchAddressBtn').addEventListener('click', searchAddressForLocation);
  document.getElementById('l_address').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();searchAddressForLocation();}});
  drawMiniMapPin();
  miniMap.addEventListener('click', (e)=>{
    const rect = miniMap.getBoundingClientRect();
    const x = Math.round(((e.clientX-rect.left)/rect.width)*1000)/10;
    const y = Math.round(((e.clientY-rect.top)/rect.height)*1000)/10;
    state.modalPendingXY = {x: Math.max(2,Math.min(98,x)), y: Math.max(4,Math.min(96,y))};
    drawMiniMapPin();
  });
  function drawMiniMapPin(){
    const existing = miniMap.querySelector('.pin-preview');
    if(existing) existing.remove();
    const hint = miniMap.querySelector('.hint');
    if(state.modalPendingXY){
      hint.style.display='none';
      const pin = document.createElement('div');
      pin.className = 'pin-preview';
      pin.style.left = state.modalPendingXY.x+'%';
      pin.style.top = state.modalPendingXY.y+'%';
      miniMap.appendChild(pin);
    } else { hint.style.display='flex'; }
  }

  document.getElementById('saveLocBtn').addEventListener('click', ()=>{
    const name = document.getElementById('l_name').value.trim();
    if(!name){ alert('Dá um nome ao local.'); return; }
    const day = document.getElementById('l_day').value;
    const time = document.getElementById('l_time').value;
    const notes = document.getElementById('l_notes').value.trim();
    const address = document.getElementById('l_address').value.trim();
    const xy = state.modalPendingXY;
    if(editing){
      Object.assign(loc, {name, day, time, notes, address, x: xy?xy.x:null, y: xy?xy.y:null});
    } else {
      const order = state.currentData.locations.length;
      state.currentData.locations.push({id:uid(), name, day, time, notes, address, x: xy?xy.x:null, y: xy?xy.y:null, order});
    }
    persistCurrentTrip();
    closeModal();
    renderRoteiro(document.getElementById('panelContent'));
  });
}

async function searchAddressForLocation(){
  const q=document.getElementById('l_address').value.trim(), box=document.getElementById('addressResults');
  if(!q)return; box.innerHTML='<span style="font-size:12px;color:var(--text-dim)">A pesquisar…</span>';
  try{const res=await fetch(`https://nominatim.openstreetmap.org/search?format=jsonv2&limit=5&q=${encodeURIComponent(q)}`,{headers:{'Accept-Language':'pt'}});if(!res.ok)throw new Error('Pesquisa indisponível');const items=await res.json();box.innerHTML=items.length?items.map((r,i)=>`<button type="button" class="search-result" data-i="${i}">${escapeHtml(r.display_name)}</button>`).join(''):'<span style="font-size:12px;color:var(--text-dim)">Nenhum resultado.</span>';box.querySelectorAll('button').forEach(b=>b.onclick=()=>{const r=items[Number(b.dataset.i)];document.getElementById('l_address').value=r.display_name;if(!document.getElementById('l_name').value.trim())document.getElementById('l_name').value=(r.name||r.display_name.split(',')[0]);const lon=Number(r.lon),lat=Number(r.lat);state.modalPendingXY={x:Math.max(2,Math.min(98,(lon+180)/360*100)),y:Math.max(4,Math.min(96,(90-lat)/180*100))};drawSelectedGeocodePin();box.innerHTML='';});}catch(err){box.innerHTML=`<span style="font-size:12px;color:var(--coral)">${escapeHtml(err.message)}. Também podes marcar manualmente no mapa.</span>`;}
}
function drawSelectedGeocodePin(){const mini=document.getElementById('miniMap');if(!mini||!state.modalPendingXY)return;mini.querySelector('.pin-preview')?.remove();mini.querySelector('.hint').style.display='none';const pin=document.createElement('div');pin.className='pin-preview';pin.style.left=state.modalPendingXY.x+'%';pin.style.top=state.modalPendingXY.y+'%';mini.appendChild(pin);}

function openExpenseModal(mode, id){
  const editing = mode==='edit';
  const exp = editing ? state.currentData.expenses.find(e=>e.id===id) : {date:'', categoryKey:CATEGORIES[0].key, description:'', amount:'', locationId:'', paidBy:'', splitWith:[], advanceId:null};
  const locs = state.currentData.locations;
  const people = state.currentData.people;
  const splitWith = exp.splitWith && exp.splitWith.length ? exp.splitWith : people.map(p=>p.id);
  openModal(`
    <h3>${editing?'Editar despesa':'Nova despesa'}</h3>
    <div class="field-row">
      <div class="field">
        <label>Data (opcional)</label>
        <input type="date" id="e_date" value="${exp.date||''}">
      </div>
      <div class="field"><label>Categoria</label><select id="e_cat">${CATEGORIES.map(c=>`<option value="${c.key}" ${exp.categoryKey===c.key?'selected':''}>${c.icon} ${c.label}</option>`).join('')}</select></div>
    </div>
    <p style="font-size:12px; color:var(--text-dim); margin:-8px 0 14px; line-height:1.5;">Deixa em branco se a despesa não pertencer a um dia específico — por exemplo voos ou outras compras agregadas. Aparece como "sem data" nas estatísticas, mas continua a contar para o orçamento.</p>
    <div class="field"><label>Descrição</label><input id="e_desc" value="${escapeHtml(exp.description||'')}" placeholder="Ex: Jantar em Shibuya"></div>
    <div class="field-row">
      <div class="field"><label>Valor (${state.currentData.info.currency})</label><input type="number" min="0" step="0.01" id="e_amount" value="${exp.amount}"></div>
      <div class="field"><label>Local associado</label>
        <select id="e_loc"><option value="">— nenhum —</option>${locs.map(l=>`<option value="${l.id}" ${exp.locationId===l.id?'selected':''}>${escapeHtml(l.name)}</option>`).join('')}</select>
      </div>
    </div>
    ${people.length ? `
      ${(state.currentData.advances||[]).length ? `<div class="field"><label>Origem do pagamento</label><select id="e_advance"><option value="">Carteira pessoal</option>${state.currentData.advances.map(a=>`<option value="${a.id}" ${exp.advanceId===a.id?'selected':''}>Fundo: ${escapeHtml(a.label)}</option>`).join('')}</select><p style="font-size:11.5px;color:var(--text-dim);margin:2px 0 0;">Ao escolher um fundo, o crédito fica para quem o financiou; esta despesa reduz o saldo disponível do fundo.</p></div>` : ''}
      <div class="field"><label>Pago/realizado por</label>
        <select id="e_paidby"><option value="">— não especificado —</option>${people.map(p=>`<option value="${p.id}" ${exp.paidBy===p.id?'selected':''}>${escapeHtml(p.name)}</option>`).join('')}</select>
      </div>
      <div class="field">
        <label>Dividir com</label>
        <div style="display:flex; flex-wrap:wrap; gap:12px;">
          ${people.map(p=>`
            <label style="display:flex; align-items:center; gap:6px; font-size:13.5px; font-family:var(--font-body);">
              <input type="checkbox" class="e_split" value="${p.id}" ${splitWith.includes(p.id)?'checked':''}> ${escapeHtml(p.name)}
            </label>
          `).join('')}
        </div>
        <p style="font-size:11.5px; color:var(--text-dim); margin:2px 0 0;">Por definição divide-se por igual entre quem selecionares.</p>
      </div>
    ` : `<p style="font-size:12px; color:var(--text-dim);">Adiciona pessoas na aba "Saldo" para poderes indicar quem pagou e dividir despesas.</p>`}
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="saveExpBtn">${editing?'Guardar':'Adicionar'}</button>
    </div>
  `);
  document.getElementById('saveExpBtn').addEventListener('click', ()=>{
    const amount = Number(document.getElementById('e_amount').value);
    if(!amount || amount<=0){ alert('Indica um valor válido.'); return; }
    const paidByEl = document.getElementById('e_paidby');
    const splitEls = document.querySelectorAll('.e_split:checked');
    const payload = {
      date: document.getElementById('e_date').value,
      categoryKey: document.getElementById('e_cat').value,
      description: document.getElementById('e_desc').value.trim(),
      amount,
      locationId: document.getElementById('e_loc').value || null,
      paidBy: paidByEl ? (paidByEl.value || null) : null,
      advanceId: document.getElementById('e_advance') ? (document.getElementById('e_advance').value || null) : null,
      splitWith: splitEls ? [...splitEls].map(el=>el.value) : [],
    };
    if(payload.advanceId){ const a=state.currentData.advances.find(x=>x.id===payload.advanceId); const used=(advanceUsage()[payload.advanceId]||0)-(editing&&exp.advanceId===payload.advanceId?Number(exp.amount||0):0); if(a && used+amount>Number(a.amount||0)+0.001){ alert('Este fundo não tem saldo suficiente para esta despesa.'); return; } }
    if(editing){ Object.assign(exp, payload); }
    else { state.currentData.expenses.push({id:uid(), ...payload}); }
    persistCurrentTrip();
    closeModal();
    renderDespesas(document.getElementById('panelContent'));
  });
}

init();
</script>
</body>
</html>
