<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diário de Viagem</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#0F1B2B;
  --bg-alt:#0B141F;
  --panel:#152437;
  --panel-alt:#1C3049;
  --linen:#F1E8D3;
  --linen-dim:#DCD2B6;
  --gold:#C9A24D;
  --gold-dim:#8C7239;
  --teal:#4FA39A;
  --coral:#C1573E;
  --sage:#86AE8C;
  --slate-blue:#7C97B8;
  --mauve:#A9829F;
  --text:#EDE6D3;
  --text-dim:#93A5BB;
  --border:rgba(237,230,211,0.14);
  --font-display:'Fraunces', serif;
  --font-body:'IBM Plex Sans', sans-serif;
  --font-mono:'IBM Plex Mono', monospace;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(ellipse 900px 500px at 10% -10%, rgba(79,163,154,0.10), transparent 60%),
    radial-gradient(ellipse 700px 500px at 100% 0%, rgba(201,162,77,0.08), transparent 55%),
    var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

.app{max-width:1180px;margin:0 auto;padding:28px 20px 80px;}

/* ---------- Header ---------- */
.header{
  display:flex; align-items:flex-end; justify-content:space-between; gap:20px;
  flex-wrap:wrap; margin-bottom:22px; padding-bottom:18px; border-bottom:1px solid var(--border);
}
.brand{display:flex; flex-direction:column; gap:2px;}
.brand .eyebrow{
  font-family:var(--font-mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase;
  color:var(--gold); opacity:.9;
}
.brand h1{
  font-family:var(--font-display); font-weight:600; font-size:clamp(28px,4vw,40px); margin:2px 0 0;
  letter-spacing:-0.01em;
}
.trip-picker{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
select, input, textarea{
  font-family:var(--font-body); background:var(--panel-alt); color:var(--text);
  border:1px solid var(--border); border-radius:8px; padding:9px 12px; font-size:14px;
}
select:focus, input:focus, textarea:focus{outline:2px solid var(--gold); outline-offset:1px;}
.btn{
  font-family:var(--font-mono); font-size:12.5px; letter-spacing:.03em; text-transform:uppercase;
  border:1px solid var(--border); background:var(--panel-alt); color:var(--text);
  padding:10px 16px; border-radius:8px; cursor:pointer; transition:transform .12s ease, background .12s ease, border-color .12s ease;
  white-space:nowrap;
}
.btn:hover{background:#233a58; transform:translateY(-1px);}
.btn:focus-visible{outline:2px solid var(--gold); outline-offset:2px;}
.btn-primary{background:var(--gold); color:#20160A; border-color:var(--gold); font-weight:600;}
.btn-primary:hover{background:#DAB65E;}
.btn-ghost{background:transparent;}
.btn-danger{color:var(--coral); border-color:rgba(193,87,62,.5);}
.btn-danger:hover{background:rgba(193,87,62,.12);}
.btn-sm{padding:6px 10px; font-size:11px;}
.icon-btn{background:transparent; border:none; color:var(--text-dim); cursor:pointer; font-size:15px; padding:4px 6px; border-radius:6px;}
.icon-btn:hover{color:var(--text); background:var(--panel-alt);}

/* ---------- Tabs ---------- */
.tabs{display:flex; gap:6px; margin-bottom:24px; overflow-x:auto; padding-bottom:2px;}
.tab{
  font-family:var(--font-mono); font-size:12.5px; letter-spacing:.04em; text-transform:uppercase;
  padding:11px 18px; border-radius:10px 10px 0 0; cursor:pointer; color:var(--text-dim);
  background:var(--panel); border:1px solid var(--border); border-bottom:none; white-space:nowrap;
}
.tab.active{color:var(--gold); background:var(--panel-alt); box-shadow:inset 0 2px 0 var(--gold);}

.panel{background:var(--panel); border:1px solid var(--border); border-radius:0 12px 12px 12px; padding:26px; animation:fade .25s ease;}
@keyframes fade{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}

.empty{
  text-align:center; padding:70px 20px; color:var(--text-dim);
}
.empty h2{font-family:var(--font-display); color:var(--text); font-weight:600; font-size:24px; margin-bottom:8px;}
.empty p{max-width:420px; margin:0 auto 20px; font-size:14.5px; line-height:1.6;}

/* ---------- Dashboard ---------- */
.section-title{
  font-family:var(--font-display); font-weight:600; font-size:20px; margin:0 0 16px;
  display:flex; align-items:center; gap:8px;
}
.stat-row{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:26px;}
@media (max-width:820px){.stat-row{grid-template-columns:repeat(2,1fr);}}
.stat-card{
  background:var(--panel-alt); border:1px solid var(--border); border-radius:10px; padding:16px 18px;
}
.stat-card .label{font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-dim);}
.stat-card .value{font-family:var(--font-display); font-size:26px; font-weight:600; margin-top:6px;}
.stat-card .value.over{color:var(--coral);}
.stat-card .value.ok{color:var(--sage);}

.hero-progress{display:flex; gap:28px; align-items:center; background:var(--panel-alt); border:1px solid var(--border); border-radius:12px; padding:22px; margin-bottom:26px; flex-wrap:wrap;}
.hero-progress .ring-wrap{position:relative; width:130px; height:130px; flex-shrink:0;}
.hero-progress .ring-label{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
.hero-progress .ring-label .pct{font-family:var(--font-display); font-size:26px; font-weight:700;}
.hero-progress .ring-label .cap{font-family:var(--font-mono); font-size:10px; color:var(--text-dim); text-transform:uppercase;}
.hero-progress .desc{flex:1; min-width:220px;}
.hero-progress .desc h3{font-family:var(--font-display); margin:0 0 8px; font-size:19px;}
.hero-progress .desc p{margin:0; color:var(--text-dim); font-size:14px; line-height:1.6;}

.chart-row{display:grid; grid-template-columns:1.1fr 1.4fr; gap:18px;}
@media (max-width:820px){.chart-row{grid-template-columns:1fr;}}
.chart-card{background:var(--panel-alt); border:1px solid var(--border); border-radius:10px; padding:18px;}
.chart-card h4{font-family:var(--font-mono); font-size:11.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim); margin:0 0 14px;}
.chart-card canvas{max-height:240px;}

/* ---------- Roteiro & Mapa ---------- */
.itin-layout{display:grid; grid-template-columns:1fr 1.15fr; gap:20px;}
@media (max-width:900px){.itin-layout{grid-template-columns:1fr;}}
.day-group{margin-bottom:18px;}
.day-group .day-label{font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--gold); margin-bottom:8px;}
.loc-item{
  display:flex; align-items:flex-start; gap:12px; background:var(--panel-alt); border:1px solid var(--border);
  border-radius:9px; padding:12px 14px; margin-bottom:8px;
}
.loc-pin-num{
  font-family:var(--font-mono); font-size:12px; font-weight:600; width:24px; height:24px; border-radius:50%;
  background:var(--gold); color:#20160A; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px;
}
.loc-body{flex:1; min-width:0;}
.loc-body .name{font-weight:600; font-size:14.5px;}
.loc-body .notes{font-size:13px; color:var(--text-dim); margin-top:3px; line-height:1.5;}
.loc-body .spend{font-family:var(--font-mono); font-size:12px; color:var(--teal); margin-top:4px;}
.loc-actions{display:flex; gap:2px; flex-shrink:0;}

.map-canvas{
  position:relative; width:100%; aspect-ratio:784/510; border-radius:12px; overflow:hidden;
  border:1px solid var(--border); background:var(--bg-alt); isolation:isolate;
}
.map-canvas .leaflet-container{ background:var(--bg-alt); font-family:var(--font-body); }
.map-credit{font-size:10.5px; color:var(--text-dim); opacity:.7; margin-top:4px;}
.map-pin{ cursor:pointer; }
.map-pin:hover{ z-index:1000 !important; }
.map-pin .pin-badge{ position:relative; width:26px; height:26px; }
.map-pin .dot{
  width:26px; height:26px; border-radius:50% 50% 50% 0; background:var(--gold); border:2px solid var(--bg-alt);
  transform:rotate(-45deg); display:flex; align-items:center; justify-content:center; box-shadow:0 2px 6px rgba(0,0,0,.4);
  transition:transform .12s ease, filter .12s ease;
}
.map-pin .dot span{transform:rotate(45deg); font-size:13px; font-weight:700; color:#20160A; line-height:1;}
.map-pin:hover .dot{filter:brightness(1.15); transform:rotate(-45deg) scale(1.08);}
.map-pin .pin-num{
  position:absolute; top:-5px; right:-5px; width:15px; height:15px; border-radius:50%;
  background:var(--bg-alt); border:1.5px solid var(--panel-alt); color:var(--text-dim);
  font-family:var(--font-mono); font-size:8.5px; font-weight:700; line-height:1;
  display:flex; align-items:center; justify-content:center;
}
.pin-tip{
  position:absolute; left:50%; bottom:calc(100% + 10px); transform:translateX(-50%);
  background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:6px 10px;
  white-space:nowrap; max-width:220px; box-shadow:0 6px 18px rgba(0,0,0,.3);
  opacity:0; visibility:hidden; transition:opacity .12s ease; pointer-events:none; z-index:9;
}
.map-pin:hover .pin-tip{ opacity:1; visibility:visible; }
.pin-tip .pin-tip-cat{font-family:var(--font-mono); font-size:9.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--gold); margin-bottom:2px;}
.pin-tip .pin-tip-title{font-family:var(--font-display); font-size:13.5px; font-weight:600; color:var(--text); white-space:normal;}
.pin-tip .pin-tip-meta{font-size:11px; color:var(--text-dim); margin-top:2px;}
.map-empty-hint{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center; text-align:center;
  color:var(--text-dim); font-size:13.5px; padding:30px; pointer-events:none; z-index:400;
}
.leaflet-control-zoom{border:none !important; box-shadow:none !important; margin:10px !important;}
.leaflet-control-zoom a{
  width:30px !important; height:30px !important; line-height:28px !important; border-radius:8px !important; border:1px solid var(--border) !important;
  background:var(--panel) !important; color:var(--text) !important; font-size:16px !important; box-shadow:0 2px 6px rgba(0,0,0,.25) !important;
}
.leaflet-control-zoom a:hover{border-color:var(--gold) !important; color:var(--gold) !important;}
.leaflet-bar{border:none !important;}
.map-fit-btn{font-family:var(--font-mono);}
.leaflet-popup.map-popover-wrap .leaflet-popup-content-wrapper{
  background:var(--panel); border:1px solid var(--border); border-radius:9px; box-shadow:0 8px 24px rgba(0,0,0,.4); color:var(--text);
}
.leaflet-popup.map-popover-wrap .leaflet-popup-tip{background:var(--panel); box-shadow:none; border:1px solid var(--border);}
.leaflet-popup.map-popover-wrap .leaflet-popup-content{margin:12px 14px; font-family:var(--font-body); min-width:170px;}
.leaflet-popup.map-popover-wrap .leaflet-popup-close-button{color:var(--text-dim) !important;}
.map-popover h5{margin:0 0 4px; font-family:var(--font-display); font-size:15px;}
.map-popover .day{font-family:var(--font-mono); font-size:10.5px; color:var(--gold); text-transform:uppercase; margin-bottom:6px;}
.map-popover .spend{font-family:var(--font-mono); font-size:13px; color:var(--teal);}
.map-popover .notes{font-size:12.5px; color:var(--text-dim); margin-top:6px; line-height:1.5;}
.map-legend{margin-top:10px; font-size:12px; color:var(--text-dim); display:flex; align-items:center; gap:8px;}
.map-legend-swatches{margin-top:12px; display:flex; flex-wrap:wrap; gap:10px 14px;}
.map-legend-swatches span{display:inline-flex; align-items:center; gap:5px; font-size:11px; color:var(--text-dim);}
.map-legend-swatches i{width:9px; height:9px; border-radius:50%; display:inline-block; flex-shrink:0;}
:root[data-theme="dark"] .map-canvas .leaflet-tile-pane{ filter:invert(1) hue-rotate(180deg) brightness(0.95) contrast(0.9); }

/* ---------- Despesas (ticket rows) ---------- */
.expense-toolbar{display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap;}
.filter-row{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
.ticket{
  position:relative; display:flex; align-items:center; gap:14px; background:var(--panel-alt);
  border:1px dashed var(--border); border-radius:8px; padding:13px 16px; margin-bottom:10px;
}
.ticket::before, .ticket::after{
  content:""; position:absolute; width:14px; height:14px; border-radius:50%; background:var(--panel); top:50%; transform:translateY(-50%);
}
.ticket::before{left:-8px;} .ticket::after{right:-8px;}
.ticket .cat-chip{
  width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;
}
.ticket .info{flex:1; min-width:0;}
.ticket .info .desc{font-weight:600; font-size:14px;}
.ticket .info .meta{font-family:var(--font-mono); font-size:11.5px; color:var(--text-dim); margin-top:2px;}
.ticket .amount{font-family:var(--font-mono); font-weight:600; font-size:15.5px; white-space:nowrap;}
.ticket .actions{display:flex; gap:0; flex-shrink:0;}

/* ---------- Orçamento ---------- */
.budget-total-row{display:flex; align-items:center; gap:12px; margin-bottom:22px; flex-wrap:wrap;}
.budget-total-row label{font-family:var(--font-mono); font-size:12px; text-transform:uppercase; color:var(--text-dim);}
.cat-budget-row{margin-bottom:16px;}
.cat-budget-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; gap:10px; flex-wrap:wrap;}
.cat-budget-head .name{display:flex; align-items:center; gap:8px; font-weight:600; font-size:14px;}
.cat-budget-head .nums{font-family:var(--font-mono); font-size:12.5px; color:var(--text-dim);}
.bar-track{height:9px; border-radius:5px; background:#0B141F; overflow:hidden; border:1px solid var(--border);}
.bar-fill{height:100%; border-radius:5px; transition:width .5s ease;}
.cat-input{width:110px;}
.color-swatch{width:26px; height:26px; border-radius:50%; border:2px solid transparent; cursor:pointer; padding:0;}
.color-swatch.selected{border-color:var(--text); box-shadow:0 0 0 2px var(--panel-alt);}
#cat_color_custom{width:34px; height:26px; padding:0; border:1px solid var(--border); border-radius:6px; background:none; cursor:pointer;}

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed; inset:0; background:rgba(4,8,14,.68); display:flex; align-items:center; justify-content:center;
  z-index:50; padding:16px; backdrop-filter:blur(2px);
}
.modal{
  background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:26px; width:100%; max-width:440px;
  max-height:88vh; overflow-y:auto;
}
.modal h3{font-family:var(--font-display); font-size:21px; margin:0 0 18px;}
.field{margin-bottom:14px; display:flex; flex-direction:column; gap:6px;}
.field label{font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-dim);}
.field-row{display:flex; gap:10px;}
.field-row .field{flex:1;}
.modal-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:20px;}
.mini-map{
  width:100%; aspect-ratio:16/10; border-radius:10px; position:relative; overflow:hidden;
  border:1px solid var(--border); background:var(--bg-alt); isolation:isolate;
}

::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-thumb{background:var(--panel-alt); border-radius:6px;}

.visually-hidden{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0);}

/* ---------- Tema claro, mobile e fundos ---------- */
:root[data-theme="light"]{
  --bg:#F4F7FB; --bg-alt:#EAF0F7; --panel:#FFFFFF; --panel-alt:#F5F8FC;
  --linen:#17324D; --linen-dim:#48627A; --gold:#B97816; --gold-dim:#D7A34E;
  --teal:#147D75; --coral:#C94E43; --sage:#3F8B59; --slate-blue:#5277A3;
  --mauve:#946987; --text:#172B3E; --text-dim:#61758A; --border:rgba(23,43,62,.14);
}
:root[data-theme="light"] body{background:linear-gradient(145deg,#F8FAFD,#EDF3F9 55%,#F8FAFD);}
:root[data-theme="light"] .btn:hover{background:#E7EEF7;}
:root[data-theme="light"] .btn-primary{color:#fff;}
:root[data-theme="light"] .bar-track{background:#E1E8F0;}
:root[data-theme="light"] .ticket::before,:root[data-theme="light"] .ticket::after{background:var(--panel);}
.theme-btn{display:inline-flex;align-items:center;gap:7px;}
.fund-card{background:linear-gradient(135deg,rgba(79,163,154,.12),rgba(201,162,77,.10));border:1px solid var(--border);border-radius:12px;padding:17px;margin-bottom:12px;}
.fund-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.fund-progress{height:8px;background:var(--bg-alt);border-radius:999px;overflow:hidden;margin-top:12px;border:1px solid var(--border);}
.fund-progress>span{display:block;height:100%;background:var(--teal);border-radius:999px;}
.address-search{display:flex;gap:8px;}.address-search input{flex:1;min-width:0;}.search-results{display:grid;gap:7px;margin-top:8px;max-height:190px;overflow:auto;}.search-result{width:100%;text-align:left;background:var(--panel-alt);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:9px 10px;cursor:pointer;font-size:12.5px;line-height:1.4;}.search-result:hover{border-color:var(--gold);}
@media(max-width:640px){
  .app{padding:14px 12px 76px}.header{align-items:flex-start;margin-bottom:14px}.trip-picker{width:100%;display:grid;grid-template-columns:1fr 1fr}.trip-picker select{grid-column:1/-1;width:100%}.trip-picker .btn{padding:10px 8px;font-size:10.5px}.tabs{position:sticky;top:0;z-index:20;background:var(--bg);margin:0 -12px 14px;padding:8px 12px;gap:5px}.tab{padding:9px 12px;font-size:10.5px;border-radius:9px;border-bottom:1px solid var(--border)}.panel{padding:18px 14px;border-radius:12px}.ticket{gap:9px;padding:12px 10px}.ticket .amount{font-size:13px}.field-row{flex-direction:column;gap:0}.modal{padding:20px 16px}.stat-row{grid-template-columns:1fr 1fr!important}.address-search{flex-direction:column}.fund-head{flex-direction:column}}

@media (prefers-reduced-motion: reduce){*{animation:none !important; transition:none !important;}}

/* ---------- Hoje, listas e módulos ---------- */
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}.quick-card,.list-card{background:var(--panel-alt);border:1px solid var(--border);border-radius:12px;padding:16px}.quick-card .kicker{font:11px var(--font-mono);text-transform:uppercase;letter-spacing:.07em;color:var(--text-dim)}.quick-card .big{font:600 20px var(--font-display);margin-top:6px}.flex-head{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}.check-row{display:flex;align-items:flex-start;gap:11px;padding:12px 0;border-bottom:1px solid var(--border)}.check-row:last-child{border-bottom:0}.check-row.done{opacity:.58}.check-row.done .check-title{text-decoration:line-through}.round-check{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--sage);cursor:pointer;flex:0 0 auto}.round-check.checked{background:rgba(134,174,140,.14);border-color:var(--sage)}.check-main{flex:1;min-width:0}.check-title{font-weight:600;font-size:14px}.check-meta{color:var(--text-dim);font-size:12px;margin-top:3px;line-height:1.45}.badge{display:inline-flex;padding:3px 7px;border-radius:999px;background:rgba(201,162,77,.12);color:var(--gold);font:10.5px var(--font-mono);text-transform:uppercase}.module-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.offline-pill{display:inline-flex;align-items:center;gap:6px;font:10.5px var(--font-mono);color:var(--text-dim)}.offline-pill::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--sage)}.offline-pill.offline::before{background:var(--coral)}
@media(max-width:820px){.quick-grid{grid-template-columns:1fr}.module-grid{grid-template-columns:1fr}.mobile-primary{position:fixed;right:18px;bottom:18px;z-index:30;border-radius:999px;box-shadow:0 8px 24px rgba(0,0,0,.3)}}
</style>
</head>
<body>
<div class="app" id="app">

  <div class="header">
    <div class="brand">
      <div class="eyebrow">Diário de viagem</div>
      <h1 id="tripTitle">A carregar…</h1>
      <div id="syncStatus" style="font-family:var(--font-mono); font-size:10.5px; color:var(--text-dim); margin-top:2px;"></div><div id="networkStatus" class="offline-pill" style="margin-top:4px">Disponível offline</div>
    </div>
    <div class="trip-picker">
      <select id="tripSelect" aria-label="Escolher viagem"></select>

<script>
/* ============================= DATA LAYER ============================= */
const DEFAULT_CATEGORIES = [
  {key:'alojamento', label:'Alojamento', icon:'🛏️', color:'#7C97B8'},
  {key:'alimentacao', label:'Alimentação', icon:'🍽️', color:'#C9A24D'},
  {key:'voos', label:'Voos', icon:'✈️', color:'#6C6FD1'},
  {key:'transporte', label:'Transporte', icon:'🚗', color:'#4FA39A'},
  {key:'atividades', label:'Atividades', icon:'🎟️', color:'#A9829F'},
  {key:'compras', label:'Compras', icon:'🛍️', color:'#86AE8C'},
  {key:'outros', label:'Outros', icon:'📎', color:'#C1573E'},
];
const CATEGORY_COLOR_CHOICES = ['#7C97B8','#C9A24D','#6C6FD1','#4FA39A','#A9829F','#86AE8C','#C1573E','#5C9DD9','#D98E5B','#8C6E9E'];
function getCategories(){
  const cats = state.currentData && state.currentData.budgetCategories;
  return (Array.isArray(cats) && cats.length) ? cats : DEFAULT_CATEGORIES;
}
const CURRENCIES = ['EUR','USD','GBP','BRL'];
const BOOKING_CATEGORIES = [
  {key:'voo', label:'Voo', icon:'✈️'},
  {key:'alojamento', label:'Alojamento', icon:'🏨'},
  {key:'transporte', label:'Transporte', icon:'🚗'},
  {key:'atividade', label:'Atividade', icon:'🎫'},
  {key:'outro', label:'Outro', icon:'📄'},
];
const BOOKING_TO_EXPENSE_CATEGORY = {voo:'voos', alojamento:'alojamento', transporte:'transporte', atividade:'atividades', outro:'outros'};

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function catInfo(key){ const cats=getCategories(); return cats.find(c=>c.key===key) || cats[cats.length-1]; }
function cssVar(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
function fmtMoney(amount, currency){
  try{ return new Intl.NumberFormat('pt-PT', {style:'currency', currency: currency || 'EUR'}).format(amount||0); }
  catch(e){ return (amount||0).toFixed(2) + ' ' + (currency||'EUR'); }
}
function todayLocalISO(){
  // Avoids the classic toISOString() UTC-shift bug that can push the date back by one day
  const d = new Date();
  const off = d.getTimezoneOffset();
  const local = new Date(d.getTime() - off*60000);
  return local.toISOString().slice(0,10);
}
function fmtDateShort(dateStr){
  if(!dateStr) return '—';
  const d = new Date(dateStr + 'T00:00:00');
  if(isNaN(d)) return dateStr;
  return d.toLocaleDateString('pt-PT', {day:'2-digit', month:'short'});
}

/* ---- Local device storage: uses Claude's window.storage when running as an artifact,
       falls back to localStorage when opened as a standalone/hosted file. Device-only, not shared. ---- */
const HAS_CLAUDE_STORAGE = (typeof window.storage !== 'undefined' && window.storage);
async function deviceGet(key){
  if(HAS_CLAUDE_STORAGE){
    try{ const r = await window.storage.get(key, false); return r ? r.value : null; }catch(e){ return null; }
  }
  try{ return localStorage.getItem(key); }catch(e){ return null; }
}
async function deviceSet(key, value){
  if(HAS_CLAUDE_STORAGE){
    try{ await window.storage.set(key, value, false); }catch(e){ console.error('Erro a guardar', key, e); }
    return;
  }
  try{ localStorage.setItem(key, value); }catch(e){ console.error('Erro a guardar', key, e); }
}
async function deviceDelete(key){
  if(HAS_CLAUDE_STORAGE){ try{ await window.storage.delete(key, false); }catch(e){} return; }
  try{ localStorage.removeItem(key); }catch(e){}
}

async function getTripsIndex(){
  try{ const v = await deviceGet('trips-index'); return v ? JSON.parse(v) : []; }catch(e){ return []; }
}
async function saveTripsIndex(list){ await deviceSet('trips-index', JSON.stringify(list)); }
async function getTripData(id){
  try{ const v = await deviceGet('trip:'+id); return v ? JSON.parse(v) : null; }catch(e){ return null; }
}
async function saveTripData(id, data){ await deviceSet('trip:'+id, JSON.stringify(data)); }
async function deleteTripData(id){ await deviceDelete('trip:'+id); }

/* ---- GitHub sync: stores one combined JSON file in a private repo, used as shared storage. ---- */
function utf8ToBase64(str){ return btoa(unescape(encodeURIComponent(str))); }
function base64ToUtf8(str){ return decodeURIComponent(escape(atob(str.replace(/\n/g,'')))); }

async function loadSyncSettings(){
  try{
    const v = await deviceGet('github-sync-settings');
    state.sync = v ? {...state.sync, ...JSON.parse(v)} : state.sync;
  }catch(e){}
}
async function saveSyncSettings(){
  const {owner, repo, path, branch, token, enabled, sha, lastSyncedAt} = state.sync;
  await deviceSet('github-sync-settings', JSON.stringify({owner, repo, path, branch, token, enabled, sha, lastSyncedAt}));
}
function syncConfigured(){
  const s = state.sync;
  return !!(s.enabled && s.owner && s.repo && s.token);
}
function setSyncStatus(msg){
  state.sync.statusMsg = msg;
  const el = document.getElementById('syncStatus');
  if(el) el.textContent = msg;
}
function githubUrl(){
  const {owner, repo, path} = state.sync;
  return `https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/contents/${encodeURIComponent(path || 'travel-data.json')}`;
}
async function githubGet(){
  const res = await fetch(githubUrl() + `?ref=${encodeURIComponent(state.sync.branch||'main')}`, {
    headers: { 'Authorization': `Bearer ${state.sync.token}`, 'Accept':'application/vnd.github+json' }
  });
  return res;
}
async function githubPut(body){
  const res = await fetch(githubUrl(), {
    method:'PUT',
    headers: { 'Authorization': `Bearer ${state.sync.token}`, 'Accept':'application/vnd.github+json', 'Content-Type':'application/json' },
    body: JSON.stringify(body)
  });
  return res;
}

let pushTimer = null;
function schedulePush(){
  if(!syncConfigured() || !navigator.onLine) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(function attemptPush(){
    // Nunca troca os dados por baixo de um modal aberto (ex: a adicionar uma
    // reserva) — espera até o utilizador terminar e fechar o modal.
    if(isUserEditing()){ pushTimer = setTimeout(attemptPush, 1500); return; }
    pushToGitHub();
  }, 1200);
}

function mergeRecords(remoteList, localList){
  const merged = new Map();
  for(const item of (remoteList || [])){
    if(item && item.id != null) merged.set(String(item.id), item);
  }
  for(const item of (localList || [])){
    if(item && item.id != null) merged.set(String(item.id), item);
  }
  return [...merged.values()];
}
function mergeTripData(remoteData, localData){
  if(!remoteData) return ensureShape(localData);
  if(!localData) return ensureShape(remoteData);
  const merged = {...remoteData, ...localData};
  const mergedTombstones = {};
  TOMBSTONE_KEYS.forEach(k=>{
    const r = (remoteData.tombstones && remoteData.tombstones[k]) || [];
    const l = (localData.tombstones && localData.tombstones[k]) || [];
    mergedTombstones[k] = [...new Set([...r, ...l])];
  });
  merged.tombstones = mergedTombstones;
  for(const key of ['locations','expenses','bookings','people','advances','tasks','budgetCategories']){
    let list = mergeRecords(remoteData[key], localData[key]);
    if(mergedTombstones[key] && mergedTombstones[key].length){
      list = list.filter(item => item && item.id != null && !mergedTombstones[key].includes(String(item.id)));
    }
    merged[key] = list;
  }
  // As listas da mala são aninhadas (lista -> items); um merge raso por id da lista
  // descartava por completo os items adicionados no "outro" dispositivo sempre que a
  // mesma lista fosse editada nos dois. Aqui fazem-se os dois níveis de merge.
  const remoteLists = remoteData.packingLists || [];
  const localLists = localData.packingLists || [];
  const listIds = [...new Set([...remoteLists.map(l=>l.id), ...localLists.map(l=>l.id)])];
  merged.packingLists = listIds.map(id=>{
    const r = remoteLists.find(l=>l.id===id);
    const l = localLists.find(l=>l.id===id);
    if(r && l) return {...l, items: mergeRecords(r.items, l.items)};
    return l || r;
  });
  return ensureShape(merged);
}
function mergeSyncPayload(remote, local){
  const remoteTrips = remote?.trips || [];
  const localTrips = local?.trips || [];
  const deletedTripIds = [...new Set([
    ...(remote?.deletedTripIds || []).map(String),
    ...(local?.deletedTripIds || []).map(String),
  ])];
  let trips = mergeRecords(remoteTrips, localTrips);
  if(deletedTripIds.length) trips = trips.filter(t => t && t.id != null && !deletedTripIds.includes(String(t.id)));
  const tripsData = {};
  const ids = new Set([
    ...Object.keys(remote?.tripsData || {}),
    ...Object.keys(local?.tripsData || {}),
    ...trips.map(t=>String(t.id))
  ]);
  for(const id of ids){
    if(deletedTripIds.includes(String(id))) continue;
    tripsData[id] = mergeTripData(remote?.tripsData?.[id], local?.tripsData?.[id]);
  }
  return {updatedAt:new Date().toISOString(), trips, tripsData, deletedTripIds};
}
async function buildLocalSyncPayload(){
  const tripsData = {};
  for(const t of state.trips){
    tripsData[t.id] = (t.id===state.currentTripId) ? state.currentData : await getTripData(t.id);
  }
  return {updatedAt:new Date().toISOString(), trips:state.trips, tripsData, deletedTripIds: state.deletedTripIds || []};
}
// Garante que nunca há um push e um pull (ou dois pushes/pulls) em curso ao mesmo
// tempo neste dispositivo — evita conflitos de "sha" causados por duas chamadas a
// lerem o ficheiro remoto e tentarem escrever por cima uma da outra.
let syncChain = Promise.resolve();
function runSyncExclusive(fn){
  const result = syncChain.then(fn, fn);
  syncChain = result.then(()=>{}, ()=>{});
  return result;
}
async function pushToGitHub(){ return runSyncExclusive(pushToGitHubImpl); }
async function pullFromGitHub(){ return runSyncExclusive(pullFromGitHubImpl); }

async function pushToGitHubImpl(){
  if(!syncConfigured()) return false;
  if(!navigator.onLine){ setSyncStatus('Modo offline · sincronizar mais tarde'); return false; }
  setSyncStatus('A sincronizar…');
  try{
    let localPayload = await buildLocalSyncPayload();
    const maxAttempts = 3;
    for(let attempt=1; attempt<=maxAttempts; attempt++){
      const getRes = await githubGet();
      let sha = null;
      let remotePayload = null;
      if(getRes.status===200){
        const remoteFile = await getRes.json();
        sha = remoteFile.sha;
        try{ remotePayload = JSON.parse(base64ToUtf8(remoteFile.content)); }
        catch(e){ throw new Error('O ficheiro remoto não contém dados válidos da aplicação.'); }
      } else if(getRes.status!==404){
        const j = await getRes.json().catch(()=>({}));
        throw new Error(j.message || ('Erro HTTP '+getRes.status+' ao ler o ficheiro remoto'));
      }

      const payload = mergeSyncPayload(remotePayload, localPayload);
      const body = {
        message:'Atualizar diário de viagem — '+new Date().toLocaleString('pt-PT'),
        content:utf8ToBase64(JSON.stringify(payload, null, 2)),
        branch:state.sync.branch || 'main'
      };
      if(sha) body.sha = sha;

      const putRes = await githubPut(body);
      if(putRes.ok){
        const putJson = await putRes.json();
        state.sync.sha = putJson.content.sha;
        state.sync.lastSyncedAt = new Date().toISOString();
        state.trips = payload.trips;
        state.deletedTripIds = payload.deletedTripIds || [];
        await saveTripsIndex(payload.trips);
        await deviceSet('deleted-trip-ids', JSON.stringify(state.deletedTripIds));
        for(const [id,data] of Object.entries(payload.tripsData)) await saveTripData(id, data);
        for(const delId of state.deletedTripIds) await deleteTripData(delId);
        if(state.currentTripId && payload.tripsData[state.currentTripId]){
          state.currentData = payload.tripsData[state.currentTripId];
        } else if(state.currentTripId && !payload.trips.find(t=>t.id===state.currentTripId)){
          // a viagem atual foi eliminada noutro dispositivo
          state.currentTripId = payload.trips.length ? payload.trips[0].id : null;
          state.currentData = state.currentTripId ? ensureShape(await getTripData(state.currentTripId)) : null;
        }
        await saveSyncSettings();
        setSyncStatus('Sincronizado às '+new Date().toLocaleTimeString('pt-PT'));
        return true;
      }

      const errJson = await putRes.json().catch(()=>({}));
      const msg = errJson.message || ('Erro HTTP '+putRes.status);
      const isConflict = putRes.status===409 || putRes.status===422 || /does not match|sha/i.test(msg);
      if(isConflict && attempt<maxAttempts){
        setSyncStatus('Foram encontradas alterações noutro dispositivo · a combinar…');
        localPayload = payload;
        continue;
      }
      throw new Error(msg);
    }
  }catch(err){
    console.error(err);
    setSyncStatus('Falha ao sincronizar: '+err.message);
    return false;
  }
}
async function pullFromGitHubImpl(){
  if(!syncConfigured()) return false;
  if(!navigator.onLine){ setSyncStatus('Modo offline · sincronizar mais tarde'); return false; }
  setSyncStatus('A ler dados partilhados…');
  try{
    const res = await githubGet();
    if(res.status===404){ setSyncStatus('Ainda não há dados partilhados neste repositório.'); return false; }
    if(!res.ok){ const j = await res.json().catch(()=>({})); throw new Error(j.message || ('Erro HTTP '+res.status)); }
    const json = await res.json();
    state.sync.sha = json.sha;
    let remotePayload;
    try{ remotePayload = JSON.parse(base64ToUtf8(json.content)); }
    catch(e){ throw new Error('O ficheiro remoto não contém dados válidos da aplicação.'); }

    // Combina com o que já existe neste dispositivo em vez de o substituir — assim
    // alterações feitas aqui e ainda não enviadas não se perdem quando chega uma
    // versão mais recente do outro telemóvel.
    const localPayload = await buildLocalSyncPayload();
    const merged = mergeSyncPayload(remotePayload, localPayload);

    state.trips = merged.trips;
    state.deletedTripIds = merged.deletedTripIds || [];
    await saveTripsIndex(merged.trips);
    await deviceSet('deleted-trip-ids', JSON.stringify(state.deletedTripIds));
    for(const [id, data] of Object.entries(merged.tripsData)) await saveTripData(id, data);
    for(const delId of state.deletedTripIds) await deleteTripData(delId);

    if(state.trips.length){
      const stillExists = state.trips.find(t=>t.id===state.currentTripId);
      state.currentTripId = stillExists ? state.currentTripId : state.trips[0].id;
      state.currentData = ensureShape(merged.tripsData[state.currentTripId] || await getTripData(state.currentTripId));
    } else {
      state.currentTripId = null;
      state.currentData = null;
    }
    await saveSyncSettings();
    setSyncStatus('Sincronizado às ' + new Date().toLocaleTimeString('pt-PT'));

    // Se a combinação trouxe algo que ainda não estava no GitHub (alterações feitas
    // aqui offline, por exemplo), envia de volta para o repositório partilhado.
    if(JSON.stringify(remotePayload) !== JSON.stringify(merged)) schedulePush();
    return true;
  }catch(err){
    console.error(err);
    setSyncStatus('Falha ao sincronizar: ' + err.message);
    return false;
  }
}

function blankTripData(info){
  return {
    info,
    locations: [],
    expenses: [],
    bookings: [],
    people: [],
    advances: [],
    tasks: [],
    packingLists: [{id:uid(), name:'Mala principal', items:[]}],
    modules: {today:true,locations:true,bookings:true,preparation:true,expenses:true,budget:true,dashboard:true},
    budgetCategories: DEFAULT_CATEGORIES.map(c=>({id:c.key, key:c.key, label:c.label, icon:c.icon, color:c.color, planned:0})),
    tombstones: {locations:[], expenses:[], bookings:[], advances:[], people:[], tasks:[]},
  };
}
const TOMBSTONE_KEYS = ['locations','expenses','bookings','advances','people','tasks'];
function ensureShape(data){
  if(!data) return data;
  if(!data.bookings) data.bookings = [];
  if(!data.locations) data.locations = [];
  if(!data.expenses) data.expenses = [];
  if(!data.people) data.people = [];
  if(!data.advances) data.advances = [];
  if(!data.tasks) data.tasks = [];
  if(!data.packingLists) data.packingLists = [{id:uid(), name:'Mala principal', items:[]}];
  if(!data.modules) data.modules = {today:true,locations:true,bookings:true,preparation:true,expenses:true,budget:true,dashboard:true};
  if(!data.tombstones) data.tombstones = {};
  TOMBSTONE_KEYS.forEach(k=>{ if(!Array.isArray(data.tombstones[k])) data.tombstones[k] = []; });
  data.locations.forEach(l=>{
    if(l.visited==null) l.visited=false;
    if(l.lat!=null && l.lon!=null){ const xy=mapXYFromCoords(l.lat,l.lon); l.x=xy.x; l.y=xy.y; }
    else if(l.x!=null && l.y!=null){
      // Local antigo colocado manualmente no mapa ilustrado, sem lat/lon guardado —
      // estima-se uma posição inicial no mapa real; arrasta o pin para afinar.
      const ll = xyToLatLon(l.x, l.y);
      l.lat = ll.lat; l.lon = ll.lon;
    }
  });
  data.expenses.forEach(e=>{
    if(!Array.isArray(e.fundAllocations)){
      e.fundAllocations = e.advanceId ? [{advanceId:e.advanceId, amount:Number(e.amount||0)}] : [];
    }
    e.advanceId = null; // campo antigo mantido apenas para compatibilidade de importação
  });
  if(!data.budgetCategories || !data.budgetCategories.length){
    data.budgetCategories = DEFAULT_CATEGORIES.map(c=>({id:c.key, key:c.key, label:c.label, icon:c.icon, color:c.color, planned:0}));
  } else {
    // Migra entradas antigas (só {key,planned}) e garante um "id" estável para o merge de sincronização.
    data.budgetCategories.forEach(c=>{
      const def = DEFAULT_CATEGORIES.find(d=>d.key===c.key);
      if(!c.id) c.id = c.key;
      if(!c.label) c.label = def ? def.label : 'Categoria';
      if(!c.icon) c.icon = def ? def.icon : '📌';
      if(!c.color) c.color = def ? def.color : '#8C8C8C';
      c.planned = Number(c.planned)||0;
    });
  }
  return data;
}
function markDeleted(type, id){
  if(!state.currentData) return;
  if(!state.currentData.tombstones) state.currentData.tombstones = {};
  if(!Array.isArray(state.currentData.tombstones[type])) state.currentData.tombstones[type] = [];
  const idStr = String(id);
  if(!state.currentData.tombstones[type].includes(idStr)) state.currentData.tombstones[type].push(idStr);
}

/* ============================= STATE ============================= */
const state = {
  trips: [],          // index list [{id,name,destination,startDate,endDate,currency,budgetTotal}]
  currentTripId: null,
  currentData: null,  // full data for current trip
  activeTab: 'hoje',
  charts: {},
  mapView: {fitKey:null},
  modalPendingLatLon: null,
  deletedTripIds: [],
  sync: { owner:'', repo:'', path:'travel-data.json', branch:'main', token:'', enabled:false, sha:null, lastSyncedAt:null, statusMsg:'' },
};

/* ============================= INIT ============================= */
let GLOBAL_EVENTS_BOUND = false;

async function init(){
  // Liga primeiro a interface. Nenhuma leitura local, migração ou chamada de rede
  // pode impedir os cliques depois de atualizar o ficheiro e recarregar a página.
  try { bindGlobalEvents(); } catch(err) { console.error('Falha ao ligar eventos globais:', err); }
  try { renderHeader(); renderTabs(); renderCurrentTab(); } catch(err) { console.error('Falha no desenho inicial:', err); }

  // Carrega os dados locais de forma isolada. Se um registo antigo/corrompido falhar,
  // a interface continua ativa e o utilizador pode abrir definições ou importar dados.
  try {
    await loadSyncSettings();
  } catch(err) {
    console.error('Falha ao ler definições de sincronização:', err);
    setSyncStatus('Não foi possível ler as definições locais; a app continua disponível.');
  }

  try {
    state.trips = (await getTripsIndex()) || [];
    state.deletedTripIds = JSON.parse((await deviceGet('deleted-trip-ids')) || '[]');
    if(state.trips.length){
      state.currentTripId = state.trips[0].id;
      state.currentData = ensureShape(await getTripData(state.currentTripId));
    }
  } catch(err) {
    console.error('Falha ao carregar dados locais:', err);
    state.trips = Array.isArray(state.trips) ? state.trips : [];
    state.deletedTripIds = Array.isArray(state.deletedTripIds) ? state.deletedTripIds : [];
    state.currentTripId = null;
    state.currentData = null;
    setSyncStatus('Erro ao carregar os dados locais; podes importar uma cópia de segurança.');
  }

  try { renderHeader(); renderTabs(); renderCurrentTab(); } catch(err) { console.error('Falha ao redesenhar dados locais:', err); }

  // A sincronização corre sempre depois de a app estar utilizável.
  if(syncConfigured() && navigator.onLine){
    Promise.resolve().then(()=>pullFromGitHub()).then(ok=>{
      if(ok && !isUserEditing()){
        try { renderHeader(); renderTabs(); renderCurrentTab(); }
        catch(err) { console.error('Falha ao redesenhar após sincronização:', err); }
      }
    }).catch(err=>{
      console.error(err);
      setSyncStatus('Falha ao sincronizar: '+err.message);
    });
  }
}

function bindGlobalEvents(){
  if(GLOBAL_EVENTS_BOUND) return;
  GLOBAL_EVENTS_BOUND = true;
  document.getElementById('newTripBtn').addEventListener('click', ()=>openTripModal('create'));
  document.getElementById('editTripBtn').addEventListener('click', ()=>openTripModal('edit'));
  document.getElementById('tripSelect').addEventListener('change', async (e)=>{
    state.currentTripId = e.target.value;
    state.currentData = ensureShape(await getTripData(state.currentTripId));
    renderHeader();
    renderTabs();
    renderCurrentTab();
  });
  document.getElementById('tabs').addEventListener('click', (e)=>{
    const t = e.target.closest('.tab');
    if(!t) return;
    state.activeTab = t.dataset.tab;
    renderTabs();
    renderCurrentTab();
  });
  document.getElementById('exportBtn').addEventListener('click', exportTripData);
  document.getElementById('importBtn').addEventListener('click', ()=> document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change', importTripData);
  document.getElementById('syncSettingsBtn').addEventListener('click', openSyncModal);
  initTheme();
  document.getElementById('themeBtn').addEventListener('click', toggleTheme);
  updateNetworkStatus();
  window.addEventListener('online', ()=>{ updateNetworkStatus(); if(syncConfigured()) pushToGitHub(); });
  window.addEventListener('offline', updateNetworkStatus);
  setSyncStatus(syncConfigured() ? (state.sync.statusMsg || 'Sincronização ativa') : 'Só neste dispositivo — liga o 🔗 Sincronizar para partilhar');

  // Sincronização periódica em segundo plano: vai buscar alterações feitas no outro
  // telemóvel sem precisares de recarregar a página. Nunca corre a meio de uma edição
  // (modal aberto ou campo com foco) para não perder o que estás a escrever.
  setInterval(()=>{
    if(!syncConfigured() || !navigator.onLine) return;
    if(isUserEditing()) return;
    pullFromGitHub().then(changed=>{
      if(changed && !isUserEditing()){
        try { renderHeader(); renderTabs(); renderCurrentTab(); }
        catch(err){ console.error('Falha ao redesenhar após sincronização periódica:', err); }
      }
    }).catch(()=>{});
  }, 60000);
}

function isUserEditing(){
  const modalOpen = document.getElementById('modalRoot') && document.getElementById('modalRoot').children.length > 0;
  const activeTag = document.activeElement && document.activeElement.tagName;
  const editingField = activeTag==='INPUT' || activeTag==='TEXTAREA' || activeTag==='SELECT';
  return !!(modalOpen || editingField);
}

    <h3>Sincronização via GitHub</h3>

    </p>

      </label>

function exportTripData(){
  if(!state.currentData){ alert('Cria ou escolhe uma viagem primeiro.'); return; }
  try{
    const payload = {
      exportedAt: new Date().toISOString(),
      appVersion: 1,
      trip: state.currentData,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const safeName = (state.currentData.info.name||'viagem').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
    a.href = url;
    a.download = `diario-viagem-${safeName || 'export'}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }catch(e){
    console.error(e);
    alert('Não foi possível criar o ficheiro de exportação neste ambiente. Tenta copiar os dados manualmente ou usar outro navegador.');
  }
}

function normalizeImportedTrip(tripData){
  if(!tripData.info.id) tripData.info.id = uid();
  if(!tripData.info.currency) tripData.info.currency = 'EUR';
  if(tripData.info.budgetTotal==null) tripData.info.budgetTotal = 0;
  tripData.people = (tripData.people||[]).map(p=>({ id: p.id || uid(), name: p.name||'' })).filter(p=>p.name);
  tripData.locations = (tripData.locations||[]).map((l,i)=>({
    id: l.id || uid(), name: l.name||'', day: l.day||'', time: l.time||'', notes: l.notes||'',
    x: l.x!=null ? l.x : null, y: l.y!=null ? l.y : null, order: l.order!=null ? l.order : i,
  }));
  tripData.budgetCategories = (tripData.budgetCategories && tripData.budgetCategories.length)
    ? tripData.budgetCategories.map(c=>{
        const def = DEFAULT_CATEGORIES.find(d=>d.key===c.key);
        return {
          id: c.id || c.key || uid(), key: c.key || uid(),
          label: c.label || def?.label || 'Categoria', icon: c.icon || def?.icon || '📌', color: c.color || def?.color || '#8C8C8C',
          planned: Number(c.planned)||0,
        };
      })
    : DEFAULT_CATEGORIES.map(c=>({id:c.key, key:c.key, label:c.label, icon:c.icon, color:c.color, planned:0}));
  const catKeys = new Set(tripData.budgetCategories.map(c=>c.key));
  const fallbackCatKey = tripData.budgetCategories[0]?.key || 'outros';
  tripData.expenses = (tripData.expenses||[]).map(e=>({
    id: e.id || uid(), date: e.date||'', categoryKey: catKeys.has(e.categoryKey) ? e.categoryKey : fallbackCatKey,
    description: e.description||'', amount: Number(e.amount)||0, locationId: e.locationId||null, bookingId: e.bookingId||null,
    paidBy: e.paidBy||null, splitWith: Array.isArray(e.splitWith) ? e.splitWith : [],
  }));
  tripData.bookings = (tripData.bookings||[]).map(b=>({
    id: b.id || uid(), category: BOOKING_CATEGORIES.some(c=>c.key===b.category) ? b.category : 'outro',
    provider: b.provider||'', code: b.code||'', dateFrom: b.dateFrom||'', dateTo: b.dateTo||'',
    timeFrom: b.timeFrom||'', timeTo: b.timeTo||'', locationId: b.locationId||null,
    arrivalLocationId: b.arrivalLocationId||null, flightNumber:b.flightNumber||'', flightStatus:b.flightStatus||'',
    departureTerminal:b.departureTerminal||'', arrivalTerminal:b.arrivalTerminal||'', lastFlightUpdate:b.lastFlightUpdate||'',
    notes: b.notes||'', link: b.link||'',
  }));
  // reconcile locationId/bookingId references that don't match any imported record
  const locIds = new Set(tripData.locations.map(l=>l.id));
  tripData.expenses.forEach(e=>{ if(e.locationId && !locIds.has(e.locationId)) e.locationId = null; });
  const bookingIds = new Set(tripData.bookings.map(b=>b.id));
  tripData.expenses.forEach(e=>{ if(e.bookingId && !bookingIds.has(e.bookingId)) e.bookingId = null; });
  const peopleIds = new Set(tripData.people.map(p=>p.id));
  tripData.expenses.forEach(e=>{
    if(e.paidBy && !peopleIds.has(e.paidBy)) e.paidBy = null;
    e.splitWith = (e.splitWith||[]).filter(id=>peopleIds.has(id));
  });
  return ensureShape(tripData);
}

async function importTripData(e){
  const file = e.target.files[0];
  e.target.value = '';
  if(!file) return;
  try{
    const text = await file.text();
    const parsed = JSON.parse(text);
    let tripData = ensureShape(parsed.trip || parsed);
    if(!tripData || !tripData.info || !tripData.info.name){ alert('Este ficheiro não parece ser uma exportação válida do Diário de Viagem.'); return; }
    tripData = normalizeImportedTrip(tripData);
    const existing = state.trips.find(t=>t.id===tripData.info.id);
    if(existing && !confirm(`Já existe uma viagem "${existing.name}" com este mesmo identificador. Queres substituir os dados guardados por este ficheiro?`)) return;
    if(!existing){
      state.trips.push(pickIndexFields(tripData.info));
    } else {
      const idx = state.trips.findIndex(t=>t.id===tripData.info.id);
      state.trips[idx] = pickIndexFields(tripData.info);
    }
    await saveTripsIndex(state.trips);
    await saveTripData(tripData.info.id, tripData);
    state.currentTripId = tripData.info.id;
    state.currentData = tripData;
    renderHeader();
    renderCurrentTab();
    alert('Viagem importada com sucesso.');
  }catch(err){
    console.error(err);
    alert('Não foi possível ler este ficheiro. Confirma que é um ficheiro exportado por esta ferramenta.');
  }
}

function initTheme(){
  const saved = localStorage.getItem('travel-theme');
  const preferred = saved || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  document.documentElement.dataset.theme = preferred;
  updateThemeButton();
}
function toggleTheme(){
  document.documentElement.dataset.theme = document.documentElement.dataset.theme==='light' ? 'dark' : 'light';
  localStorage.setItem('travel-theme', document.documentElement.dataset.theme);
  updateThemeButton();
  if(state.currentData) renderCurrentTab();
}
function updateThemeButton(){
  const b=document.getElementById('themeBtn'); if(!b) return;
  b.textContent=document.documentElement.dataset.theme==='light'?'🌙 Escuro':'☀️ Claro';
}

function renderHeader(){
  const sel = document.getElementById('tripSelect');
  const editBtn = document.getElementById('editTripBtn');
  const exportBtn = document.getElementById('exportBtn');
  if(!state.trips.length){
    document.getElementById('tripTitle').textContent = 'A tua primeira viagem';
    sel.innerHTML = '';
    sel.style.display = 'none';
    editBtn.style.display = 'none';
    exportBtn.style.display = 'none';

  }
  sel.style.display = '';

  exportBtn.style.display = '';
  sel.innerHTML = state.trips.map(t=>`<option value="${t.id}" ${t.id===state.currentTripId?'selected':''}>${escapeHtml(t.name)}</option>`).join('');
  const cur = state.trips.find(t=>t.id===state.currentTripId);
  document.getElementById('tripTitle').textContent = cur ? cur.name : 'Diário de Viagem';

function renderTabs(){
  const modules=(state.currentData&&state.currentData.modules)||{};
  document.querySelectorAll('.tab').forEach(t=>{
    const visible=!t.dataset.module || modules[t.dataset.module]!==false;
    t.style.display=visible?'':'none';
    t.classList.toggle('active', t.dataset.tab === state.activeTab);
  });
  const active=document.querySelector(`.tab[data-tab="${state.activeTab}"]`);
  if(active && active.style.display==='none'){
    const first=[...document.querySelectorAll('.tab')].find(t=>t.style.display!=='none');
    if(first) state.activeTab=first.dataset.tab;
  }
}

function escapeHtml(str){
  const d = document.createElement('div'); d.textContent = str==null?'':str; return d.innerHTML;
}

  const el = document.getElementById('panelContent');

function updateNetworkStatus(){
  const el=document.getElementById('networkStatus'); if(!el)return;
  const online=navigator.onLine;
  el.classList.toggle('offline',!online);
  el.textContent=online?'Disponível offline · ligação ativa':'Modo offline · alterações guardadas neste dispositivo';
}
function tripPhase(info, today){
  if(!info.startDate || !info.endDate) return 'unknown';
  if(today < info.startDate) return 'upcoming';
  if(today > info.endDate) return 'past';
  return 'active';
}
function daysUntil(dateStr, todayStr){
  const [y1,m1,d1]=todayStr.split('-').map(Number);
  const [y2,m2,d2]=dateStr.split('-').map(Number);
  return Math.round((new Date(y2,m2-1,d2) - new Date(y1,m1-1,d1))/86400000);
}
function dayAgenda(d, dateStr){
  const items = [
    ...d.bookings.filter(b=>b.dateFrom===dateStr || b.dateTo===dateStr).map(b=>({kind:'booking', sort:bookingSortKey(b), data:b})),
    ...d.locations.filter(l=>l.day===dateStr).map(l=>({kind:'location', sort:`${l.day}T${l.time||'12:00'}`, data:l})),
  ];
  items.sort((a,b)=>a.sort.localeCompare(b.sort));
  return items;
}
function renderAgendaRow(item){
  if(item.kind==='booking'){
    const b=item.data, c=(BOOKING_CATEGORIES.find(x=>x.key===b.category)||BOOKING_CATEGORIES[4]);
    return `<div class="check-row"><div style="font-size:20px">${c.icon}</div><div class="check-main"><div class="check-title">${b.timeFrom?escapeHtml(b.timeFrom)+' · ':''}${escapeHtml(b.provider||'Reserva')}${b.flightNumber?' · '+escapeHtml(b.flightNumber):''}</div><div class="check-meta">${bookingLocationText(b)?escapeHtml(bookingLocationText(b))+' · ':''}${b.code?`Código: <strong>${escapeHtml(b.code)}</strong>`:''} ${b.notes?`· ${escapeHtml(b.notes)}`:''}</div></div></div>`;
  }
  const l=item.data;
  return `<div class="check-row ${l.visited?'done':''}"><button class="round-check ${l.visited?'checked':''}" onclick="toggleLocationVisited('${l.id}')">${l.visited?'✓':''}</button><div class="check-main"><div class="check-title">${l.time?escapeHtml(l.time)+' · ':''}${escapeHtml(l.name)}</div><div class="check-meta">${l.notes?escapeHtml(l.notes):(l.address?escapeHtml(l.address):'Local planeado')}</div></div></div>`;
}
function packingProgress(d){
  let total=0, done=0;
  (d.packingLists||[]).forEach(list=>{ total+=list.items.length; done+=list.items.filter(i=>i.done).length; });
  return {total, done, pct: total? Math.round(done/total*100) : null};
}
function renderToday(el){
  const d=state.currentData, info=d.info, today=todayLocalISO();
  const phase = tripPhase(info, today);
  const urgent=d.tasks.filter(t=>!t.done && (!t.dueDate || t.dueDate<=today)).sort((a,b)=>(a.dueDate||'9999').localeCompare(b.dueDate||'9999'));
  const ideas=d.locations.filter(l=>!l.visited && (!l.day || l.day===today)).slice(0,8);

  if(phase==='upcoming'){
    const daysToGo = daysUntil(info.startDate, today);
    const upcoming = [...d.bookings].sort((a,b)=>bookingSortKey(a).localeCompare(bookingSortKey(b))).slice(0,5);
    const totalSpent = d.expenses.reduce((s,e)=>s+Number(e.amount||0),0);
    const bookingSpend = d.expenses.filter(e=>e.bookingId).reduce((s,e)=>s+Number(e.amount||0),0);
    const totalBudget = Number(info.budgetTotal||0);
    const pack = packingProgress(d);
    el.innerHTML=`
      <div class="flex-head"><div><h2 class="section-title" style="margin-bottom:4px">Hoje</h2><div style="color:var(--text-dim);font-size:13px">A viagem ainda não começou — aqui está o panorama geral para chegares preparado.</div></div><button class="btn btn-primary" onclick="openLocationModal('create')">+ Guardar local</button></div>
      <div class="hero-progress" style="padding:16px 22px; margin-top:20px;">
        <div class="desc" style="min-width:0;">
          <h3 style="font-size:17px;">🗓️ Faltam ${daysToGo} dia(s) para "${escapeHtml(info.destination||info.name||'a viagem')}"</h3>
          <p>${info.startDate?fmtDateShort(info.startDate):''}${info.endDate?' → '+fmtDateShort(info.endDate):''}${bookingSpend>0.005?` · já tens ${fmtMoney(bookingSpend, info.currency)} comprometidos em reservas${totalBudget>0?` (${Math.round(bookingSpend/totalBudget*100)}% do orçamento)`:''}.`:'.'}</p>
        </div>
      </div>
      <div class="quick-grid">
        <div class="quick-card"><div class="kicker">Tarefas por fazer</div><div class="big">${urgent.length}</div></div>
        <div class="quick-card"><div class="kicker">Já gasto/comprometido</div><div class="big">${fmtMoney(totalSpent, info.currency)}</div></div>
        <div class="quick-card"><div class="kicker">Mala preparada</div><div class="big">${pack.pct!=null?pack.pct+'%':'—'}</div></div>
      </div>
      <div class="chart-row">
        <div class="list-card"><div class="flex-head"><h3 class="section-title">Falta tratar</h3><button class="btn btn-sm" onclick="openTaskModal()">+ Tarefa</button></div>${renderTaskRows(urgent)}</div>
        <div class="list-card"><div class="flex-head"><h3 class="section-title">Próximas reservas</h3><button class="btn btn-sm" onclick="state.activeTab='reservas';renderTabs();renderCurrentTab()">Ver carteira</button></div>${upcoming.length?upcoming.map(b=>renderAgendaRow({kind:'booking',data:b})).join(''):'<div class="check-meta">Ainda sem reservas guardadas.</div>'}</div>
      </div>
      <div class="list-card" style="margin-top:18px"><div class="flex-head"><h3 class="section-title">Ideias e locais por visitar</h3><button class="btn btn-sm" onclick="state.activeTab='roteiro';renderTabs();renderCurrentTab()">Ver todos</button></div>${ideas.length?ideas.map(renderInterestRow).join(''):'<div class="check-meta">Adiciona locais sem data para teres uma lista flexível de ideias.</div>'}</div>`;
    return;
  }

  if(phase==='active'){
    const dayNum = daysUntil(today, info.startDate) + 1;
    const totalDays = daysBetween(info.startDate, info.endDate);
    const todayAgenda = dayAgenda(d, today);
    const tomorrow = addDaysISO(today, 1);
    const tomorrowAgenda = tomorrow<=info.endDate ? dayAgenda(d, tomorrow) : [];
    const spentToday = d.expenses.flatMap(e=>expenseDayShares(e)).filter(s=>s.day===today).reduce((s,x)=>s+x.amount,0);
    const totalSpent = d.expenses.reduce((s,e)=>s+Number(e.amount||0),0);
    const totalBudget = Number(info.budgetTotal||0);
    const remaining = totalBudget - totalSpent;
    el.innerHTML=`
      <div class="flex-head"><div><h2 class="section-title" style="margin-bottom:4px">Hoje · Dia ${dayNum} de ${totalDays}</h2><div style="color:var(--text-dim);font-size:13px">${fmtDateShort(today)} — o que precisas de saber hoje.</div></div><button class="btn btn-primary" onclick="openLocationModal('create')">+ Guardar local</button></div>
      <div class="quick-grid" style="margin-top:20px">
        <div class="quick-card"><div class="kicker">Compromissos hoje</div><div class="big">${todayAgenda.length}</div></div>
        <div class="quick-card"><div class="kicker">Gasto hoje</div><div class="big">${fmtMoney(spentToday, info.currency)}</div></div>
        <div class="quick-card"><div class="kicker">Falta tratar</div><div class="big">${urgent.length}</div></div>
        <div class="quick-card"><div class="kicker">Orçamento restante</div><div class="big ${remaining<0?'over':''}" style="${remaining<0?'color:var(--coral)':''}">${totalBudget>0?fmtMoney(remaining, info.currency):'—'}</div></div>
      </div>
      <div class="chart-row">
        <div class="list-card"><div class="flex-head"><h3 class="section-title">Agenda de hoje</h3><button class="btn btn-sm" onclick="state.activeTab='roteiro';renderTabs();renderCurrentTab()">Ver roteiro</button></div>${todayAgenda.length?todayAgenda.map(renderAgendaRow).join(''):'<div class="check-meta">Nada marcado para hoje — dia livre.</div>'}</div>

      </div>

      <div class="list-card" style="margin-top:18px"><div class="flex-head"><h3 class="section-title">Ideias e locais por visitar</h3><button class="btn btn-sm" onclick="state.activeTab='roteiro';renderTabs();renderCurrentTab()">Ver todos</button></div>${ideas.length?ideas.map(renderInterestRow).join(''):'<div class="check-meta">Adiciona locais sem data para teres uma lista flexível de ideias.</div>'}</div>`;
    return;
  }

  if(phase==='past'){
    const totalSpent = d.expenses.reduce((s,e)=>s+Number(e.amount||0),0);
    const totalBudget = Number(info.budgetTotal||0);

function ringSvg(pct){
  const r = 52, c = 2*Math.PI*r;
  const offset = c - (pct/100)*c;
  const color = pct>=100 ? 'var(--coral)' : (pct>=80 ? 'var(--gold)' : 'var(--teal)');
  return `<svg width="130" height="130" viewBox="0 0 130 130">
    <circle cx="65" cy="65" r="${r}" fill="none" stroke="#0B141F" stroke-width="12"/>
    <circle cx="65" cy="65" r="${r}" fill="none" stroke="${color}" stroke-width="12" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${offset}" transform="rotate(-90 65 65)"
      style="transition:stroke-dashoffset .6s ease"/>
  </svg>`;
}

function daysBetween(start, end){
  if(!start || !end) return null;
  const a = new Date(start+'T00:00:00'), b = new Date(end+'T00:00:00');
  if(isNaN(a)||isNaN(b)) return null;
  return Math.max(1, Math.round((b-a)/86400000)+1);
}

function renderCategoryChart(expenses, currency, canvasId='catChart', slot='cat'){
  const ctx = document.getElementById(canvasId);
  if(!ctx) return;
  const cats = getCategories();
  const totals = cats.map(c => expenses.filter(e=>e.categoryKey===c.key).reduce((s,e)=>s+Number(e.amount||0),0));
  if(state.charts[slot]) state.charts[slot].destroy();
  if(totals.every(t=>t===0)){
    ctx.replaceWith(Object.assign(document.createElement('div'), {className:'map-empty-hint', style:'position:static;padding:40px 0;', textContent:'Ainda sem despesas registadas.'}));
    return;
  }
  state.charts[slot] = new Chart(ctx, {
    type:'doughnut',
    data:{ labels: cats.map(c=>c.label), datasets:[{ data: totals, backgroundColor: cats.map(c=>c.color), borderColor: cssVar('--panel-alt'), borderWidth:2 }]},
    options:{
      plugins:{ legend:{ position:'bottom', labels:{ color:cssVar('--text'), font:{family:"'IBM Plex Sans'", size:11}, boxWidth:10, padding:12 } },
        tooltip:{ callbacks:{ label:(c)=> ` ${c.label}: ${fmtMoney(c.raw, currency)}` } } },
      cutout:'62%'
    }
  });
}

function addDaysISO(dateStr, n){
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m-1, d+n);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function expenseDayShares(e){
  // Uma despesa ligada a uma reserva conta para o(s) dia(s) da reserva (ex: estadia),
  // não para a data em que foi paga — pagar hoje por um voo daqui a 15 dias deve aparecer
  // no dia do voo, não em "hoje". A data da despesa continua a ser só o registo do pagamento.
  const amount = Number(e.amount||0);
  const booking = e.bookingId ? (state.currentData.bookings||[]).find(b=>b.id===e.bookingId) : null;
  if(booking && booking.dateFrom){
    const from = booking.dateFrom;
    const to = (booking.dateTo && booking.dateTo>=from) ? booking.dateTo : from;
    const days = [];
    let cur = from;
    while(cur<=to && days.length<60){ days.push(cur); cur = addDaysISO(cur,1); }
    if(!days.length) days.push(from);
    const share = amount/days.length;
    return days.map(day=>({day, amount:share}));
  }
  return [{day: e.date || 'sem data', amount}];
}
function renderDayChart(expenses, currency){
  const ctx = document.getElementById('dayChart');
  if(!ctx) return;
  const byDay = {};
  expenses.forEach(e=>{ expenseDayShares(e).forEach(({day,amount})=>{ byDay[day] = (byDay[day]||0) + amount; }); });
  const labels = Object.keys(byDay).sort();
  if(state.charts.day) state.charts.day.destroy();
  if(!labels.length){
    ctx.replaceWith(Object.assign(document.createElement('div'), {className:'map-empty-hint', style:'position:static;padding:40px 0;', textContent:'Ainda sem despesas registadas.'}));
    return;
  }
  state.charts.day = new Chart(ctx, {
    type:'bar',
    data:{ labels: labels.map(l=> l==='sem data'?l:fmtDateShort(l)), datasets:[{ data: labels.map(l=>byDay[l]), backgroundColor:'#C9A24D', borderRadius:4, maxBarThickness:34 }]},
    options:{
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:(c)=> fmtMoney(c.raw, currency) } } },
      scales:{
        x:{ ticks:{ color:cssVar('--text-dim'), font:{family:"'IBM Plex Mono'", size:10.5} }, grid:{display:false} },
        y:{ ticks:{ color:cssVar('--text-dim'), font:{family:"'IBM Plex Mono'", size:10.5} }, grid:{color:cssVar('--border')} }
      }
    }
  });
}

function bookingSortKey(b){ return `${b.dateFrom||'9999-12-31'}T${b.timeFrom||'23:59'}`; }
function bookingLocationText(b){
  const a=state.currentData.locations.find(l=>l.id===b.locationId);
  const z=state.currentData.locations.find(l=>l.id===b.arrivalLocationId);
  return [a?.name,z?.name].filter(Boolean).join(' → ');
}
function isBookingLocation(l){ return !!l.fromBooking || l.notes==='Local associado a uma reserva'; }
function relatedBookingsForLocation(loc){
  return (state.currentData.bookings||[]).filter(b=>b.locationId===loc.id || b.arrivalLocationId===loc.id);
}
function locationChronoKey(loc){
  if(loc.day) return `${loc.day}T${loc.time||'12:00'}`;
  const related = relatedBookingsForLocation(loc);
  if(related.length){
    const keys = related.map(b=> b.arrivalLocationId===loc.id ? `${b.dateFrom||'9999-12-31'}T${b.timeTo||b.timeFrom||'23:59'}` : bookingSortKey(b));
    return keys.sort()[0];
  }
  return '9999-12-31T23:59';
}
const BOOKING_PIN_COLORS = {voo:'#6C6FD1', alojamento:'#7C97B8', transporte:'#4FA39A', atividade:'#A9829F', outro:'#C1573E'};
function mapLegendSwatches(){
  const entries = [{color:'var(--gold)', label:'Local de interesse'}, ...BOOKING_CATEGORIES.map(c=>({color:BOOKING_PIN_COLORS[c.key], label:c.label}))];
  return entries.map(e=>`<span><i style="background:${e.color}"></i>${escapeHtml(e.label)}</span>`).join('');
}
function locationPinVisual(loc){
  if(loc.airportIata) return {icon:'✈️', color:BOOKING_PIN_COLORS.voo, label:'Aeroporto'};
  const related = relatedBookingsForLocation(loc);
  if(related.length){
    const cat = BOOKING_CATEGORIES.find(c=>c.key===related[0].category);

  }
  return {icon:'📍', color:'var(--gold)', label:'Local de interesse'};
}
function renderRoteiro(el){

      <div class="itin-layout" style="margin-top:18px"><div><div id="itinList">${listHtml}</div></div><div><div id="mapCanvas" class="map-canvas"></div><div class="map-legend-swatches">${mapLegendSwatches()}</div><div class="map-legend">Passa o rato num pin para o identificar, clica para detalhes e para editar, ou arrasta para afinar a posição — a morada atualiza-se sozinha.</div><div class="map-credit">Mapa: © <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors</div></div></div>`;
  }
  renderMapCanvas();
  const pinned = state.currentData.locations.filter(l=>l.lat!=null && l.lon!=null);
  const fitKey = pinned.map(l=>`${l.id}:${l.lat}:${l.lon}`).sort().join('|');

let leafletMapInstance = null;

function buildPinDivIcon(loc, index){

const MapFitControl = (typeof L!=='undefined') ? L.Control.extend({
  options:{position:'bottomright'},
  onAdd:function(){
    const btn = L.DomUtil.create('button', 'leaflet-bar map-zoom-btn map-fit-btn');
    btn.type='button'; btn.title='Ajustar aos locais'; btn.innerHTML='⤢';
    btn.style.marginTop='6px';
    L.DomEvent.disableClickPropagation(btn);
    L.DomEvent.on(btn,'click', ()=>fitMapToLocations());
    return btn;
  }
}) : null;
function renderMapCanvas(){
  const wrap = document.getElementById('mapCanvas');
  if(!wrap || typeof L==='undefined') return;
  const locs = [...state.currentData.locations].filter(l=>l.lat!=null && l.lon!=null).sort((a,b)=>{
    const ka = locationChronoKey(a), kb = locationChronoKey(b);
    return ka!==kb ? ka.localeCompare(kb) : (a.order||0)-(b.order||0);
  });

  const needsFreshMap = !leafletMapInstance || leafletMapInstance.getContainer() !== wrap;
  if(needsFreshMap){
    if(leafletMapInstance){ try{ leafletMapInstance.remove(); }catch(e){} }
    leafletMarkers = new Map();
    leafletRouteLine = null;
    leafletMapInstance = L.map(wrap, { attributionControl:true, minZoom:2, maxZoom:19, zoomControl:false }).setView([20,0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom:19, attribution:'&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a>'
    }).addTo(leafletMapInstance);
    L.control.zoom({position:'bottomright'}).addTo(leafletMapInstance);
    if(MapFitControl) leafletMapInstance.addControl(new MapFitControl());
  }

  const currentIds = new Set(locs.map(l=>l.id));
  for(const [id, marker] of [...leafletMarkers.entries()]){
    if(!currentIds.has(id)){ leafletMapInstance.removeLayer(marker); leafletMarkers.delete(id); }
  }
  const latlngs = [];
  locs.forEach((loc, i)=>{
    const ll = [loc.lat, loc.lon];
    latlngs.push(ll);
    let marker = leafletMarkers.get(loc.id);
    if(marker){
      marker.setLatLng(ll);
      marker.setIcon(buildPinDivIcon(loc, i));
      marker.setPopupContent(popoverHtmlFor(loc));
    } else {
      marker = L.marker(ll, {icon:buildPinDivIcon(loc,i), draggable:true});
      marker.bindPopup(popoverHtmlFor(loc), {className:'map-popover-wrap', maxWidth:230});
      marker.on('dragend', ()=>onMarkerDragEnd(loc.id));
      marker.addTo(leafletMapInstance);
      leafletMarkers.set(loc.id, marker);
    }
  });

  if(leafletRouteLine){ leafletMapInstance.removeLayer(leafletRouteLine); leafletRouteLine=null; }
  if(latlngs.length>1){
    leafletRouteLine = L.polyline(latlngs, {color:'#C9A24D', weight:2.5, dashArray:'6,7', opacity:0.75}).addTo(leafletMapInstance);
  }

  let hintEl = wrap.querySelector('.map-empty-hint');
  if(!locs.length){
    if(!hintEl){ hintEl=document.createElement('div'); hintEl.className='map-empty-hint'; wrap.appendChild(hintEl); }
    hintEl.textContent = 'O mapa fica aqui — adiciona uma paragem para veres o percurso, ou arrasta um pin para afinar a posição.';
  } else if(hintEl){ hintEl.remove(); }

  if(needsFreshMap){
    setTimeout(()=>{ if(leafletMapInstance){ leafletMapInstance.invalidateSize(); fitMapToLocations(); } }, 0);
  }
}
async function onMarkerDragEnd(locId){
  const loc = state.currentData.locations.find(l=>l.id===locId);
  const marker = leafletMarkers.get(locId);
  if(!loc || !marker) return;
  const {lat,lng} = marker.getLatLng();
  loc.lat = lat; loc.lon = lng;
  const xy = mapXYFromCoords(lat,lng); loc.x = xy.x; loc.y = xy.y;
  persistCurrentTrip();
  renderMapCanvas();
  try{
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&zoom=18`, {headers:{'Accept-Language':'pt-PT,pt;q=0.9,en;q=0.7'}});
    if(res.ok){
      const data = await res.json();
      if(data && data.display_name){
        loc.address = data.display_name;
        persistCurrentTrip();
        const m = leafletMarkers.get(locId);
        if(m) m.setPopupContent(popoverHtmlFor(loc));
      }
    }
  }catch(err){ /* offline: mantém a nova posição, só a morada não atualiza */ }
}
function fitMapToLocations(){
  if(!leafletMapInstance) return;
  const locs = (state.currentData && state.currentData.locations || []).filter(l=>l.lat!=null && l.lon!=null);
  if(!locs.length){ leafletMapInstance.setView([20,0], 2); return; }
  if(locs.length===1){ leafletMapInstance.setView([locs[0].lat, locs[0].lon], 14); return; }
  leafletMapInstance.fitBounds(L.latLngBounds(locs.map(l=>[l.lat,l.lon])), {padding:[36,36], maxZoom:15});
}

const AIRLINE_NAMES={TP:'TAP Air Portugal',FR:'Ryanair',U2:'easyJet',EZY:'easyJet',LH:'Lufthansa',BA:'British Airways',IB:'Iberia',VY:'Vueling',KL:'KLM',AF:'Air France',LX:'SWISS',EK:'Emirates',QR:'Qatar Airways',TK:'Turkish Airlines',W6:'Wizz Air',S4:'Azores Airlines'};
function parseFlexibleDate(text){
  const iso=String(text||'').match(/\b(20\d{2})[-/.](\d{1,2})[-/.](\d{1,2})\b/);if(iso)return `${iso[1]}-${String(iso[2]).padStart(2,'0')}-${String(iso[3]).padStart(2,'0')}`;
  const eu=String(text||'').match(/\b(\d{1,2})[/.\-](\d{1,2})[/.\-](20\d{2})\b/);if(eu)return `${eu[3]}-${String(eu[2]).padStart(2,'0')}-${String(eu[1]).padStart(2,'0')}`;
  return '';
}
function parseReservationConfirmation(raw){
  const text=String(raw||'').replace(/\r/g,'').replace(/[ \t]+/g,' ');const upper=text.toUpperCase();
  const flightMatches=[...upper.matchAll(/\b([A-Z]{2,3})\s*[- ]?(\d{1,4}[A-Z]?)\b/g)].map(m=>({full:(m[1]+m[2]),code:m[1],index:m.index}));
  const ignored=new Set(['AM','PM','UTC','GMT','EUR','USD','THE','AND','FROM','TO']);
  const flight=flightMatches.find(x=>!ignored.has(x.code)&&Number.parseInt(x.full.replace(/\D/g,''),10)>0);
  const iatas=[...upper.matchAll(/(?:\(|\b)([A-Z]{3})(?:\)|\b)/g)].map(m=>m[1]).filter(x=>!['THE','AND','FOR','FROM','ARR','DEP','UTC','GMT','EUR','USD','TAP'].includes(x));
  const uniqueIatas=[...new Set(iatas)];
  const times=[...text.matchAll(/\b([01]?\d|2[0-3]):([0-5]\d)\b/g)].map(m=>`${String(m[1]).padStart(2,'0')}:${m[2]}`);
  const dates=[...text.matchAll(/(?:20\d{2}[-/.]\d{1,2}[-/.]\d{1,2}|\d{1,2}[/.\-]\d{1,2}[/.\-]20\d{2})/g)].map(m=>parseFlexibleDate(m[0])).filter(Boolean);
  const booking=text.match(/(?:BOOKING|RESERVA|CONFIRMATION|LOCATOR|LOCALIZADOR|PNR|REFERENCE|REFERÊNCIA|CODIGO|CÓDIGO)\s*(?:NUMBER|NÚMERO|NO\.?|#|:)?\s*[:#-]?\s*([A-Z0-9]{5,10})/i);
  const terminalDep=text.match(/(?:DEPARTURE|PARTIDA)[^\n]{0,40}TERMINAL\s*([A-Z0-9-]+)/i)||text.match(/TERMINAL\s*([A-Z0-9-]+)/i);
  const terminalArr=text.match(/(?:ARRIVAL|CHEGADA)[^\n]{0,40}TERMINAL\s*([A-Z0-9-]+)/i);
  return {flightNumber:flight?.full||'',provider:flight?(AIRLINE_NAMES[flight.code]||flight.code):'',dateFrom:dates[0]||'',dateTo:dates[1]||dates[0]||'',timeFrom:times[0]||'',timeTo:times[1]||'',departureIata:uniqueIatas[0]||'',arrivalIata:uniqueIatas[1]||'',code:booking?.[1]||'',departureTerminal:terminalDep?.[1]||'',arrivalTerminal:terminalArr?.[1]||''};
}
function findOrCreateAirportByIata(iata){

  let loc=state.currentData.locations.find(x=>x.airportIata===iata||new RegExp(`\\(${iata}\\)`).test(x.name||''));
  if(!loc){loc={id:uid(),name:`Aeroporto ${iata} (${iata})`,address:'',day:'',time:'',notes:'Aeroporto importado de uma confirmação de voo',x:null,y:null,order:nextLocationOrder(),visited:false,airportIata:iata};state.currentData.locations.push(loc);}
  return loc.id;
}
function applyParsedReservation(data){

  const depId=findOrCreateAirportByIata(data.departureIata),arrId=findOrCreateAirportByIata(data.arrivalIata);

function mapXYFromCoords(lat, lon){
  lat = Number(lat); lon = Number(lon);
  // Calibrado por regressão contra as fronteiras reais de várias dezenas de países
  // no mapa-base (que não é uma projeção equiretangular completa -90/90 — a imagem
  // está cortada verticalmente, por isso a fórmula linear ingénua empurrava tudo
  // para norte).
  const x = 0.296438*lon + 47.781;
  const y = -0.601964*lat + 63.226;
  return {x: Math.max(2, Math.min(98, x)), y: Math.max(4, Math.min(96, y))};
}
function xyToLatLon(x, y){
  // Inverso de mapXYFromCoords — só para estimar lat/lon de locais antigos que só
  // tinham x/y (colocados manualmente no mapa ilustrado, antes do mapa real).
  return { lat: (63.226 - Number(y))/0.601964, lon: (Number(x) - 47.781)/0.296438 };
}

function openBookingModal(mode,id,prefill=null){

function renderTicket(e){

  const fundNames=(e.fundAllocations||[]).map(x=>(state.currentData.advances||[]).find(a=>a.id===x.advanceId)).filter(Boolean).map(a=>a.label);
  const fundTotal=(e.fundAllocations||[]).reduce((sum,x)=>sum+Number(x.amount||0),0);
  const personalAmount=Math.max(0,Number(e.amount||0)-fundTotal);
  const paymentMeta = fundNames.length ? ` · fundo automático: ${escapeHtml(fundNames.join(' + '))}${personalAmount>0.001&&payerName?' + '+escapeHtml(payerName):''}` : (payerName ? ' · por '+escapeHtml(payerName) : '');
  return `
    <div class="ticket">
      <div class="cat-chip" style="background:${c.color}22; border:1px solid ${c.color}55;">${c.icon}</div>
      <div class="info">
        <div class="desc">${escapeHtml(e.description || c.label)}</div>
        <div class="meta">${e.date ? fmtDateShort(e.date) : 'Sem data'} · ${c.label}${loc ? ' · '+escapeHtml(loc.name) : ''}${booking ? ' · '+escapeHtml(booking.provider||'Reserva') : ''}${paymentMeta}</div>

      <div class="amount">${fmtMoney(e.amount, state.currentData.info.currency)}</div>
      <div class="actions">
        <button class="icon-btn" title="Editar" onclick="openExpenseModal('edit','${e.id}')">✎</button>

}
